<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MRR騾ｲ謐励ム繝・す繝･繝懊・繝・/title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif; background: #f5f7fa; color: #333; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

  .header { background: #fff; padding: 12px 24px; box-shadow: 0 1px 3px rgba(0,0,0,.1); display: flex; align-items: center; gap: 0; flex-shrink: 0; }
  .header-left { display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  .header-right { display: flex; align-items: center; gap: 16px; margin-left: auto; }
  .header h1 { font-size: 20px; color: #1a73e8; }

  .tabs { display: flex; gap: 4px; }
  .tab { padding: 6px 16px; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; background: #fff; font-size: 14px; }
  .tab.active { background: #1a73e8; color: #fff; border-color: #1a73e8; }

  .selector { display: flex; align-items: center; gap: 8px; }
  .selector label { font-size: 13px; font-weight: 600; }
  .selector select { padding: 4px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }

  .container { max-width: 1400px; width: 100%; margin: 0 auto; padding: 24px; flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }

  .cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; flex-shrink: 0; }
  .card { background: #fff; border-radius: 8px; padding: 16px; box-shadow: 0 2px 6px rgba(0,0,0,.08); }
  .card .label { font-size: 12px; color: #888; margin-bottom: 4px; }
  .card .value { font-size: 28px; font-weight: 700; }
  .card .sub { font-size: 12px; margin-top: 4px; }
  .val-pos { color: #333; }
  .val-neg { color: #ea4335; }

  .chart-wrap { background: #fff; border-radius: 8px; padding: 24px; box-shadow: 0 2px 6px rgba(0,0,0,.08); margin-bottom: 20px; flex-shrink: 0; }
  canvas { max-height: 520px; }

  #filterChip { flex-shrink: 0; }
  #dealArea { flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
  .deal-scroll { flex: 1; min-height: 0; overflow-y: auto; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,.08); }
  .deal-scroll .deal-table { box-shadow: none; border-radius: 0; }
  .deal-scroll thead th { position: sticky; top: 0; z-index: 1; }
  .deal-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 6px rgba(0,0,0,.08); }
  .deal-table th { background: #f0f3f8; padding: 10px 12px; text-align: left; font-size: 13px; border-bottom: 1px solid #ddd; }
  .deal-table td { padding: 8px 12px; font-size: 13px; border-bottom: 1px solid #eee; }
  .deal-table tr.pos { background: #f0faf3; }
  .deal-table tr.neg { background: #fff5f5; }

  .no-deals { padding: 24px; text-align: center; color: #999; background: #fff; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,.08); }

  #loading { position: fixed; inset: 0; background: rgba(255,255,255,0.85); display: flex; align-items: center; justify-content: center; font-size: 16px; color: #1a73e8; z-index: 100; }

  .week-nav { display: flex; align-items: center; gap: 4px; }
  .week-btn { padding: 4px 10px; border: 1px solid #ccc; border-radius: 4px; background: #fff; cursor: pointer; font-size: 16px; line-height: 1; }
  .week-btn:hover { background: #f0f0f0; }
  .week-label { min-width: 80px; text-align: center; font-size: 14px; font-weight: 600; }

  @media (max-width: 700px) {
    .cards { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div id="loading">繝・・繧ｿ繧定ｪｭ縺ｿ霎ｼ縺ｿ荳ｭ...</div>

<div class="header">
  <div class="header-left">
    <h1>MRR騾ｲ謐励ム繝・す繝･繝懊・繝・/h1>
    <div class="tabs">
      <div class="tab active" data-view="weekly" onclick="switchView('weekly')">騾ｱ蛻･</div>
      <div class="tab" data-view="dept" onclick="switchView('dept')">驛ｨ鄂ｲ蛻･</div>
    </div>
  </div>
  <div class="header-right">
    <div class="selector" id="deptSelector">
      <label>驛ｨ鄂ｲ:</label>
      <select id="deptSelect" onchange="chartFilter=null;render()"></select>
    </div>
    <div class="week-nav" id="weekSelector" style="display:none;">
      <button class="week-btn" onclick="moveWeek(-1)">&#8592;</button>
      <span id="weekLabel" class="week-label"></span>
      <button class="week-btn" onclick="moveWeek(1)">&#8594;</button>
    </div>
  </div>
</div>

<div class="container">
  <div class="cards" id="cards"></div>
  <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
  <div id="filterChip"></div>
  <div id="dealArea"></div>
</div>

<script>
var D = null;
var currentView = 'weekly';
var chart = null;
var dealSortKey = null;
var dealSortAsc = true;
var chartFilter = null; // { type: 'week'|'dept', value: string }
var currentWeekIdx = 0; // index into D.weeks, set to last after data loads

// --- Boot: fetch data from GAS backend ---
google.script.run
  .withSuccessHandler(function(result) {
    D = result;
    var deptSel = document.getElementById('deptSelect');
    ['SS莠区･ｭ驛ｨ'].concat(D.depts).forEach(function(d) {
      var o = document.createElement('option');
      o.value = d; o.textContent = d;
      deptSel.appendChild(o);
    });
    currentWeekIdx = D.weeks.length - 1;
    updateWeekLabel();
    document.getElementById('loading').style.display = 'none';
    render();
  })
  .withFailureHandler(function(err) {
    document.getElementById('loading').textContent = '繧ｨ繝ｩ繝ｼ: ' + err.message;
  })
  .getMrrDashboardData();

// --- Helpers ---
function fmt(v) {
  return (v < 0 ? '-' : '') + Math.abs(v).toLocaleString('ja-JP');
}
function cls(v) { return v < 0 ? 'val-neg' : 'val-pos'; }

function getDeptData(week, dept) {
  if (dept === 'SS莠区･ｭ驛ｨ') return D.data[week]['SS'];
  return D.data[week][dept];
}

function updateWeekLabel() {
  if (!D) return;
  var el = document.getElementById('weekLabel');
  if (el) el.textContent = D.weeks[currentWeekIdx];
}

function moveWeek(dir) {
  if (!D) return;
  currentWeekIdx = Math.max(0, Math.min(D.weeks.length - 1, currentWeekIdx + dir));
  chartFilter = null;
  updateWeekLabel();
  render();
}

function getSelectedWeek() {
  return D ? D.weeks[currentWeekIdx] : null;
}

function switchView(v) {
  currentView = v;
  chartFilter = null;
  document.querySelectorAll('.tab').forEach(function(t) {
    t.classList.toggle('active', t.dataset.view === v);
  });
  document.getElementById('deptSelector').style.display = v === 'weekly' ? '' : 'none';
  document.getElementById('weekSelector').style.display = v === 'dept' ? '' : 'none';
  render();
}

function parseDeals(text) {
  if (!text) return [];
  var lines = text.split('\n').filter(function(l) { return l.trim(); });
  return lines.map(function(line) {
    var clean = line.replace(/^繝ｻ/, '').trim();
    var m = clean.match(/^(.+?)\s+(-?\d+)荳Ⅸs*\/\s*(.+?)\s*\/\s*(-?\d+)荳・Κ繝・/);
    if (m) return { company: m[1], mrr: parseInt(m[2]) * 10000, phase: m[3].trim(), yomi: parseInt(m[4]) * 10000 };
    return { company: clean, mrr: 0, phase: '-', yomi: 0 };
  });
}

// --- Render ---
function render() {
  if (!D) return;
  renderCards();
  renderChart();
  renderDeals();
}

function renderCards() {
  var area = document.getElementById('cards');
  var target, actual, fcst;
  var deptSel = document.getElementById('deptSelect');
  if (currentView === 'weekly') {
    var dept = deptSel.value;
    var lastWeek = D.weeks[D.weeks.length - 1];
    var d = getDeptData(lastWeek, dept);
    target = d.target; actual = d.actual; fcst = d.fcst;
  } else {
    var week = getSelectedWeek();
    var d2 = D.data[week]['SS'];
    target = d2.target; actual = d2.actual; fcst = d2.fcst;
  }
  var diffA = actual - target;
  var diffF = fcst - target;
  var rate = target !== 0 ? ((actual / target) * 100).toFixed(1) : '-';
  area.innerHTML =
    '<div class="card"><div class="label">逶ｮ讓・/div><div class="value">' + fmt(target) + '</div></div>' +
    '<div class="card"><div class="label">螳溽ｸｾ</div><div class="value ' + cls(actual) + '">' + fmt(actual) + '</div>' +
    '<div class="sub ' + cls(diffA) + '">vs 逶ｮ讓・ ' + (diffA >= 0 ? '+' : '') + fmt(diffA) + '</div></div>' +
    '<div class="card"><div class="label">FCST</div><div class="value ' + cls(fcst) + '">' + fmt(fcst) + '</div>' +
    '<div class="sub ' + cls(diffF) + '">vs 逶ｮ讓・ ' + (diffF >= 0 ? '+' : '') + fmt(diffF) + '</div></div>' +
    '<div class="card"><div class="label">驕疲・邇・/div><div class="value ' + (rate !== '-' && parseFloat(rate) < 0 ? 'val-neg' : 'val-pos') + '">' + rate + '%</div></div>';
}

function makeTargetTickPlugin(pluginId, targetsArr) {
  return {
    id: pluginId,
    afterDatasetsDraw: function(ch) {
      var cctx = ch.ctx;
      var barMetas = ch.data.datasets
        .map(function(_, idx) { return ch.getDatasetMeta(idx); })
        .filter(function(meta) { return meta.type === 'bar'; });
      if (!barMetas.length) return;
      cctx.save();
      cctx.strokeStyle = '#ea4335';
      cctx.lineWidth = 3;
      cctx.setLineDash([]);
      targetsArr.forEach(function(val, i) {
        var y = ch.scales.y.getPixelForValue(val);
        var bandHalf = ch.scales.x.width / (ch.data.labels.length * 2);
        var centerX  = ch.scales.x.getPixelForValue(i);
        var left  = centerX - bandHalf;
        var right = centerX + bandHalf;
        cctx.beginPath();
        cctx.moveTo(left, y);
        cctx.lineTo(right, y);
        cctx.stroke();
      });
      cctx.restore();
    }
  };
}

function renderChart() {
  if (chart) chart.destroy();
  var ctx = document.getElementById('mainChart').getContext('2d');
  var deptSel = document.getElementById('deptSelect');

  if (currentView === 'weekly') {
    var dept = deptSel.value;
    var actuals  = D.weeks.map(function(w) { return getDeptData(w, dept).actual; });
    var expected = D.weeks.map(function(w) { return getDeptData(w, dept).expectedMrr; });
    var fcsts    = D.weeks.map(function(w) { return getDeptData(w, dept).fcst; });
    var tgt      = getDeptData(D.weeks[0], dept).target;
    var targets  = D.weeks.map(function() { return tgt; });

    chart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: D.weeks,
        datasets: [
          { label: '逶ｮ讓・,    data: targets, type: 'line', borderColor: '#ea4335', backgroundColor: 'transparent', borderWidth: 2, borderDash: [8,4], pointRadius: 0, tension: 0 },
          { label: '螳溽ｸｾ',    data: actuals,  backgroundColor: 'rgba(26,115,232,0.7)',  borderColor: '#1a73e8', borderWidth: 1 },
          { label: '譛溷ｾ・RR', data: expected, backgroundColor: 'rgba(52,168,83,0.7)',   borderColor: '#34a853', borderWidth: 1 },
          { label: 'FCST',   data: fcsts,    backgroundColor: 'rgba(251,188,4,0.7)',   borderColor: '#fbbc04', borderWidth: 1 }
        ]
      },
      options: {
        responsive: true,
        plugins: { legend: { position: 'top' } },
        onClick: function(evt, elements) {
          if (!elements.length) { chartFilter = null; renderDeals(); return; }
          var idx = elements[0].index;
          var label = D.weeks[idx];
          if (chartFilter && chartFilter.value === label) {
            chartFilter = null;
          } else {
            chartFilter = { type: 'week', value: label };
          }
          renderDeals();
        },
        onHover: function(evt, elements) {
          evt.native.target.style.cursor = elements.length ? 'pointer' : 'default';
        },
        scales: { y: { ticks: { callback: function(v) { return v.toLocaleString('ja-JP'); } } } }
      }
    });
  } else {
    var week = getSelectedWeek();
    var targets2  = D.depts.map(function(d) { return D.data[week][d].target; });
    var actuals2  = D.depts.map(function(d) { return D.data[week][d].actual; });
    var expected2 = D.depts.map(function(d) { return D.data[week][d].expectedMrr; });
    var fcsts2    = D.depts.map(function(d) { return D.data[week][d].fcst; });
    chart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: D.depts,
        datasets: [
          { label: '目標', data: [], borderColor: '#ea4335', backgroundColor: 'transparent', type: 'line', borderWidth: 3, pointRadius: 0 },
          { label: '螳溽ｸｾ',    data: actuals2,  backgroundColor: 'rgba(26,115,232,0.7)', borderColor: '#1a73e8', borderWidth: 1 },
          { label: '譛溷ｾ・RR', data: expected2, backgroundColor: 'rgba(52,168,83,0.7)',  borderColor: '#34a853', borderWidth: 1 },
          { label: 'FCST',   data: fcsts2,    backgroundColor: 'rgba(251,188,4,0.7)',  borderColor: '#fbbc04', borderWidth: 1 }
        ]
      },
      options: {
        responsive: true,
        plugins: { legend: { position: 'top' } },
        onClick: function(evt, elements) {
          if (!elements.length) { chartFilter = null; renderDeals(); return; }
          var idx = elements[0].index;
          var label = D.depts[idx];
          if (chartFilter && chartFilter.value === label) {
            chartFilter = null;
          } else {
            chartFilter = { type: 'dept', value: label };
          }
          renderDeals();
        },
        onHover: function(evt, elements) {
          evt.native.target.style.cursor = elements.length ? 'pointer' : 'default';
        },
        scales: { y: { ticks: { callback: function(v) { return v.toLocaleString('ja-JP'); } } } }
      },
      plugins: [makeTargetTickPlugin('targetTicks', targets2)]
    });
  }
}

function renderDeals() {
  var area = document.getElementById('dealArea');
  var deptSel = document.getElementById('deptSelect');
  var deals = [];

  // Render filter chip
  var chipArea = document.getElementById('filterChip');
  if (chartFilter) {
    chipArea.innerHTML = '<span style="display:inline-flex;align-items:center;gap:6px;background:#e8f0fe;color:#1a73e8;padding:4px 10px;border-radius:12px;font-size:12px;margin-bottom:10px;">' +
      '繝輔ぅ繝ｫ繧ｿ繝ｼ荳ｭ: ' + chartFilter.value +
      ' <span style="cursor:pointer;font-weight:bold;" onclick="chartFilter=null;renderDeals()">ﾃ・/span></span>';
  } else {
    chipArea.innerHTML = '';
  }

  if (currentView === 'weekly') {
    var dept = deptSel.value;
    var lastWeek = D.weeks[D.weeks.length - 1];
    if (dept === 'SS莠区･ｭ驛ｨ') {
      D.depts.forEach(function(d) {
        parseDeals(D.data[lastWeek][d].keyDeal).forEach(function(deal) {
          deals.push(Object.assign({ dept: d }, deal));
        });
      });
    } else {
      parseDeals(D.data[lastWeek][dept].keyDeal).forEach(function(deal) {
        deals.push(Object.assign({ dept: dept }, deal));
      });
    }
  } else {
    var week = getSelectedWeek();
    D.depts.forEach(function(d) {
      parseDeals(D.data[week][d].keyDeal).forEach(function(deal) {
        deals.push(Object.assign({ dept: d }, deal));
      });
    });
  }

  // Apply chart filter
  if (chartFilter) {
    if (chartFilter.type === 'week') {
      deals = [];
      var fw = chartFilter.value;
      if (currentView === 'weekly') {
        var deptSel2 = document.getElementById('deptSelect');
        var fd = deptSel2.value;
        if (fd === 'SS莠区･ｭ驛ｨ') {
          D.depts.forEach(function(d) {
            parseDeals(D.data[fw][d].keyDeal).forEach(function(deal) {
              deals.push(Object.assign({ dept: d }, deal));
            });
          });
        } else {
          parseDeals(D.data[fw][fd].keyDeal).forEach(function(deal) {
            deals.push(Object.assign({ dept: fd }, deal));
          });
        }
      }
    } else if (chartFilter.type === 'dept') {
      deals = deals.filter(function(deal) { return deal.dept === chartFilter.value; });
    }
  }

  if (deals.length === 0) {
    area.innerHTML = '<div class="no-deals">Key Deal 繝・・繧ｿ縺ｪ縺・/div>';
    return;
  }

  function thBtn(key, label) {
    var ind = dealSortKey === key ? (dealSortAsc ? ' 笆ｲ' : ' 笆ｼ') : '';
    return '<th style="cursor:pointer;user-select:none;" onclick="setSortKey(\'' + key + '\')">' + label + ind + '</th>';
  }
  // Apply sort
  if (dealSortKey) {
    deals.sort(function(a, b) {
      var av = a[dealSortKey], bv = b[dealSortKey];
      if (typeof av === 'string') av = av.toLowerCase();
      if (typeof bv === 'string') bv = bv.toLowerCase();
      if (av < bv) return dealSortAsc ? -1 : 1;
      if (av > bv) return dealSortAsc ? 1 : -1;
      return 0;
    });
  }
  var html = '<table class="deal-table"><thead><tr>' +
    thBtn('dept', '驛ｨ鄂ｲ') + thBtn('company', '莨夂､ｾ蜷・) +
    thBtn('mrr', 'MRR') + thBtn('phase', '繝輔ぉ繝ｼ繧ｺ') + thBtn('yomi', '繝ｨ繝・) +
    '</tr></thead><tbody>';
  deals.forEach(function(d) {
    var rowCls = d.mrr > 0 ? 'pos' : d.mrr < 0 ? 'neg' : '';
    html += '<tr class="' + rowCls + '"><td>' + d.dept + '</td><td>' + d.company + '</td>' +
      '<td class="' + cls(d.mrr) + '">' + fmt(d.mrr) + '</td>' +
      '<td>' + d.phase + '</td>' +
      '<td class="' + cls(d.yomi) + '">' + fmt(d.yomi) + '</td></tr>';
  });
  html += '</tbody></table>';
  area.innerHTML = '<div class="deal-scroll">' + html + '</div>';
}

function setSortKey(key) {
  if (dealSortKey === key) {
    dealSortAsc = !dealSortAsc;
  } else {
    dealSortKey = key;
    dealSortAsc = true;
  }
  renderDeals();
}
</script>
</body>
</html>
