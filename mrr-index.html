<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MRR進捗ダッシュボード</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", "Hiragino Sans", "Meiryo", sans-serif;
    background: #f4f7fb;
    color: #1f2937;
  }
  .app-shell {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 16px 24px;
    background: #ffffff;
    box-shadow: 0 1px 3px rgba(15, 23, 42, 0.1);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-left,
  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .header h1 {
    margin: 0;
    font-size: 20px;
    color: #1a73e8;
  }
  .tabs {
    display: inline-flex;
    gap: 6px;
    padding: 4px;
    border-radius: 999px;
    background: #eef2ff;
  }
  .tab {
    padding: 8px 14px;
    border-radius: 999px;
    border: 0;
    background: transparent;
    color: #475569;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
  }
  .tab.active {
    background: #1a73e8;
    color: #ffffff;
  }
  .selector,
  .week-nav {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .selector label,
  .week-label {
    font-size: 13px;
    font-weight: 600;
  }
  .selector select {
    min-width: 160px;
    padding: 6px 10px;
    border: 1px solid #cbd5e1;
    border-radius: 8px;
    background: #ffffff;
    font-size: 13px;
  }
  .week-btn {
    width: 32px;
    height: 32px;
    border: 1px solid #cbd5e1;
    border-radius: 8px;
    background: #ffffff;
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
  }
  .week-btn:hover,
  .selector select:hover,
  .tab:hover {
    opacity: 0.9;
  }
  .week-label {
    min-width: 88px;
    text-align: center;
  }
  .content {
    width: min(1440px, calc(100vw - 32px));
    margin: 0 auto;
    padding: 24px 0 32px;
  }
  .cards {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 16px;
    margin-bottom: 20px;
  }
  .card {
    padding: 16px 18px;
    border-radius: 14px;
    background: #ffffff;
    box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
  }
  .card-label {
    font-size: 12px;
    color: #64748b;
    margin-bottom: 6px;
  }
  .card-value {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .card-sub {
    margin-top: 6px;
    font-size: 12px;
  }
  .val-pos { color: #15803d; }
  .val-neg { color: #dc2626; }
  .val-neutral { color: #1f2937; }
  .panel {
    background: #ffffff;
    border-radius: 14px;
    box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
  }
  .chart-panel {
    padding: 20px;
    margin-bottom: 16px;
  }
  .chart-panel canvas {
    max-height: 520px;
  }
  .filter-chip {
    min-height: 24px;
    margin-bottom: 12px;
  }
  .filter-chip-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 5px 12px;
    border-radius: 999px;
    background: #e8f0fe;
    color: #1a73e8;
    font-size: 12px;
    font-weight: 600;
  }
  .filter-chip-clear {
    border: 0;
    background: transparent;
    color: inherit;
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
  }
  .deal-panel {
    overflow: hidden;
  }
  .deal-scroll {
    overflow: auto;
  }
  .deal-table {
    width: 100%;
    border-collapse: collapse;
  }
  .deal-table th,
  .deal-table td {
    padding: 10px 12px;
    font-size: 13px;
    border-bottom: 1px solid #e5e7eb;
    text-align: left;
    white-space: nowrap;
  }
  .deal-table th {
    position: sticky;
    top: 0;
    z-index: 1;
    background: #f8fafc;
    color: #334155;
  }
  .deal-table th.sortable {
    cursor: pointer;
    user-select: none;
  }
  .deal-table tr.pos {
    background: #f0fdf4;
  }
  .deal-table tr.neg {
    background: #fef2f2;
  }
  .no-deals,
  .loading {
    padding: 48px 24px;
    text-align: center;
    color: #64748b;
  }
  .loading {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255, 255, 255, 0.88);
    font-size: 16px;
    color: #1a73e8;
    z-index: 100;
  }
  .loading.hidden {
    display: none;
  }
  @media (max-width: 960px) {
    .cards {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }
  @media (max-width: 720px) {
    .header {
      padding: 14px 16px;
      align-items: flex-start;
    }
    .content {
      width: calc(100vw - 20px);
      padding-top: 16px;
    }
    .cards {
      grid-template-columns: 1fr;
    }
    .deal-table th,
    .deal-table td {
      font-size: 12px;
      padding: 8px 10px;
    }
  }
</style>
</head>
<body>
<div class="app-shell">
  <div id="loading" class="loading">読込中...</div>

  <header class="header">
    <div class="header-left">
      <h1>MRR進捗ダッシュボード</h1>
      <div class="tabs">
        <button type="button" class="tab active" data-view="weekly" onclick="switchView('weekly')">週次</button>
        <button type="button" class="tab" data-view="dept" onclick="switchView('dept')">部署別</button>
      </div>
    </div>
    <div class="header-right">
      <div class="selector" id="deptSelector">
        <label for="deptSelect">部署</label>
        <select id="deptSelect" onchange="chartFilter = null; render();"></select>
      </div>
      <div class="week-nav" id="weekSelector" style="display:none;">
        <button type="button" class="week-btn" onclick="moveWeek(-1)" aria-label="前の週">←</button>
        <span id="weekLabel" class="week-label"></span>
        <button type="button" class="week-btn" onclick="moveWeek(1)" aria-label="次の週">→</button>
      </div>
    </div>
  </header>

  <main class="content">
    <section class="cards" id="cards"></section>
    <section class="panel chart-panel">
      <canvas id="mainChart"></canvas>
    </section>
    <div id="filterChip" class="filter-chip"></div>
    <section class="panel deal-panel" id="dealArea"></section>
  </main>
</div>

<script>
var ALL_DEPTS_LABEL = '全部署';
var D = null;
var chart = null;
var currentView = 'weekly';
var currentWeekIdx = 0;
var chartFilter = null;
var dealSortKey = '';
var dealSortAsc = true;

function emptyMetric_() {
  return { target: 0, actual: 0, expectedMrr: 0, fcst: 0, keyDeal: '' };
}

function showLoading_(message) {
  var el = document.getElementById('loading');
  if (!el) return;
  el.textContent = message || '読込中...';
  el.classList.remove('hidden');
}

function hideLoading_() {
  var el = document.getElementById('loading');
  if (!el) return;
  el.classList.add('hidden');
}

function fmt(v) {
  var num = Number(v) || 0;
  return (num < 0 ? '-' : '') + Math.abs(num).toLocaleString('ja-JP');
}

function valClass_(v) {
  var num = Number(v) || 0;
  if (num > 0) return 'val-pos';
  if (num < 0) return 'val-neg';
  return 'val-neutral';
}

function getWeekMap_(week) {
  return (D && D.data && D.data[week]) || {};
}

function getDeptData(week, dept) {
  var rows = getWeekMap_(week);
  if (dept === ALL_DEPTS_LABEL) {
    return rows.SS || emptyMetric_();
  }
  return rows[dept] || emptyMetric_();
}

function normalizeResult_(result) {
  return {
    weeks: Array.isArray(result && result.weeks) ? result.weeks.slice() : [],
    depts: Array.isArray(result && result.depts) ? result.depts.slice() : [],
    data: result && result.data ? result.data : {}
  };
}

function bootstrap_() {
  showLoading_('読込中...');
  google.script.run
    .withSuccessHandler(function(result) {
      D = normalizeResult_(result || {});
      buildDeptOptions_();
      currentWeekIdx = D.weeks.length ? D.weeks.length - 1 : 0;
      updateWeekLabel();
      hideLoading_();
      render();
    })
    .withFailureHandler(function(err) {
      showLoading_('エラー: ' + getErrorMessage_(err));
    })
    .getMrrDashboardData();
}

function getErrorMessage_(err) {
  if (!err) return 'Unknown error';
  return err.message || err.toString() || 'Unknown error';
}

function buildDeptOptions_() {
  var select = document.getElementById('deptSelect');
  if (!select) return;
  select.innerHTML = '';
  [ALL_DEPTS_LABEL].concat(D.depts || []).forEach(function(dept) {
    var option = document.createElement('option');
    option.value = dept;
    option.textContent = dept;
    select.appendChild(option);
  });
}

function getSelectedDept_() {
  var select = document.getElementById('deptSelect');
  return select && select.value ? select.value : ALL_DEPTS_LABEL;
}

function getSelectedWeek_() {
  if (!D || !D.weeks || !D.weeks.length) return '';
  return D.weeks[currentWeekIdx] || '';
}

function updateWeekLabel() {
  var label = document.getElementById('weekLabel');
  if (!label) return;
  label.textContent = getSelectedWeek_() || '-';
}

function moveWeek(direction) {
  if (!D || !D.weeks || !D.weeks.length) return;
  currentWeekIdx = Math.max(0, Math.min(D.weeks.length - 1, currentWeekIdx + direction));
  chartFilter = null;
  updateWeekLabel();
  render();
}

function switchView(view) {
  currentView = view;
  chartFilter = null;
  document.querySelectorAll('.tab').forEach(function(tab) {
    tab.classList.toggle('active', tab.dataset.view === view);
  });
  document.getElementById('deptSelector').style.display = view === 'weekly' ? '' : 'none';
  document.getElementById('weekSelector').style.display = view === 'dept' ? '' : 'none';
  render();
}

function parseAmountPart_(text) {
  var source = String(text || '').trim();
  var match = source.match(/^(.*?)(?:\s+(-?[0-9,]+))(?:万|万円)?$/);
  if (!match) {
    return { label: source, amount: 0 };
  }
  return {
    label: match[1].trim(),
    amount: (parseInt(match[2].replace(/,/g, ''), 10) || 0) * 10000
  };
}

function parseTrailingAmount_(text) {
  var source = String(text || '').trim();
  var match = source.match(/(-?[0-9,]+)/);
  return match ? (parseInt(match[1].replace(/,/g, ''), 10) || 0) * 10000 : 0;
}

function parseDeals(text) {
  return String(text || '')
    .split(/\r?\n/)
    .map(function(line) { return line.trim(); })
    .filter(function(line) { return !!line; })
    .map(function(line) {
      var clean = line.replace(/^[・•●]/, '').trim();
      var parts = clean.split('/').map(function(part) { return part.trim(); });
      var main = parseAmountPart_(parts[0] || clean);
      return {
        company: main.label || clean,
        mrr: main.amount,
        phase: parts[1] || '-',
        yomi: parseTrailingAmount_(parts[2] || ''),
      };
    });
}

function render() {
  if (!D) return;
  renderCards();
  renderChart();
  renderDeals();
}

function renderCards() {
  var area = document.getElementById('cards');
  if (!area) return;

  if (!D.weeks.length) {
    area.innerHTML = '<div class="card"><div class="card-label">状態</div><div class="card-value">データなし</div></div>';
    return;
  }

  var data;
  if (currentView === 'weekly') {
    data = getDeptData(D.weeks[D.weeks.length - 1], getSelectedDept_());
  } else {
    data = getDeptData(getSelectedWeek_(), ALL_DEPTS_LABEL);
  }

  var target = Number(data.target) || 0;
  var actual = Number(data.actual) || 0;
  var fcst = Number(data.fcst) || 0;
  var expected = Number(data.expectedMrr) || 0;
  var diffActual = actual - target;
  var diffFcst = fcst - target;
  var rate = target ? ((actual / target) * 100).toFixed(1) + '%' : '-';

  area.innerHTML = [
    buildCardHtml_('目標', fmt(target), ''),
    buildCardHtml_('実績', fmt(actual), 'vs 目標 ' + (diffActual >= 0 ? '+' : '') + fmt(diffActual), valClass_(actual), valClass_(diffActual)),
    buildCardHtml_('期待MRR', fmt(expected), '', valClass_(expected)),
    buildCardHtml_('FCST', fmt(fcst), 'vs 目標 ' + (diffFcst >= 0 ? '+' : '') + fmt(diffFcst), valClass_(fcst), valClass_(diffFcst)),
    buildCardHtml_('達成率', rate, '', rate !== '-' && parseFloat(rate) < 100 ? 'val-neg' : 'val-neutral')
  ].join('');
}

function buildCardHtml_(label, value, sub, valueClass, subClass) {
  return (
    '<div class="card">' +
      '<div class="card-label">' + escapeHtml_(label) + '</div>' +
      '<div class="card-value ' + escapeHtml_(valueClass || 'val-neutral') + '">' + escapeHtml_(value) + '</div>' +
      (sub ? '<div class="card-sub ' + escapeHtml_(subClass || 'val-neutral') + '">' + escapeHtml_(sub) + '</div>' : '') +
    '</div>'
  );
}

function makeTargetTickPlugin_(pluginId, targets) {
  return {
    id: pluginId,
    afterDatasetsDraw: function(chartInstance) {
      var bars = chartInstance.data.datasets
        .map(function(_, idx) { return chartInstance.getDatasetMeta(idx); })
        .filter(function(meta) { return meta.type === 'bar'; });
      if (!bars.length || !targets.length) return;
      var ctx = chartInstance.ctx;
      ctx.save();
      ctx.strokeStyle = '#ea4335';
      ctx.lineWidth = 3;
      ctx.setLineDash([]);
      targets.forEach(function(value, index) {
        var y = chartInstance.scales.y.getPixelForValue(value);
        var centerX = chartInstance.scales.x.getPixelForValue(index);
        var bandHalf = chartInstance.scales.x.width / (chartInstance.data.labels.length * 2);
        ctx.beginPath();
        ctx.moveTo(centerX - bandHalf, y);
        ctx.lineTo(centerX + bandHalf, y);
        ctx.stroke();
      });
      ctx.restore();
    }
  };
}

function buildChartOptions_() {
  return {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { position: 'top' }
    },
    onHover: function(evt, elements) {
      if (evt && evt.native && evt.native.target) {
        evt.native.target.style.cursor = elements.length ? 'pointer' : 'default';
      }
    },
    scales: {
      y: {
        ticks: {
          callback: function(value) {
            return Number(value).toLocaleString('ja-JP');
          }
        }
      }
    }
  };
}

function renderChart() {
  var canvas = document.getElementById('mainChart');
  if (!canvas || !D || !D.weeks.length) return;
  if (chart) chart.destroy();
  var ctx = canvas.getContext('2d');
  var options = buildChartOptions_();

  if (currentView === 'weekly') {
    var dept = getSelectedDept_();
    var rows = D.weeks.map(function(week) { return getDeptData(week, dept); });
    chart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: D.weeks,
        datasets: [
          {
            label: '目標',
            data: rows.map(function(row) { return row.target || 0; }),
            type: 'line',
            borderColor: '#ea4335',
            backgroundColor: 'transparent',
            borderWidth: 2,
            borderDash: [8, 4],
            pointRadius: 0,
            tension: 0
          },
          {
            label: '実績',
            data: rows.map(function(row) { return row.actual || 0; }),
            backgroundColor: 'rgba(26,115,232,0.72)',
            borderColor: '#1a73e8',
            borderWidth: 1
          },
          {
            label: '期待MRR',
            data: rows.map(function(row) { return row.expectedMrr || 0; }),
            backgroundColor: 'rgba(52,168,83,0.72)',
            borderColor: '#34a853',
            borderWidth: 1
          },
          {
            label: 'FCST',
            data: rows.map(function(row) { return row.fcst || 0; }),
            backgroundColor: 'rgba(251,188,4,0.72)',
            borderColor: '#fbbc04',
            borderWidth: 1
          }
        ]
      },
      options: Object.assign(options, {
        onClick: function(_, elements) {
          if (!elements.length) {
            chartFilter = null;
          } else {
            var label = D.weeks[elements[0].index];
            chartFilter = chartFilter && chartFilter.type === 'week' && chartFilter.value === label
              ? null
              : { type: 'week', value: label };
          }
          renderDeals();
        }
      })
    });
    return;
  }

  var week = getSelectedWeek_();
  var targets = D.depts.map(function(dept) { return getDeptData(week, dept).target || 0; });
  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: D.depts,
      datasets: [
        {
          label: '目標',
          data: targets,
          type: 'line',
          borderColor: '#ea4335',
          backgroundColor: 'transparent',
          borderWidth: 0,
          pointRadius: 0
        },
        {
          label: '実績',
          data: D.depts.map(function(dept) { return getDeptData(week, dept).actual || 0; }),
          backgroundColor: 'rgba(26,115,232,0.72)',
          borderColor: '#1a73e8',
          borderWidth: 1
        },
        {
          label: '期待MRR',
          data: D.depts.map(function(dept) { return getDeptData(week, dept).expectedMrr || 0; }),
          backgroundColor: 'rgba(52,168,83,0.72)',
          borderColor: '#34a853',
          borderWidth: 1
        },
        {
          label: 'FCST',
          data: D.depts.map(function(dept) { return getDeptData(week, dept).fcst || 0; }),
          backgroundColor: 'rgba(251,188,4,0.72)',
          borderColor: '#fbbc04',
          borderWidth: 1
        }
      ]
    },
    options: Object.assign(options, {
      onClick: function(_, elements) {
        if (!elements.length) {
          chartFilter = null;
        } else {
          var label = D.depts[elements[0].index];
          chartFilter = chartFilter && chartFilter.type === 'dept' && chartFilter.value === label
            ? null
            : { type: 'dept', value: label };
        }
        renderDeals();
      }
    }),
    plugins: [makeTargetTickPlugin_('targetTicks', targets)]
  });
}

function renderDeals() {
  var area = document.getElementById('dealArea');
  if (!area) return;
  renderFilterChip_();

  var deals = collectDeals_();
  if (!deals.length) {
    area.innerHTML = '<div class="no-deals">Key Deal はありません</div>';
    return;
  }

  if (dealSortKey) {
    deals.sort(function(left, right) {
      var a = left[dealSortKey];
      var b = right[dealSortKey];
      if (typeof a === 'string') a = a.toLowerCase();
      if (typeof b === 'string') b = b.toLowerCase();
      if (a < b) return dealSortAsc ? -1 : 1;
      if (a > b) return dealSortAsc ? 1 : -1;
      return 0;
    });
  }

  var html = '<div class="deal-scroll"><table class="deal-table"><thead><tr>' +
    sortTh_('dept', '部署') +
    sortTh_('company', '会社名') +
    sortTh_('mrr', 'MRR') +
    sortTh_('phase', 'フェーズ') +
    sortTh_('yomi', 'ヨミ') +
    '</tr></thead><tbody>';

  deals.forEach(function(deal) {
    var rowClass = deal.mrr > 0 ? 'pos' : (deal.mrr < 0 ? 'neg' : '');
    html += '<tr class="' + rowClass + '">' +
      '<td>' + escapeHtml_(deal.dept) + '</td>' +
      '<td>' + escapeHtml_(deal.company) + '</td>' +
      '<td class="' + valClass_(deal.mrr) + '">' + escapeHtml_(fmt(deal.mrr)) + '</td>' +
      '<td>' + escapeHtml_(deal.phase) + '</td>' +
      '<td class="' + valClass_(deal.yomi) + '">' + escapeHtml_(fmt(deal.yomi)) + '</td>' +
      '</tr>';
  });
  html += '</tbody></table></div>';
  area.innerHTML = html;
}

function collectDeals_() {
  if (!D || !D.weeks.length) return [];
  var deals = [];
  var week = currentView === 'weekly'
    ? ((chartFilter && chartFilter.type === 'week' && chartFilter.value) || D.weeks[D.weeks.length - 1])
    : getSelectedWeek_();
  var depts = [];

  if (currentView === 'weekly') {
    var selectedDept = getSelectedDept_();
    depts = selectedDept === ALL_DEPTS_LABEL ? D.depts.slice() : [selectedDept];
  } else {
    depts = chartFilter && chartFilter.type === 'dept' && chartFilter.value
      ? [chartFilter.value]
      : D.depts.slice();
  }

  depts.forEach(function(dept) {
    parseDeals(getDeptData(week, dept).keyDeal).forEach(function(deal) {
      deals.push({
        dept: dept,
        company: deal.company,
        mrr: deal.mrr,
        phase: deal.phase,
        yomi: deal.yomi
      });
    });
  });

  return deals;
}

function renderFilterChip_() {
  var chip = document.getElementById('filterChip');
  if (!chip) return;
  if (!chartFilter) {
    chip.innerHTML = '';
    return;
  }
  chip.innerHTML =
    '<span class="filter-chip-badge">' +
      'フィルタ中: ' + escapeHtml_(chartFilter.value) +
      '<button type="button" class="filter-chip-clear" onclick="clearChartFilter_()" aria-label="フィルタ解除">×</button>' +
    '</span>';
}

function clearChartFilter_() {
  chartFilter = null;
  renderDeals();
}

function sortTh_(key, label) {
  var indicator = '';
  if (dealSortKey === key) indicator = dealSortAsc ? ' ▲' : ' ▼';
  return '<th class="sortable" onclick="setSortKey(\'' + key + '\')">' + escapeHtml_(label + indicator) + '</th>';
}

function setSortKey(key) {
  if (dealSortKey === key) {
    dealSortAsc = !dealSortAsc;
  } else {
    dealSortKey = key;
    dealSortAsc = true;
  }
  renderDeals();
}

function escapeHtml_(value) {
  return String(value === null || value === undefined ? '' : value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

bootstrap_();
