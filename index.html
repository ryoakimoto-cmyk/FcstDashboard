<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FCST Dashboard - BOAM</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<?!= include('css') ?>
</head>
<body>
<header class="app-header">
  <div class="header-top">
    <div class="header-logo">Sansan <span>FCST</span></div>
    <div class="header-right">
      <span class="update-badge">更新: 毎日 03:00</span>
      <span class="edit-badge hidden" id="edit-badge" onclick="App.scrollToSaveBar()">変更済み <span id="edit-count">0</span> 件</span>
      <span>Owner: Ryo</span>
    </div>
  </div>
  <nav class="tab-bar">
    <div class="tab active" data-view="fcst" onclick="App.switchView('fcst')">FCST</div>
    <div class="tab" data-view="trend" onclick="App.switchView('trend')">推移グラフ</div>
    <div class="tab" data-view="opps" onclick="App.switchView('opps')">案件リスト</div>
  </nav>
</header>

<div id="loading-overlay" class="loading-overlay hidden">
  <div class="spinner"></div>
  <div class="loading-text">Loading...</div>
</div>

<div class="main" id="main-content">
  <div id="view-fcst" class="view active">
    <div id="fcst-content"></div>
  </div>

  <div id="view-trend" class="view">
    <div class="trend-controls">
      <label>対象月</label>
      <select id="trend-block-select" onchange="App.renderTrend()">
        <option value="Q">Q合計</option>
        <option value="M5">5月</option>
        <option value="M6">6月</option>
        <option value="M7">7月</option>
      </select>
      <label style="margin-left:8px;">系列</label>
      <span class="chip active" data-series="fcstAdjusted" onclick="App.toggleSeries(this)">FCST(調整後)</span>
      <span class="chip active" data-series="fcstCommit" onclick="App.toggleSeries(this)">FCST(コミット)</span>
      <span class="chip active" data-series="target" onclick="App.toggleSeries(this)">目標</span>
      <span class="chip active" data-series="received" onclick="App.toggleSeries(this)">受注</span>
    </div>
    <div class="chart-card">
      <div class="chart-title" id="trend-title">Q合計 推移 (Net MRR)</div>
      <div class="chart-wrap"><canvas id="trend-chart"></canvas></div>
    </div>
    <div class="section-title">直近サマリ <span class="period-badge" id="trend-period-badge">Q合計</span></div>
    <div class="trend-stats" id="trend-stats"></div>
  </div>

  <div id="view-opps" class="view">
    <div class="dept-controls" style="flex-wrap:wrap;gap:10px;">
      <label>部署:</label>
      <select id="opp-dept-select" onchange="App.renderOpps()">
        <option value="all">すべて</option>
      </select>
      <label style="margin-left:8px;">フェーズ:</label>
      <select id="opp-phase-select" onchange="App.renderOpps()">
        <option value="all">すべて</option>
      </select>
      <label style="margin-left:8px;">種類:</label>
      <select id="opp-type-select" onchange="App.renderOpps()">
        <option value="all">すべて</option>
      </select>
      <span style="margin-left:auto;font-size:12px;color:var(--color-text-sub);" id="opp-count"></span>
    </div>
    <div class="table-wrapper opp-table-wrap">
      <table id="opp-table">
        <thead>
          <tr>
            <th style="text-align:left;">案件名</th>
            <th style="text-align:left;">対予定月</th>
            <th style="text-align:left;">事業部等</th>
            <th style="text-align:left;">種類</th>
            <th style="text-align:left;">フェーズ</th>
            <th style="text-align:left;">Forecast</th>
            <th>MRR</th>
            <th>FCST(Commit)</th>
            <th>FCST(Min)</th>
            <th>FCST(Max)</th>
            <th>受注</th>
            <th>債務管理</th>
            <th>債務管理Lite</th>
            <th>費用</th>
            <th style="text-align:left;">コメント</th>
          </tr>
        </thead>
        <tbody id="opp-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="save-bar" id="save-bar">
  <span>変更済み <span id="save-bar-count">0</span> 件</span>
  <button class="save-bar-btn primary" onclick="App.clearEditedHighlights()">ハイライトをクリア</button>
</div>

<?!= include('js') ?>
</body>
</html>
