<script>
const App = {
  state: {
    activeView: 'fcst',          // 'fcst' | 'trend' | 'opps'
    selectedPeriod: 'Q',         // 'Q' | 'M5' | 'M6' | 'M7'
    selectedGroup: '\u90e8\u5168\u4f53',      // '\u90e8\u5168\u4f53' | \u30b0\u30eb\u30fc\u30d7\u540d
    visibleSeries: { fcstAdjusted: true, fcstCommit: true, target: true, received: true },
    expandedMetrics: { fcstAdjusted: false, fcstCommit: false, confirmed: false, expectedMrr: false, received: false, debtMgmt: false, debtMgmtLite: false, expense: false },
    expandedAll: { keyDeals: false },
    expandedNoteKeys: {},
    trendChart: null,
    editedPaths: new Set(),
    loading: false,
    lastUpdated: '',
    currentData: null,
    fcstAdjusted: {},
    diffToggles: {},
    wowMap: {},
    snapshotDates: [],
    snapshotDate: null,
    snapshotViewData: null,
    opps: [],
    oppsLastUpdated: '',
    oppSnapshotDates: [],
    oppSnapshotDate: null,
    oppSnapshotRows: null,
    detailModal: null,
  },

  init() {
    App.showLoading(true);
    google.script.run
      .withSuccessHandler(function(result) {
        App.showLoading(false);
        if (result.error) {
          document.getElementById('fcst-content').innerHTML = '<p style="padding:24px;color:red">\u30b5\u30fc\u30d0\u30fc\u30a8\u30e9\u30fc: ' + escapeHtml(String(result.error)) + '</p>';
          return;
        }
        App.state.lastUpdated = (result.data && result.data.lastUpdated) || '';
        App.state.currentData = result.data;
        App.state.fcstAdjusted = (result.data && result.data.fcstAdjusted) || {};
        var prevMembers = (result.data && result.data.previousSnapshot && result.data.previousSnapshot.members) || [];
        App.state.wowMap = computeWowMap_((result.data && result.data.members) || [], prevMembers);
        App.state.snapshotDates = (result.data && result.data.snapshotDates) || [];
        try { App.renderAll(); } catch (e) {
          document.getElementById('fcst-content').innerHTML = '<p style="padding:24px;color:red">renderAll\u30a8\u30e9\u30fc: ' + escapeHtml(e.message || String(e)) + '</p>';
        }
      })
      .withFailureHandler(function(err) {
        App.showLoading(false);
        document.getElementById('fcst-content').innerHTML = '<p style="padding:24px;color:red">GAS\u547c\u3073\u51fa\u3057\u30a8\u30e9\u30fc: ' + escapeHtml((err && err.message) || String(err)) + '</p>';
      })
      .getInitData();
  },

  renderAll() {
    this.renderFcst();
    if (this.state.activeView === 'trend') this.renderTrend();
    if (this.state.activeView === 'opps') this.renderOpps();
    this.updateEditBadge();
  },

  switchView(view) {
    this.state.activeView = view;
    document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('active'); });
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.toggle('active', t.dataset.view === view); });
    document.getElementById('view-' + view).classList.add('active');

    if (view === 'opps' && App.state.opps.length === 0) {
      App.reloadOpps();
      return;
    }

    if (view === 'fcst') this.renderFcst();
    if (view === 'trend') this.renderTrend();
    if (view === 'opps') this.renderOpps();
  },

  selectPeriod(period) {
    this.state.selectedPeriod = period;
    this.renderFcst();
  },

  selectGroup(groupName) {
    this.state.selectedGroup = groupName;
    this.renderFcst();
  },

  renderFcst() {
    var currentData = this.state.currentData;
    if (!currentData || !Array.isArray(currentData.members)) {
      document.getElementById('fcst-content').innerHTML = '<p style="padding:24px;color:var(--color-text-sub)">\u8aad\u307f\u8fbc\u307f\u4e2d...</p>';
      return;
    }
    var viewData = App.state.snapshotDate && App.state.snapshotViewData
      ? App.state.snapshotViewData
      : (App.state.currentData || {});
    var period = this.state.selectedPeriod;
    var members = viewData.members || [];
    var notes = viewData.notes || (App.state.currentData && App.state.currentData.notes) || {};
    var fcstAdjForView = App.state.snapshotDate && App.state.snapshotViewData
      ? (App.state.snapshotViewData.fcstAdjusted || {})
      : App.state.fcstAdjusted;
    var wowForView = App.state.snapshotDate && App.state.snapshotViewData
      ? (App.state.snapshotViewData.weekOverWeekMap || {})
      : App.state.wowMap;

    var overallTotal = members.find(function(m) { return m && m.isTotal && m.group === 'BOAM'; }) || null;
    var groupTotals = members.filter(function(m) { return m && m.isTotal && m.group !== 'BOAM'; });
    var individuals = members.filter(function(m) { return m && !m.isTotal; });

    var membersByGroup = {};
    individuals.forEach(function(m) {
      var g = m.group || '';
      if (!membersByGroup[g]) membersByGroup[g] = [];
      membersByGroup[g].push(m);
    });

    var groupNames = groupTotals.map(function(m) { return m.group; }).filter(Boolean);
    var selectedGroup = this.state.selectedGroup;
    if (selectedGroup !== '\u90e8\u5168\u4f53' && groupNames.indexOf(selectedGroup) === -1) {
      this.state.selectedGroup = '\u90e8\u5168\u4f53';
      selectedGroup = '\u90e8\u5168\u4f53';
    }

    var breakdownCols = [
      { key: 'target', label: '\u76ee\u6a19', className: 'metric-target', noToggle: true, isTarget: true },
      { key: 'fcstAdjusted', label: 'FCST(\u8abf\u6574\u5f8c)', className: 'metric-fcst-adjusted', editable: true },
      { key: 'fcstCommit', label: 'FCST(\u30b3\u30df\u30c3\u30c8)', className: 'metric-fcst-commit' },
      { key: 'confirmed', label: '\u78ba\u5b9a', className: 'metric-confirmed' },
      { key: 'expectedMrr', label: '\u671f\u5f85MRR', className: 'metric-expected' },
      { key: 'received', label: '\u53d7\u9818', className: 'metric-received' },
      { key: 'debtMgmt', label: '\u50b5\u52d9\u7ba1\u7406', className: 'metric-debt' },
      { key: 'debtMgmtLite', label: '\u50b5\u52d9\u7ba1\u7406Lite', className: 'metric-debt-lite' },
      { key: 'expense', label: '\u7d4c\u8cbb', className: 'metric-expense' },
    ];

    var html = '<div class="snap-nav-inline"><span>\u6700\u7d42\u66f4\u65b0: ' + escapeHtml(this.state.lastUpdated || '') + '</span></div>';
    var isLive = !App.state.snapshotDate;
    var dates = App.state.snapshotDates;
    var curDateLabel = isLive ? '\u4eca\u9031' : App.state.snapshotDate;
    var canGoPrev = isLive ? (dates.length > 0) : true;
    var canGoNext = !isLive;
    html += '<div class="week-nav-bar">';
    html += '<button class="week-nav-btn" ' + (canGoPrev ? '' : 'disabled') + ' onclick="App.weekNavPrev()">\u25c4</button>';
    html += '<span class="week-nav-label' + (isLive ? ' week-nav-live' : '') + '">' + escapeHtml(curDateLabel) + '</span>';
    html += '<button class="week-nav-btn" ' + (canGoNext ? '' : 'disabled') + ' onclick="App.weekNavNext()">\u25ba</button>';
    if (!isLive) html += '<button class="week-nav-btn week-nav-today" onclick="App.weekNavToday()">\u4eca\u9031</button>';
    html += '</div>';
    html += '<div class="period-chips">';
    ['Q', 'M5', 'M6', 'M7'].forEach(function(p) {
      html += '<span class="chip' + (period === p ? ' active' : '') + '" onclick="App.selectPeriod(\'' + p + '\')">' + blockLabel(p) + '</span>';
    });
    html += '</div>';
    html += '<div class="group-chips">';
    html += '<span class="chip' + (selectedGroup === '\u90e8\u5168\u4f53' ? ' active' : '') + '" onclick="App.selectGroup(\'\\u90e8\\u5168\\u4f53\')">\u90e8\u5168\u4f53</span>';
    groupNames.forEach(function(gn) {
      html += '<span class="chip' + (selectedGroup === gn ? ' active' : '') + '" onclick="App.selectGroup(\'' + escapeAttr(gn) + '\')">' + escapeHtml(gn) + '</span>';
    });
    html += '</div>';

    var displayRows = [];
    if (selectedGroup === '\u90e8\u5168\u4f53') {
      if (overallTotal) displayRows.push(overallTotal);
      groupTotals.forEach(function(groupTotal) { displayRows.push(groupTotal); });
    } else {
      var gt = groupTotals.find(function(m) { return m.group === selectedGroup; });
      if (gt) displayRows.push(gt);
      (membersByGroup[selectedGroup] || []).forEach(function(m) { displayRows.push(m); });
    }

    var isGlobalView = selectedGroup === '\u90e8\u5168\u4f53';
    html += App.renderFcstTable_(displayRows, period, notes, breakdownCols, isGlobalView, fcstAdjForView, wowForView);
    document.getElementById('fcst-content').innerHTML = html;
  },

  renderFcstTable_(displayRows, period, notes, breakdownCols, isGlobalView, fcstAdjMap, weekOverWeekMap) {
    var fcstAdj = fcstAdjMap || {};
    var wowMap = weekOverWeekMap || {};
    var isSnapshotMode = !!App.state.snapshotDate;
    var keyDealsExpanded = !!App.state.expandedAll.keyDeals;
    var html = '<div class="expand-all-bar">';
    var notesExpanded = false;
    html += '<button class="expand-all-btn' + (keyDealsExpanded ? ' active' : '') + '" onclick="App.toggleExpandAll(\'keyDeals\')">Key Deal 常に展開</button>';
    html += '<button class="expand-all-btn' + (notesExpanded ? ' active' : '') + '" onclick="App.toggleExpandAll(\'notes\')">備考・メモ 常に展開</button>';
    html += '</div>';
    html = html.replace(/<button class="expand-all-btn[^"]*" onclick="App\.toggleExpandAll\('notes'\)">[\s\S]*?<\/button>/, '');
    html += '<div class="table-wrapper fcst-table-wrap"><table><thead>';
    html += '<tr>';
    html += '<th rowspan="2" class="col-group col-group-start th-person">\u62c5\u5f53\u8005</th>';
    breakdownCols.forEach(function(col) {
      var expanded = !!App.state.expandedMetrics[col.key];
      var btnLabel = expanded ? '\u2212' : '\uff0b';
      html += '<th colspan="' + (expanded ? '3' : '1') + '" class="col-group col-group-start ' + col.className + '">';
      html += escapeHtml(col.label) + '<button class="col-expand-btn" onclick="App.toggleMetricDetails(\'' + col.key + '\')">' + btnLabel + '</button>';
      html += '</th>';
    });
    html += '<th rowspan="2" class="col-group col-group-start th-keydeal keydeal-col">Key Deal</th>';
    html += '<th rowspan="2" class="col-group col-group-start th-notes notes-col">\u5099\u8003\u30fb\u30e1\u30e2</th>';
    html += '</tr>';
    html += '<tr>';
    breakdownCols.forEach(function(col) {
      var expanded = !!App.state.expandedMetrics[col.key];
      var colDiff = App.state.diffToggles[col.key] || {};
      html += '<th class="sub-header sub-header-net col-group-start">Net';
      if (!col.noToggle) {
        var netD = colDiff.net || {};
        html += '<button class="diff-toggle-btn' + (netD.wow ? ' active' : '') + '" onclick="App.toggleDiff(\'' + col.key + '\', \'net\', \'wow\')">\u5148\u9031\u6bd4</button>';
        html += '<button class="diff-toggle-btn' + (netD.target ? ' active' : '') + '" onclick="App.toggleDiff(\'' + col.key + '\', \'net\', \'target\')">\u76ee\u6a19\u5dee</button>';
      }
      html += '</th>';
      if (expanded) {
        var newExpD = colDiff.newExp || {};
        var churnD = colDiff.churn || {};
        html += '<th class="sub-header sub-header-plus">New+Exp';
        if (!col.noToggle) {
          html += '<button class="diff-toggle-btn' + (newExpD.wow ? ' active' : '') + '" onclick="App.toggleDiff(\'' + col.key + '\', \'newExp\', \'wow\')">\u5148\u9031\u6bd4</button>';
          html += '<button class="diff-toggle-btn' + (newExpD.target ? ' active' : '') + '" onclick="App.toggleDiff(\'' + col.key + '\', \'newExp\', \'target\')">\u76ee\u6a19\u5dee</button>';
        }
        html += '</th>';
        html += '<th class="sub-header sub-header-minus">Churn';
        if (!col.noToggle) {
          html += '<button class="diff-toggle-btn' + (churnD.wow ? ' active' : '') + '" onclick="App.toggleDiff(\'' + col.key + '\', \'churn\', \'wow\')">\u5148\u9031\u6bd4</button>';
          html += '<button class="diff-toggle-btn' + (churnD.target ? ' active' : '') + '" onclick="App.toggleDiff(\'' + col.key + '\', \'churn\', \'target\')">\u76ee\u6a19\u5dee</button>';
        }
        html += '</th>';
      }
    });
    html += '</tr>';
    html += '</thead><tbody>';

    displayRows.forEach(function(member) {
      var rd = member && member[period] ? member[period] : {};
      var memberKey = member.name + '|' + period;
      rd.fcstAdjusted = fcstAdj[memberKey] || { net: 0, newExp: 0, churn: 0 };
      var noteKey = member.name + '|' + period;
      var noteVal = notes[noteKey] || '';
      var isTotal = member.isTotal;
      var isOverallTotal = isTotal && member.group === 'BOAM';
      var rowClass = isOverallTotal ? ' class="overall-total-row"' : (isTotal && !isGlobalView ? ' class="total-row"' : '');
      html += '<tr' + rowClass + '>';
      html += '<td class="td-person">' + (isTotal ? '' : '\u3000') + escapeHtml(displayMemberName(member)) + '</td>';
      breakdownCols.forEach(function(col) {
        var b;
        if (col.isTarget) {
          var netVal = typeof rd.target === 'number' ? rd.target : (rd.target || 0);
          b = { net: netVal, newExp: 0, churn: 0 };
        } else {
          b = rd[col.key] || { net: 0, newExp: 0, churn: 0 };
        }
        var expanded = !!App.state.expandedMetrics[col.key];
        var colDiff = App.state.diffToggles[col.key] || {};
        var netD = colDiff.net || {};
        var newExpD = colDiff.newExp || {};
        var churnD = colDiff.churn || {};
        var wowEntry = (weekOverWeekMap && weekOverWeekMap[memberKey] && weekOverWeekMap[memberKey][col.key])
          ? weekOverWeekMap[memberKey][col.key]
          : { net: 0, newExp: 0, churn: 0 };
        var targetBreakdown = (typeof rd.target === 'object' && rd.target !== null)
          ? rd.target
          : { net: (rd.target || 0), newExp: 0, churn: 0 };
        var targetDiffNet = (b.net || 0) - targetBreakdown.net;
        var targetDiffNewExp = (b.newExp || 0) - targetBreakdown.newExp;
        var targetDiffChurn = (b.churn || 0) - targetBreakdown.churn;

        if (col.editable && !col.isTarget) {
          var adjCell = isSnapshotMode
            ? '<span class="' + valClassNum(b.net) + '">' + fmtNum(b.net) + '</span>'
            : App.renderFcstAdjCell_(member.name, period, 'net', b.net);
          var adjNetBadges = '';
          if (!col.noToggle && !isSnapshotMode && netD.wow) {
            adjNetBadges += '<span class="diff-badge ' + diffBadgeClass_(wowEntry.net) + '">' + fmtDiffNum(wowEntry.net) + '</span>';
          }
          html += '<td class="col-group-start">' + adjCell + adjNetBadges + '</td>';
        } else {
          var netVal = typeof b === 'number' ? b : (b.net || 0);
          var netBadges = '';
          if (!col.noToggle) {
            if (netD.wow) {
              netBadges += '<span class="diff-badge ' + diffBadgeClass_(wowEntry.net) + '">' + fmtDiffNum(wowEntry.net) + '</span>';
            }
            if (netD.target) {
              netBadges += '<span class="diff-badge ' + diffBadgeClass_(targetDiffNet) + '">' + fmtDiffNum(targetDiffNet) + '</span>';
            }
          }
          html += '<td class="col-group-start"><span class="' + valClassNum(netVal) + '">' + fmtNum(netVal) + '</span>' + netBadges + '</td>';
        }
        if (expanded) {
          if (col.editable && !isSnapshotMode) {
            var adjNewExpBadge = '';
            if (!col.noToggle) {
              if (newExpD.wow) {
                adjNewExpBadge += '<span class="diff-badge ' + diffBadgeClass_(wowEntry.newExp) + '">' + fmtDiffNum(wowEntry.newExp) + '</span>';
              }
              if (newExpD.target) {
                adjNewExpBadge += '<span class="diff-badge ' + diffBadgeClass_(targetDiffNewExp) + '">' + fmtDiffNum(targetDiffNewExp) + '</span>';
              }
            }
            html += '<td>' + App.renderFcstAdjCell_(member.name, period, 'newExp', b.newExp) + adjNewExpBadge + '</td>';

            var adjChurnBadge = '';
            if (!col.noToggle) {
              if (churnD.wow) {
                adjChurnBadge += '<span class="diff-badge ' + diffBadgeClass_(wowEntry.churn) + '">' + fmtDiffNum(wowEntry.churn) + '</span>';
              }
              if (churnD.target) {
                adjChurnBadge += '<span class="diff-badge ' + diffBadgeClass_(targetDiffChurn) + '">' + fmtDiffNum(targetDiffChurn) + '</span>';
              }
            }
            html += '<td>' + App.renderFcstAdjCell_(member.name, period, 'churn', b.churn) + adjChurnBadge + '</td>';
          } else {
            var newExpBadge = '';
            if (!col.noToggle) {
              if (newExpD.wow) {
                newExpBadge += '<span class="diff-badge ' + diffBadgeClass_(wowEntry.newExp) + '">' + fmtDiffNum(wowEntry.newExp) + '</span>';
              }
              if (newExpD.target) {
                newExpBadge += '<span class="diff-badge ' + diffBadgeClass_(targetDiffNewExp) + '">' + fmtDiffNum(targetDiffNewExp) + '</span>';
              }
            }
            html += '<td><span class="val-positive">' + fmtNum(b.newExp) + '</span>' + newExpBadge + '</td>';

            var churnBadge = '';
            if (!col.noToggle) {
              if (churnD.wow) {
                churnBadge += '<span class="diff-badge ' + diffBadgeClass_(wowEntry.churn) + '">' + fmtDiffNum(wowEntry.churn) + '</span>';
              }
              if (churnD.target) {
                churnBadge += '<span class="diff-badge ' + diffBadgeClass_(targetDiffChurn) + '">' + fmtDiffNum(targetDiffChurn) + '</span>';
              }
            }
            html += '<td><span class="val-negative">' + fmtNum(b.churn) + '</span>' + churnBadge + '</td>';
          }
        }
      });
      var kdText = (rd.keyDeals || []).map(function(kd) {
        return escapeHtml(kd.company + ' ' + fmtMan(kd.monthlyMrr) + '/' + kd.phase + '/' + fmtMan(kd.fcst));
      }).join('<br>');
      html += '<td class="td-keydeal">' + App.renderKeyDealCell_(member, period, rd.keyDeals || [], kdText) + '</td>';
      html += '<td class="td-notes">' + App.renderNoteCell_(member, period, noteVal) + '</td>';
      html += '</tr>';
    });

    html += '</tbody></table></div>';
    return html;
  },

  toggleMetricDetails(metricKey) {
    this.state.expandedMetrics[metricKey] = !this.state.expandedMetrics[metricKey];
    this.renderFcst();
  },

  toggleExpandAll(key) {
    this.state.expandedAll[key] = !this.state.expandedAll[key];
    this.renderFcst();
  },

  toggleDiff(metricKey, subCol, type) {
    if (!App.state.diffToggles[metricKey]) App.state.diffToggles[metricKey] = {};
    if (!App.state.diffToggles[metricKey][subCol]) App.state.diffToggles[metricKey][subCol] = {};
    App.state.diffToggles[metricKey][subCol][type] = !App.state.diffToggles[metricKey][subCol][type];
    App.renderFcst();
  },

  toggleNoteExpand(name, period) {
    var key = name + '|' + period;
    if (App.state.expandedNoteKeys[key]) {
      delete App.state.expandedNoteKeys[key];
    } else {
      App.state.expandedNoteKeys[key] = true;
    }
    App.renderFcst();
  },

  weekNavPrev() {
    var dates = App.state.snapshotDates;
    if (!dates.length) return;
    if (!App.state.snapshotDate) {
      App.loadSnapshotByDate_(dates[0]);
    } else {
      var idx = dates.indexOf(App.state.snapshotDate);
      if (idx < dates.length - 1) App.loadSnapshotByDate_(dates[idx + 1]);
    }
  },

  weekNavNext() {
    var dates = App.state.snapshotDates;
    if (!App.state.snapshotDate) return;
    var idx = dates.indexOf(App.state.snapshotDate);
    if (idx > 0) {
      App.loadSnapshotByDate_(dates[idx - 1]);
    } else {
      App.weekNavToday();
    }
  },

  weekNavToday() {
    App.state.snapshotDate = null;
    App.state.snapshotViewData = null;
    App.renderFcst();
  },

  loadSnapshotByDate_(dateStr) {
    if (App.state.snapshotViewData && App.state.snapshotViewData.date === dateStr) {
      App.state.snapshotDate = dateStr;
      App.renderFcst();
      return;
    }
    App.showLoading(true);
    google.script.run
      .withSuccessHandler(function(result) {
        App.showLoading(false);
        if (result.error) { alert('\u8aad\u307f\u8fbc\u307f\u30a8\u30e9\u30fc: ' + result.error); return; }
        App.state.snapshotDate = dateStr;
        App.state.snapshotViewData = result;
        App.renderFcst();
      })
      .withFailureHandler(function(e) {
        App.showLoading(false);
        alert('\u30a8\u30e9\u30fc: ' + ((e && e.message) || e));
      })
      .getSnapshotData(dateStr);
  },

  renderFcstAdjCell_(name, period, field, value) {
    var displayVal = (value === 0 || value === null || value === undefined) ? '\u672a\u5165\u529b' : fmtNum(value);
    return '<span class="fcst-adj-cell ' + valClassNum(value) + '" ' +
      'data-name="' + escapeAttr(name) + '" ' +
      'data-period="' + escapeAttr(period) + '" ' +
      'data-field="' + field + '" ' +
      'data-val="' + (Number(value) || 0) + '" ' +
      'onclick="App.activateFcstAdjInput(this)">' +
      displayVal + '</span>';
  },

  activateFcstAdjInput(el) {
    var name = el.dataset.name;
    var period = el.dataset.period;
    var field = el.dataset.field;
    var val = Number(el.dataset.val) || 0;
    var input = document.createElement('input');
    input.type = 'number';
    input.className = 'edit-input fcst-adj-input';
    input.value = val === 0 ? '' : val;
    input.style.width = '80px';
    el.replaceWith(input);
    input.focus();
    input.select();
    var committed = false;
    var commit = function() {
      if (committed) return;
      committed = true;
      var newVal = input.value === '' ? 0 : (Number(input.value) || 0);
      App.commitFcstAdj(name, period, field, newVal);
    };
    input.addEventListener('blur', commit);
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        input.removeEventListener('blur', commit);
        commit();
      }
      if (e.key === 'Escape') {
        committed = true;
        App.renderFcst();
      }
    });
  },

  commitFcstAdj(name, period, field, newVal) {
    var key = name + '|' + period;
    var adj = Object.assign({ net: 0, newExp: 0, churn: 0 }, App.state.fcstAdjusted[key] || {});
    if (field === 'net') {
      adj.net = newVal;
      adj.newExp = 0;
      adj.churn = 0;
    } else {
      adj[field] = newVal;
      adj.net = (Number(adj.newExp) || 0) + (Number(adj.churn) || 0);
    }
    App.state.fcstAdjusted[key] = adj;
    App.renderFcst();
    google.script.run
      .withSuccessHandler(function(r) { if (r && r.error) alert('\u4fdd\u5b58\u5931\u6557: ' + r.error); })

  renderTrendWithData(data) {
    const vis = this.state.visibleSeries;
    const datasets = [
      { key: 'target', label: '目標', color: '#dadce0', dash: [6, 3] },
      { key: 'fcstAdjusted', label: 'FCST(調整後)', color: '#1a73e8', dash: [] },
      { key: 'fcstCommit', label: 'FCST(コミット)', color: '#7c4dff', dash: [4, 2] },
      { key: 'received', label: '受注', color: '#34a853', dash: [] },
    ].filter(function(item) { return vis[item.key]; }).map(function(item) {
      return {
        label: item.label,
        data: data.series[item.key] || [],
        borderColor: item.color,
        backgroundColor: item.color + '18',
        borderWidth: item.key === 'target' ? 1.5 : 2,
        borderDash: item.dash,
        pointRadius: 4,
        pointHoverRadius: 6,
        tension: 0.3,
        fill: false,
      };
    });

    if (this.state.trendChart) this.state.trendChart.destroy();
    const ctx = document.getElementById('trend-chart').getContext('2d');
    this.state.trendChart = new Chart(ctx, {
      type: 'line',
      data: { labels: data.weeks || [], datasets: datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: true, position: 'top', labels: { font: { size: 12 }, padding: 16, usePointStyle: true } },
          tooltip: {
            backgroundColor: 'rgba(32,33,36,0.9)',
            padding: 12,
            callbacks: { label: function(ctx) { return ' ' + ctx.dataset.label + ': ' + fmtNum(ctx.parsed.y); } }
          }
        },
        scales: {
          x: { grid: { color: '#f1f3f4' }, ticks: { font: { size: 12 } } },
          y: { grid: { color: '#f1f3f4' }, ticks: { font: { size: 12 }, callback: function(v) { return fmtNum(v); } } }
        }
      }
    });

    const latest = lastValue(data.series.fcstAdjusted);
    const prev = prevValue(data.series.fcstAdjusted);
    const target = lastValue(data.series.target);
    const diff = latest - prev;
    const statsHtml = [
      { lbl: 'FCST(調整後) Net', val: fmtNum(latest), cls: 'val-neutral' },
      { lbl: '前週比 Net', val: fmtDiffNum(diff), cls: diff >= 0 ? 'val-positive' : 'val-negative' },
      { lbl: '目標達成率', val: target ? Math.round(latest / target * 100) + '%' : '-', cls: latest >= target ? 'val-positive' : 'val-negative' },
    ].map(function(stat) {
      return '<div class="trend-stat"><div class="ts-label">' + stat.lbl + '</div><div class="ts-val ' + stat.cls + '">' + stat.val + '</div></div>';
    }).join('');
    document.getElementById('trend-stats').innerHTML = statsHtml;
  },

  startEditFromEl(el) {
    const meta = JSON.parse(el.dataset.meta);
    const original = meta.type === 'oppComment' ? String(el.dataset.val || '') : Number(el.dataset.val);
    const input = document.createElement('input');
    input.type = meta.type === 'oppComment' ? 'text' : 'number';
    input.className = 'edit-input';
    input.value = original;
    el.replaceWith(input);
    input.focus();
    input.select();

    const commit = () => {
      const newValue = meta.type === 'oppComment' ? String(input.value || '') : Number(input.value);
      if (meta.type !== 'oppComment' && isNaN(newValue)) {
        this.renderAll();
        return;
      }
      this.commitEdit(meta, newValue, original);
    };

    input.addEventListener('blur', commit);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') input.blur();
      if (e.key === 'Escape') {
        input.removeEventListener('blur', commit);
        this.renderAll();
      }
    });
  },

  commitEdit(meta, newValue, originalValue) {
    const key = editKey(meta);

    if (meta.type === 'oppDraft') {
      const opp = this.findOpp_(meta.oppId);
      if (opp) {
        opp[meta.field].draftValue = newValue;
        this.syncOppEditedState_(opp, key, newValue, opp._base[meta.field]);
      }
    }

    if (meta.type === 'oppComment') {
      const opp = this.findOpp_(meta.oppId);
      if (opp) {
        opp.fcstComment = newValue;
        this.syncOppEditedState_(opp, key, newValue, opp._base.fcstComment);
      }
    }

    this.updateEditBadge();
    this.renderAll();
  },

  toggleOppKeyDeal(oppId, checked) {
    var opp = this.findOpp_(oppId);
    if (!opp) return;
    opp.keyDeal = !!checked;
    this.syncOppEditedState_(opp, editKey({ type: 'oppKeyDeal', oppId: oppId }), opp.keyDeal, opp._base.keyDeal);
    this.updateEditBadge();
  },

  findOpp_(oppId) {
    return this.state.opps.find(function(item) { return item.oppId === oppId; });
  },

  extractOppBase_(opp) {
    return {
      keyDeal: !!opp.keyDeal,
      fcstCommit: safeNum(opp.fcstCommit && opp.fcstCommit.draftValue),
      fcstMin: safeNum(opp.fcstMin && opp.fcstMin.draftValue),
      fcstMax: safeNum(opp.fcstMax && opp.fcstMax.draftValue),
      received: safeNum(opp.received && opp.received.draftValue),
      debtMgmt: safeNum(opp.debtMgmt && opp.debtMgmt.draftValue),
      debtMgmtLite: safeNum(opp.debtMgmtLite && opp.debtMgmtLite.draftValue),
      expense: safeNum(opp.expense && opp.expense.draftValue),
      fcstComment: String(opp.fcstComment || '')
    };
  },

  syncOppEditedState_(opp, key, value, baseValue) {
    if (String(value) !== String(baseValue)) this.state.editedPaths.add(key);
    else this.state.editedPaths.delete(key);
  },

  updateEditBadge() {
    const n = this.state.editedPaths.size;
    document.getElementById('edit-count').textContent = n;
    document.getElementById('save-bar-count').textContent = n;
    document.getElementById('edit-badge').classList.toggle('hidden', n === 0);
    document.getElementById('save-bar').classList.toggle('show', n > 0);
  },

  clearEditedHighlights() {
    if (this.state.activeView === 'opps') {
      this.reloadOpps();
      return;
    }
    this.state.editedPaths.clear();
    this.updateEditBadge();
    this.renderAll();
  },

  saveOppDrafts() {
    if (!this.state.editedPaths.size) return;

    var changes = this.state.opps.reduce(function(list, opp) {
      if (!opp || !opp._base) return list;
      var fields = {};
      ['fcstCommit', 'fcstMin', 'fcstMax', 'received', 'debtMgmt', 'debtMgmtLite', 'expense'].forEach(function(field) {
        var current = safeNum(opp[field] && opp[field].draftValue);
        if (String(current) !== String(opp._base[field])) fields[field] = current;
      });
      if (String(opp.fcstComment || '') !== String(opp._base.fcstComment || '')) fields.comment = String(opp.fcstComment || '');

      var keyDealChanged = !!opp.keyDeal !== !!opp._base.keyDeal;
      if (!keyDealChanged && !Object.keys(fields).length) return list;

      list.push({
        oppId: opp.oppId,
        keyDeal: !!opp.keyDeal,
        proposalProductIds: opp.proposalProductIds || {},
        fields: fields
      });
      return list;
    }, []);

    if (!changes.length) return;

    App.showLoading(true);
    google.script.run
      .withSuccessHandler(function(result) {
        App.showLoading(false);
        if (result && result.error) {
          App.showError(result.error);
          return;
        }
        var skipped = ((result.exportProposal && result.exportProposal.skipped) || []);
        if (skipped.length) {
          alert('一部保存しました。提案商品IDが無い項目はスキップしています: ' + skipped.length + '件');
        }
        App.reloadOpps();
      })
      .withFailureHandler(App.showError)
      .saveOppDrafts(changes);
  },

  oppWeekNavPrev() {
    if (this.state.editedPaths.size) {
      alert('未保存の変更があります。保存または破棄してから移動してください。');
      return;
    }
    if (!this.state.oppSnapshotDate) {
      if (this.state.oppSnapshotDates.length) this.loadOppSnapshot_(this.state.oppSnapshotDates[0]);
      return;
    }
    var idx = this.state.oppSnapshotDates.indexOf(this.state.oppSnapshotDate);
    if (idx < this.state.oppSnapshotDates.length - 1) this.loadOppSnapshot_(this.state.oppSnapshotDates[idx + 1]);
  },

  oppWeekNavNext() {
    if (this.state.editedPaths.size) {
      alert('未保存の変更があります。保存または破棄してから移動してください。');
      return;
    }
    if (!this.state.oppSnapshotDate) return;
    var idx = this.state.oppSnapshotDates.indexOf(this.state.oppSnapshotDate);
    if (idx > 0) this.loadOppSnapshot_(this.state.oppSnapshotDates[idx - 1]);
    else this.oppWeekNavToday();
  },

  oppWeekNavToday() {
    if (this.state.editedPaths.size) {
      alert('未保存の変更があります。保存または破棄してから移動してください。');
      return;
    }
    this.state.oppSnapshotDate = null;
    this.state.oppSnapshotRows = null;
    this.populateOppFilters();
    this.renderOpps();
  },

  loadOppSnapshot_(dateStr) {
    App.showLoading(true);
    google.script.run
      .withSuccessHandler(function(result) {
        App.showLoading(false);
        if (result && result.error) {
          App.showError(result.error);
          return;
        }
        App.state.oppSnapshotDate = dateStr;
        App.state.oppSnapshotRows = (result && result.rows) || [];
        App.populateOppFilters();
        App.renderOpps();
      })
      .withFailureHandler(App.showError)
      .getOppSnapshotData(dateStr);
  },

  scrollToSaveBar() {
    document.getElementById('save-bar').scrollIntoView({ behavior: 'smooth' });
  },

  toggleSeries(el) {
    const key = el.dataset.series;
    this.state.visibleSeries[key] = !this.state.visibleSeries[key];
    el.classList.toggle('active', this.state.visibleSeries[key]);
    this.renderTrend();
  },

  showLoading(show) {
    this.state.loading = show;
    document.getElementById('loading-overlay').classList.toggle('hidden', !show);
    document.getElementById('main-content').style.visibility = show ? 'hidden' : 'visible';
  },

  showError(err) {
    alert('エラー: ' + ((err && err.message) || err));
    App.showLoading(false);
  },
};

function editCell(val, meta, editedPaths) {
  const key = editKey(meta);
  const cls = editedPaths && editedPaths.has(key) ? 'editable-cell edited' : 'editable-cell';
  return '<span class="' + cls + '" data-meta=\'' + JSON.stringify(meta) + '\' data-val="' + safeNum(val) + '" onclick="App.startEditFromEl(this)">' + fmtNum(val) + '</span>';
}

function editTextCell(val, meta, editedPaths) {
  const key = editKey(meta);
  const cls = editedPaths && editedPaths.has(key) ? 'editable-cell edited' : 'editable-cell';
  const safe = String(val === null || val === undefined ? '' : val);
  return '<span class="' + cls + '" data-meta=\'' + JSON.stringify(meta) + '\' data-val="' + escapeAttr(safe) + '" onclick="App.startEditFromEl(this)">' + escapeHtml(safe || ' ') + '</span>';
}

function editKey(meta) {
  return JSON.stringify(meta);
}

function fmtNum(value) {
  if (value === null || value === undefined || value === '') return '-';
  return Number(value).toLocaleString('ja-JP');
}

function fmtMan(v) {
  return Math.floor((v || 0) / 10000) + '万';
}

function fmtDiffNum(value) {
  const n = safeNum(value);
  return (n >= 0 ? '+' : '') + fmtNum(n);
}

function safeNum(value) {
  return typeof value === 'number' ? value : Number(value) || 0;
}

function diffBadge(text) {
  if (!text || text === '-') return '<span class="val-dash">-</span>';
  const num = Number(String(text).replace(/[+,]/g, ''));
  const cls = num > 0 ? 'week-up' : num < 0 ? 'week-down' : 'week-flat';
  return '<span class="week-badge ' + cls + '">' + text + '</span>';
}

function diffClassNum(value) {
  const num = safeNum(value);
  if (num > 0) return 'val-positive';
  if (num < 0) return 'val-negative';
  return 'val-sub';
}

function diffBadgeClass_(val) {
  var n = Number(val) || 0;
  return n > 0 ? 'diff-badge-up' : n < 0 ? 'diff-badge-down' : 'diff-badge-flat';
}

function valClassNum(value) {
  const num = safeNum(value);
  if (num < 0) return 'val-negative';
  if (num > 0) return 'val-neutral';
  return 'val-sub';
}

function blockLabel(block) {
  return { Q: 'Q合計', M5: '5月', M6: '6月', M7: '7月' }[block] || block;
}

function splitDeals(text) {
  return String(text || '').split('/').map(function(item) { return item.trim(); }).filter(Boolean);
}

function lastValue(arr) {
  return arr && arr.length ? safeNum(arr[arr.length - 1]) : 0;
}

function prevValue(arr) {
  return arr && arr.length > 1 ? safeNum(arr[arr.length - 2]) : 0;
}

function uniqueValues(rows, key) {
  return Array.from(new Set(rows.map(function(row) { return row[key]; }).filter(Boolean))).sort();
}

function populateSelect(id, values) {
  const select = document.getElementById(id);
  select.innerHTML = '<option value="all">すべて</option>' + values.map(function(value) {
    return '<option value="' + escapeAttr(value) + '">' + escapeHtml(value) + '</option>';
  }).join('');
}

function displayMemberName(member) {
  if (!member) return '';
  if (member.isTotal && member.group) return member.group;
  return member.name || '';
}

function formatCell(value) {
  if (value instanceof Date) {
    const y = value.getFullYear();
    const m = String(value.getMonth() + 1).padStart(2, '0');
    const d = String(value.getDate()).padStart(2, '0');
    return [y, m, d].join('-');
  }
  return value === null || value === undefined ? '' : String(value);
}

function escapeHtml(value) {
  return String(value === null || value === undefined ? '' : value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function escapeAttr(value) {
  return escapeHtml(value);
}

function computeWowMap_(currentMembers, prevMembers) {
  var prevMetricMap = {};
  var periods = ['Q', 'M5', 'M6', 'M7'];
  var metricKeys = ['fcstAdjusted', 'fcstCommit', 'confirmed', 'expectedMrr', 'received', 'debtMgmt', 'debtMgmtLite', 'expense'];
  (prevMembers || []).forEach(function(m) {
    if (!m || !m.name) return;
    periods.forEach(function(p) {
      var key = m.name + '|' + p;
      prevMetricMap[key] = m[p] || {};
    });
  });
  var wowMap = {};
  (currentMembers || []).forEach(function(m) {
    if (!m || !m.name) return;
    periods.forEach(function(p) {
      var key = m.name + '|' + p;
      var cur = m[p] || {};
      var prev = prevMetricMap[key] || {};
      var wow = {};
      metricKeys.forEach(function(mk) {
        var curVal = cur[mk] || { net: 0, newExp: 0, churn: 0 };
        var prevVal = prev[mk] || { net: 0, newExp: 0, churn: 0 };
        if (typeof curVal === 'number') {
          wow[mk] = { net: curVal - (typeof prevVal === 'number' ? prevVal : (prevVal.net || 0)), newExp: 0, churn: 0 };
        } else {
          wow[mk] = {
            net: (Number(curVal.net) || 0) - (Number(typeof prevVal === 'number' ? prevVal : (prevVal.net || 0)) || 0),
            newExp: (Number(curVal.newExp) || 0) - (Number(prevVal.newExp) || 0),
            churn: (Number(curVal.churn) || 0) - (Number(prevVal.churn) || 0),
          };
        }
      });
      wowMap[key] = wow;
    });
  });
  return wowMap;
}

document.addEventListener('DOMContentLoaded', function() { App.init(); });
</script>
