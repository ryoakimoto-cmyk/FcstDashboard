  startLoadingSequence_(steps, keepExistingStatus) {
    var preset = Array.isArray(steps) && steps.length ? steps : [{ delay: 0, percent: 18, text: '読み込み中...', subtext: 'しばらくお待ちください' }];
    var self = this;
    self.clearLoadingTimers_();
    preset.forEach(function(step) {
      var timerId = setTimeout(function() {
        if (keepExistingStatus && step.delay === 0) return;
        self.setLoadingStatus_(step.percent, step.text, step.subtext);
      }, Number(step.delay) || 0);
      self.state.loadingTimerIds.push(timerId);
    });
  },

    document.getElementById('loading-overlay').classList.toggle('hidden', !show);

function getSharedQuarterDefinitions_(periodOptions) {
  var options = Array.isArray(periodOptions)
    ? periodOptions
    : ((App.state && App.state.currentData && App.state.currentData.periodOptions) || []);
  if (options.length) {
    return options.map(function(option) {
      return {
        key: option.key,
        label: option.label,
        months: (option.months || []).slice()
      };
    });
  }
  return getLegacyOppQuarterDefinitions_();
}

function getLegacyOppQuarterDefinitions_() {
  var defs = [];
  var baseYear = 2025;
  var baseMonth = 6;
  for (var fiscal = 19; fiscal <= 20; fiscal++) {
    for (var quarter = 1; quarter <= 4; quarter++) {
      var monthOffset = ((fiscal - 19) * 12) + ((quarter - 1) * 3);
      var months = [];
      for (var i = 0; i < 3; i++) {
        months.push(addMonthsToMonthKey_(baseYear, baseMonth, monthOffset + i));
      }
      defs.push({
        key: fiscal + 'Q' + quarter,
        label: fiscal + '\u671f' + quarter + 'Q',
        months: months
      });
    }
  }
  return defs;
}

function getSharedQuarterDefinition_(key, periodOptions) {
  return getSharedQuarterDefinitions_(periodOptions).find(function(def) {
    return def.key === key;
  }) || null;
}

function getOppQuarterDefinitions_() {
  return getSharedQuarterDefinitions_();
}

function getOppQuarterDefinition_(key) {
  return getSharedQuarterDefinition_(key);
}

function addMonthsToMonthKey_(year, month, offset) {
  var total = (year * 12 + (month - 1)) + offset;
  var y = Math.floor(total / 12);
  var m = (total % 12) + 1;
  return y + '-' + String(m).padStart(2, '0');
}

function normalizeOppMonthValue_(value) {
  var text = String(value || '');
  var match = text.match(/(\d{4})[-\/年](\d{1,2})/);
  if (!match) return '';
  return match[1] + '-' + String(Number(match[2])).padStart(2, '0');
}

function formatOppMonthLabel_(monthKey) {
  var match = String(monthKey || '').match(/(\d{4})-(\d{2})/);
  if (!match) return monthKey;
  return match[1] + '年' + Number(match[2]) + '月';
}

function formatOppSnapshotLabel_(value) {
  if (!value) return '';
  if (value instanceof Date && !isNaN(value)) return formatCell(value);
  var text = String(value || '').trim();
  var isoMatch = text.match(/(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/);
  if (isoMatch) {
    return isoMatch[1] + '-' + String(Number(isoMatch[2])).padStart(2, '0') + '-' + String(Number(isoMatch[3])).padStart(2, '0');
  }
  var parsed = new Date(text);
  if (!isNaN(parsed)) return formatCell(parsed);
  return text;
}

function sameMonthSelection_(left, right) {
  if ((left || []).length !== (right || []).length) return false;
  return (left || []).every(function(monthKey) {
    return right.indexOf(monthKey) !== -1;
  });
}

function isDepartmentTotalMember_(member) {
  if (!member || !member.isTotal) return false;
  if (member.totalKind) return member.totalKind === 'department';
  var group = String(member.group || member.groupCode || '');
  var deptKey = String((member && member.dept) || _selectedDept || '');
  return group === '\u90e8\u5168\u4f53' || group === 'BOAM' || (!!deptKey && group === deptKey);
}

function isGroupTotalMember_(member) {
  if (!member || !member.isTotal) return false;
  if (member.totalKind) return member.totalKind === 'group';
  return !isDepartmentTotalMember_(member);
}

function getMemberGroupLabel_(member) {

}

  if (isGroupTotalMember_(member)) return getMemberGroupLabel_(member);
  return member.displayName || member.name || '';
}

function formatCell(value) {
  if (value instanceof Date) {
    const y = value.getFullYear();
    const m = String(value.getMonth() + 1).padStart(2, '0');
    const d = String(value.getDate()).padStart(2, '0');
    return [y, m, d].join('-');
  }
  return value === null || value === undefined ? '' : String(value);
}

function escapeHtml(value) {
  return String(value === null || value === undefined ? '' : value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function escapeAttr(value) {
  return escapeHtml(value);
}

function computeWowMap_(currentMembers, prevMembers, periodOptions) {
  var prevMetricMap = {};
  var periods = [];
  (periodOptions || []).forEach(function(option) {
    if (!option || !option.key) return;
    periods.push(option.key);
    (option.months || []).forEach(function(monthKey) {
      periods.push(monthKey);
    });
  });
  var metricKeys = getFcstMetricKeys_();
  (prevMembers || []).forEach(function(m) {
    if (!m || !m.name) return;
    periods.forEach(function(p) {
      var key = m.name + '|' + p;
      prevMetricMap[key] = m[p] || {};
    });
  });
  var wowMap = {};
  (currentMembers || []).forEach(function(m) {
    if (!m || !m.name) return;
    periods.forEach(function(p) {
      var key = m.name + '|' + p;
      var cur = m[p] || {};
      var prev = prevMetricMap[key] || {};
      var wow = {};
      metricKeys.forEach(function(mk) {
        var curVal = cur[mk] || { net: 0, newExp: 0, churn: 0 };
        var prevVal = prev[mk] || { net: 0, newExp: 0, churn: 0 };
        if (typeof curVal === 'number') {
          wow[mk] = { net: curVal - (typeof prevVal === 'number' ? prevVal : (prevVal.net || 0)), newExp: 0, churn: 0 };
        } else {
          wow[mk] = {
            net: (Number(curVal.net) || 0) - (Number(typeof prevVal === 'number' ? prevVal : (prevVal.net || 0)) || 0),
            newExp: (Number(curVal.newExp) || 0) - (Number(prevVal.newExp) || 0),
            churn: (Number(curVal.churn) || 0) - (Number(prevVal.churn) || 0),
          };
        }
      });
      wowMap[key] = wow;
    });
  });
  return wowMap;
}

function findFcstQuarterOption_(periodOptions, quarterKey) {
  return getSharedQuarterDefinition_(quarterKey, periodOptions);
}

function isValidFcstPeriod_(periodOptions, periodKey) {
  if (!periodKey) return false;
  return (periodOptions || []).some(function(option) {
    return option.key === periodKey || (option.months || []).indexOf(periodKey) !== -1;
  });
}

function formatFcstMonthLabel_(monthKey) {
  var match = String(monthKey || '').match(/^(\d{4})-(\d{2})$/);
  if (!match) return monthKey;
  return Number(match[2]) + '\u6708';
}

function renderBootError_(error) {
  var message = (error && error.stack) || (error && error.message) || String(error);
  var target = document.getElementById('main-content') || document.body;
  if (!target) return;
  target.style.visibility = 'visible';
  target.innerHTML =
    '<div style="padding:24px;color:#b00020;font:14px/1.5 sans-serif;white-space:pre-wrap;">' +
    'BOOT ERROR\n\n' + escapeHtml(message) +
    '</div>';
  var overlay = document.getElementById('loading-overlay');
  if (overlay) overlay.classList.add('hidden');
}

window.addEventListener('error', function(event) {
  renderBootError_(event.error || event.message || 'Unknown error');
});

window.addEventListener('unhandledrejection', function(event) {
  renderBootError_(event.reason || 'Unhandled promise rejection');
});

document.addEventListener('DOMContentLoaded', function() {
  try {
    _deptConfig = parseEmbeddedJson_('gas-dept-config-json', {});
    _embeddedInitData = parseEmbeddedJson_('gas-embedded-init-data-json', null);
    initPage_();
  } catch (error) {
    renderBootError_(error);
  }
});
</script>
