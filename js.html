<script>
var _selectedDept = (typeof GAS_SELECTED_DEPT !== 'undefined' && GAS_SELECTED_DEPT !== 'null') ? GAS_SELECTED_DEPT : null;
var _userDefaultDept = (typeof GAS_USER_DEFAULT_DEPT !== 'undefined' && GAS_USER_DEFAULT_DEPT !== 'null') ? GAS_USER_DEFAULT_DEPT : null;
var _userEmail = (typeof GAS_USER_EMAIL !== 'undefined' && GAS_USER_EMAIL !== 'null') ? GAS_USER_EMAIL : '';
var _deptConfig = {};
var _embeddedInitData = null;

function parseEmbeddedJson_(elementId, fallback) {
  var el = document.getElementById(elementId);
  if (!el) return fallback;
  var raw = el.textContent || el.innerText || '';
  if (!raw || raw === 'null') return fallback;
  try {
    return JSON.parse(raw);
  } catch (error) {
    return fallback;
  }
};

try {
  _deptConfig = parseEmbeddedJson_('gas-dept-config-json', {}) || {};
} catch (e) {
  _deptConfig = {};
}

try {
  _embeddedInitData = parseEmbeddedJson_('gas-embedded-init-data-json', null);
} catch (e) {
  _embeddedInitData = null;
}

var GAS_DEPT_CONFIG = _deptConfig;

const LOADING_PRESETS = {
  init: [
    { delay: 0, percent: 12, text: 'データを読み込んでいます', subtext: 'しばらくお待ちください' },
  ],
  refresh: [
    { delay: 0, percent: 18, text: 'Salesforce同期を待っています...', subtext: 'Coefficient の処理完了を待っています' },
    { delay: 4000, percent: 26, text: 'Salesforce同期を待っています...', subtext: 'Coefficient の処理完了を待っています' },
    { delay: 10000, percent: 34, text: 'Salesforce同期を待っています...', subtext: 'Coefficient の処理完了を待っています' },
    { delay: 20000, percent: 42, text: 'Salesforce同期を待っています...', subtext: 'Coefficient の処理完了を待っています' },
  ],
  spreadsheet: [
    { delay: 0, percent: 18, text: 'スプレッドシートを読み込んでいます', subtext: '最新データを取得しています' },
    { delay: 1000, percent: 34, text: 'スプレッドシートを読み込んでいます', subtext: '最新データを取得しています' },
    { delay: 2500, percent: 52, text: 'スプレッドシートを読み込んでいます', subtext: '最新データを取得しています' },
  ],
  trend: [
    { delay: 0, percent: 18, text: '推移グラフを読み込んでいます', subtext: '履歴データを取得しています' },
    { delay: 1200, percent: 64, text: 'グラフを描画しています', subtext: '系列データを反映しています' },
  ],
  snapshot: [
    { delay: 0, percent: 18, text: 'スナップショットを読み込んでいます', subtext: '保存済みデータを取得しています' },
    { delay: 1200, percent: 70, text: '画面を更新しています', subtext: 'スナップショット表示に切り替えています' },
  ],
  save: [
    { delay: 0, percent: 20, text: '保存しています', subtext: '入力内容を反映しています' },
    { delay: 1200, percent: 76, text: '保存しています', subtext: '一覧表示を更新しています' },
  ],
};

function getCurrentDeptConfig_() {
  return _selectedDept && _deptConfig[_selectedDept] ? _deptConfig[_selectedDept] : null;
}

function applyDivisionBadge_() {
  var cfg = getCurrentDeptConfig_();
  if (!cfg) {
    var existingBadge = document.querySelector('.division-badge');
    if (existingBadge) {
      existingBadge.style.display = 'none';
      existingBadge.textContent = '';
    }
    return;
  }
  if (typeof App !== 'undefined' && App && typeof App.addDivisionBadge_ === 'function') {
    App.addDivisionBadge_();
    return;
  }
  var badge = document.querySelector('.division-badge');
  if (!badge) return;
  badge.textContent = cfg.division + '事業部';
  badge.style.display = 'inline-block';
}

function getDefaultVisibleView_(features) {
  return 'fcst';
}

function proposalProductFields_() {
  return ['received', 'debtMgmt', 'debtMgmtLite', 'expense'];
}

function confirmedProposalProductFields_() {
  return ['confirmedReceived', 'confirmedDebtMgmt', 'confirmedDebtMgmtLite', 'confirmedExpense'];
}

function proposalProductCommitFields_() {
  return ['fcstCommitReceived', 'fcstCommitDebtMgmt', 'fcstCommitDebtMgmtLite', 'fcstCommitExpense'];
}

function fcstProposalProductMetricDefs_() {
  return [
    { key: 'received', label: '\u53d7\u9818', editable: false, supportsTargetDiff: false },
    { key: 'debtMgmt', label: '\u50b5\u6a29\u7ba1\u7406', editable: false, supportsTargetDiff: false },
    { key: 'debtMgmtLite', label: '\u50b5\u6a29\u7ba1\u7406 Lite', editable: false, supportsTargetDiff: false },
    { key: 'expense', label: '\u7d4c\u8cbb', editable: false, supportsTargetDiff: false }
  ];
}

function fcstConfirmedProposalMetricDefs_() {
  return [
    { key: 'confirmedReceived', label: '\u78ba\u5b9a\u53d7\u9818', editable: false, supportsTargetDiff: false },
    { key: 'confirmedDebtMgmt', label: '\u78ba\u5b9a\u50b5\u6a29\u7ba1\u7406', editable: false, supportsTargetDiff: false },
    { key: 'confirmedDebtMgmtLite', label: '\u78ba\u5b9a\u50b5\u6a29\u7ba1\u7406 Lite', editable: false, supportsTargetDiff: false },
    { key: 'confirmedExpense', label: '\u78ba\u5b9a\u7d4c\u8cbb', editable: false, supportsTargetDiff: false }
  ];
}

function hasProposalProducts_() {
  return !App || !App.currentFeatures || App.currentFeatures.proposalProducts !== false;
}

function getOppOwnerLabel_() {
  var cfg = getCurrentDeptConfig_();
  if (!cfg) return '案件担当';
  if (_selectedDept === 'SSSMBCS') return '案件CS担当';
  if (cfg.division === 'SS') return '案件主担当';
  if (cfg.division === 'BO' || cfg.division === 'CO') return '案件副担当';
  return '案件担当';
}

function applyOppDisplayLabels_() {
  var ownerLabel = getOppOwnerLabel_();
  ['opp-owner-label', 'opp-owner-header'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.textContent = ownerLabel;
  });
}

function getFcstMetricKeys_() {
  var metricKeys = ['fcstAdjusted', 'fcstCommit', 'confirmed', 'expectedMrr'];
  return hasProposalProducts_()
    ? metricKeys.concat(proposalProductFields_(), confirmedProposalProductFields_())
    : metricKeys;
}

function getOppEditableFields_() {
  var fields = ['fcstCommit', 'fcstMin', 'fcstMax'];
  return hasProposalProducts_() ? fields.concat(proposalProductFields_()) : fields;
}

function getOppAmountFields_() {
  var fields = ['fcstCommit', 'fcstMin', 'fcstMax'];
  return hasProposalProducts_()
    ? fields.concat(proposalProductFields_(), proposalProductCommitFields_())
    : fields;
}

// --- Top page routing ---
function initPage_() {
  var header = document.querySelector('header') || document.querySelector('.header');
  if (header) header.style.display = '';
  var main = document.querySelector('main') || document.querySelector('.main');
  if (main) main.style.display = '';
  var saveBar = document.getElementById('save-bar');
  if (saveBar) saveBar.style.display = '';
  App.currentDeptKey = _selectedDept || '';
  App.currentFeatures = _selectedDept && _deptConfig[_selectedDept] ? _deptConfig[_selectedDept].features : {};
  applyFeatureFlags_();
  applyOppDisplayLabels_();
  applyDivisionBadge_();
  App.init();
}

function renderTopPage_() {
  document.getElementById('loading-overlay').style.display = 'none';
  var main = document.querySelector('main') || document.querySelector('.main') || document.body;
  // Hide existing dashboard UI
  var dashboardEls = document.querySelectorAll('.tab-nav, .tab-bar, #view-fcst, #view-opps, #view-trend, .save-bar');
  dashboardEls.forEach(function(el) { el.style.display = 'none'; });

  // Build division groups
  var divisions = {};
  Object.keys(_deptConfig).forEach(function(key) {
    var cfg = _deptConfig[key];
    var div = cfg.division;
    if (!divisions[div]) divisions[div] = [];
    divisions[cfg.division].push({ key: key, label: cfg.label });
  });

  var html = '<div class="top-page">';
  html += '<div class="top-page-header"><h1 class="top-page-title">FCST Dashboard</h1><p class="top-page-subtitle">部署を選択してください</p></div>';

  var divOrder = [];
  Object.keys(GAS_DEPT_CONFIG).forEach(function(k) {
    var d = GAS_DEPT_CONFIG[k].division;
    if (divOrder.indexOf(d) === -1) divOrder.push(d);
  });
  var DIVISION_LABELS = {
    BO: 'Bill One事業部',
    SS: 'Sansan事業部',
    CO: 'CO事業部'
  };

  divOrder.forEach(function(divKey) {
    if (!divisions[divKey]) return;
    html += '<div class="division-section">';
    html += '<div class="division-header">' + (DIVISION_LABELS[divKey] || divKey) + '</div>';
    html += '<div class="dept-card-grid">';
    divisions[divKey].forEach(function(dept) {
      var isDefault = (_userDefaultDept === dept.key);
      var cardHref = buildAppUrl_(dept.key);
      html += '<a class="dept-card' + (isDefault ? ' dept-card--default' : '') + '" href="' + cardHref + '" target="_top">';
      html += '<span class="dept-card-label">' + dept.label + '</span>';
      if (isDefault) html += '<span class="dept-card-badge">あなたの部署</span>';
      html += '</a>';
    });
    html += '</div></div>';
  });
  html += '</div>';

  // Insert top page into DOM
  var topPageContainer = document.createElement('div');
  topPageContainer.innerHTML = html;
  main.insertBefore(topPageContainer, main.firstChild);

  // Update header title
  var titleEl = document.querySelector('.header-title, h1.title, .logo, .header-logo');
  if (titleEl) titleEl.textContent = 'FCST Dashboard';
}

function renderTopPage_() {
  var loadingOverlay = document.getElementById('loading-overlay');
  if (loadingOverlay) loadingOverlay.style.display = 'none';

  var main = document.querySelector('main') || document.querySelector('.main') || document.body;
  if (!main) return;

  var existingTopPage = main.querySelector('.top-page');
  if (existingTopPage && existingTopPage.parentNode) {
    existingTopPage.parentNode.removeChild(existingTopPage);
  }

  var dashboardEls = document.querySelectorAll('.tab-nav, .tab-bar, #view-fcst, #view-opps, #view-trend, .save-bar');
  dashboardEls.forEach(function(el) { el.style.display = 'none'; });

  var divisions = {};
  Object.keys(_deptConfig || {}).forEach(function(key) {
    var cfg = _deptConfig[key] || {};
    var div = cfg.division || 'OTHER';
    if (!divisions[div]) divisions[div] = [];
    divisions[div].push({
      key: key,
      label: cfg.label || key
    });
  });

  var divOrder = [];
  Object.keys(_deptConfig || {}).forEach(function(key) {
    var cfg = _deptConfig[key] || {};
    var div = cfg.division || 'OTHER';
    if (divOrder.indexOf(div) === -1) divOrder.push(div);
  });
  if (divisions.OTHER && divOrder.indexOf('OTHER') === -1) divOrder.push('OTHER');

  var DIVISION_LABELS = {
    BO: 'Bill One事業部',
    SS: 'Sansan事業部',
    CO: 'CO事業部',
    OTHER: 'その他'
  };

  var topPage = document.createElement('div');
  topPage.className = 'top-page';

  var header = document.createElement('div');
  header.className = 'top-page-header';

  var title = document.createElement('h1');
  title.className = 'top-page-title';
  title.textContent = 'FCST Dashboard';
  header.appendChild(title);

  var subtitle = document.createElement('p');
  subtitle.className = 'top-page-subtitle';
  subtitle.textContent = '部署を選択してください';
  header.appendChild(subtitle);

  topPage.appendChild(header);

  divOrder.forEach(function(divKey) {
    var deptList = divisions[divKey] || [];
    if (!deptList.length) return;

    var section = document.createElement('div');
    section.className = 'division-section';

    var sectionHeader = document.createElement('div');
    sectionHeader.className = 'division-header';
    sectionHeader.textContent = DIVISION_LABELS[divKey] || divKey;
    section.appendChild(sectionHeader);

    var grid = document.createElement('div');
    grid.className = 'dept-card-grid';

    deptList.forEach(function(dept) {
      var isDefault = (_userDefaultDept === dept.key);
      var card = document.createElement('a');
      card.className = 'dept-card' + (isDefault ? ' dept-card--default' : '');
      card.href = buildAppUrl_(dept.key);
      card.target = '_top';

      var label = document.createElement('span');
      label.className = 'dept-card-label';
      label.textContent = dept.label || dept.key || '';
      card.appendChild(label);

      if (isDefault) {
        var badge = document.createElement('span');
        badge.className = 'dept-card-badge';
        badge.textContent = 'あなたの部署';
        card.appendChild(badge);
      }

      grid.appendChild(card);
    });

    section.appendChild(grid);
    topPage.appendChild(section);
  });

  main.insertBefore(topPage, main.firstChild);

  var titleEl = document.querySelector('.header-title, h1.title, .logo, .header-logo');
  if (titleEl) titleEl.textContent = 'FCST Dashboard';
}

function applyFeatureFlags_() {
  var cfg = getCurrentDeptConfig_();
  if (!cfg) return;
  var features = cfg.features || App.currentFeatures || {};

  var oppTab = document.querySelector('.tab[data-view="opps"], [href="#view-opps"], .tab[data-tab="opps"]');
  var oppView = document.getElementById('view-opps');
  if (oppTab) oppTab.style.display = features.oppList === false ? 'none' : '';
  if (oppView) oppView.style.display = features.oppList === false ? 'none' : '';

  var chartTab = document.querySelector('.tab[data-view="trend"], [href="#view-trend"], .tab[data-tab="trend"]');
  var chartView = document.getElementById('view-trend');
  if (chartTab) chartTab.style.display = features.chart === false ? 'none' : '';
  if (chartView) chartView.style.display = features.chart === false ? 'none' : '';

  if (features.adjustment === false) {
    var adjEls = document.querySelectorAll('.fcst-adjusted, #fcst-adjusted, .fcst-adjustment, [data-section="adjustment"]');
    adjEls.forEach(function(el) { el.style.display = 'none'; });
  }
  if (features.snapshot === false) {
    var snapSection = document.querySelector('.snapshot-section, #snapshot-controls');
    if (snapSection) snapSection.style.display = 'none';
  }

  if (features.proposalProducts === false) {
    // Hide 提案商品 columns/sections: 受領, 債権管理, 債権管理 Lite, 経費
    document.querySelectorAll('[data-feature="proposalProducts"]').forEach(function(el) {
      el.style.display = 'none';
    });
  }

  if (!App || !App.state) return;
  var activeView = App.state.activeView || 'fcst';
  var activeViewDisabled =
    (activeView === 'opps' && features.oppList === false) ||
    (activeView === 'trend' && features.chart === false);
  if (activeViewDisabled) {
    App.switchView(getDefaultVisibleView_(features));
  }
}

const App = {
  currentDeptKey: '',
  currentFeatures: {},
  embeddedDataUsed: false,
  oppListLoaded: false,
  state: {
    activeView: 'fcst',          // 'fcst' | 'trend' | 'opps'
    selectedPeriod: '',
    selectedQuarterKey: '',
    selectedGroup: '\u90e8\u5168\u4f53',      // '\u90e8\u5168\u4f53' | \u30b0\u30eb\u30fc\u30d7\u540d
    visibleSeries: {
      fcstAdjusted: true,
      fcstCommit: true,
      target: true,
      confirmed: true,
      expectedMrr: true,
      confirmedReceived: false,
      confirmedDebtMgmt: false,
      confirmedDebtMgmtLite: false,
      confirmedExpense: false
    },
    expandedMetrics: {
      fcstAdjusted: false,
      fcstCommit: false,
      confirmed: false,
      expectedMrr: false,
      received: false,
      debtMgmt: false,
      debtMgmtLite: false,
      expense: false,
      confirmedReceived: false,
      confirmedDebtMgmt: false,
      confirmedDebtMgmtLite: false,
      confirmedExpense: false
    },
    expandedAll: { keyDeals: false, notes: false },
    expandedNoteKeys: {},
    trendChart: null,
    editedPaths: new Set(),
    loading: false,
    loadingTimerIds: [],
    lastUpdated: '',
    currentData: null,
    fcstAdjusted: {},
    diffToggles: {},
    wowMap: {},
    snapshotDates: [],
    snapshotDate: null,
    snapshotViewData: null,
    latestSnapshotData: null,
    opps: [],
    oppListOriginal: null,
    oppListDirty: {},
    oppsLastUpdated: '',
    oppSnapshotDates: [],
    oppSnapshotDate: null,
    oppSnapshotRows: null,
    oppLatestSnapshotData: null,
    sfLastUpdated: '',
    oppPreviousMap: {},
    oppDiffToggles: {},
    oppSelectedQuarter: '',
    oppQuarterMonths: [],
    fcstFiltersCollapsed: false,
    oppFiltersCollapsed: false,
    oppListLoaded: false,
    oppEditMeta: null,
    oppEditAnchor: null,
    detailModal: null,
  },

  init() {
    if (!_selectedDept) {
      App.renderTopPage_();
      return;
    }
    App.currentDeptKey = _selectedDept || '';
    App.embeddedDataUsed = false;
    App.oppListLoaded = false;
    App.state.oppListLoaded = false;
    App.state.opps = [];
    App.state.oppListOriginal = null;
    App.setupOppLayout_();
    App.showLoading(true, LOADING_PRESETS.init);
    App.loadInitData_();
  },

  renderTopPage_() {
    renderTopPage_();
  },

  addBackButton_() {
    var header = document.querySelector('header, .header');
    if (!header) return;
    if (document.querySelector('.back-btn')) return;
    var btn = document.createElement('button');
    btn.className = 'back-btn';
    btn.textContent = 'トップに戻る';
    btn.onclick = function() { window.location.href = window.location.pathname; };
    header.insertBefore(btn, header.firstChild);
  },

  addDivisionBadge_() {
    if (!_selectedDept || !_deptConfig[_selectedDept]) return;
    var division = _deptConfig[_selectedDept].division;
    var header = document.querySelector('header, .header');
    if (!header) return;
    var badge = header.querySelector('.division-badge');
    if (!badge) {
      badge = document.createElement('span');
      badge.className = 'division-badge';
      var title = header.querySelector('h1, .title, .logo, .header-title, .header-logo');
      if (title && title.parentNode) {
        title.parentNode.insertBefore(badge, title.nextSibling);
      } else {
        header.appendChild(badge);
      }
    }
    badge.textContent = division + '事業部';
    badge.style.display = 'inline-block';
  },

  loadInitData_() {
    (function() {
      if (!_selectedDept) return;
      if (_embeddedInitData !== null && _embeddedInitData !== undefined) {
        App.renderDashboard(_embeddedInitData);
        App.embeddedDataUsed = true;
        google.script.run
          .withSuccessHandler(function(freshData) {
            var normalizedFreshData = normalizeInitDataResponse_(freshData);
            if (normalizedFreshData && normalizedFreshData.sfLastUpdated !== _embeddedInitData.sfLastUpdated) {
              App.renderDashboard(normalizedFreshData);
              ClientCache.set(_selectedDept, 'initData', normalizedFreshData, normalizedFreshData.sfLastUpdated);
            }
          })
          .getInitData(_selectedDept);
      } else {
        var cached = ClientCache.get(_selectedDept, 'initData');
        if (cached && cached.data) {
          App.renderDashboard(cached.data);
          google.script.run
            .withSuccessHandler(function(freshData) {
              var normalizedFreshData = normalizeInitDataResponse_(freshData);
              if (normalizedFreshData) {
                ClientCache.set(_selectedDept, 'initData', normalizedFreshData, normalizedFreshData.sfLastUpdated);
                if (!cached.data.sfLastUpdated || normalizedFreshData.sfLastUpdated !== cached.data.sfLastUpdated) {
                  App.renderDashboard(normalizedFreshData);
                }
              }
            })
            .getInitData(_selectedDept);
        } else {
          App.showLoading(false);
          App.showSkeleton();
          google.script.run
            .withSuccessHandler(function(data) {
              var normalizedData = normalizeInitDataResponse_(data);
              if (!normalizedData) {
                App.LoadingState.showError('main-content',
                  'データの取得に失敗しました。再読み込みまたはSF同期をお試しください。',
                  function() { window.location.reload(); }
                );
                return;
              }
              App.renderDashboard(normalizedData);
              if (normalizedData && _selectedDept) {
                ClientCache.set(_selectedDept, 'initData', normalizedData, normalizedData.sfLastUpdated);
              }
            })
            .withFailureHandler(function(err) {
              App.LoadingState.showError('main-content', err, function() {
                google.script.run.withSuccessHandler(function(data) {
                  App.renderDashboard(normalizeInitDataResponse_(data));
                }).getInitData(_selectedDept);
              });
            })
            .getInitData(_selectedDept);
        }
      }
    })();
  },

  applyFcstLatestData_(result) {
    App.state.lastUpdated = (result.data && result.data.lastUpdated) || '';
    App.state.sfLastUpdated = (result.data && result.data.sfLastUpdated) || '';
    App.state.currentData = result.data;
    App.state.fcstAdjusted = (result.data && result.data.fcstAdjusted) || {};
    var periodOptions = (result.data && result.data.periodOptions) || [];
    App.restoreFcstFilterState_();
    if (!App.state.selectedQuarterKey || !periodOptions.some(function(option) { return option.key === App.state.selectedQuarterKey; })) {
      App.state.selectedQuarterKey = periodOptions.length ? periodOptions[0].key : '';
    }
    if (!App.state.selectedPeriod || !isValidFcstPeriod_(periodOptions, App.state.selectedPeriod)) {
      App.state.selectedPeriod = App.state.selectedQuarterKey;
    }
    var prevMembers = (result.data && result.data.previousSnapshot && result.data.previousSnapshot.members) || [];
    App.state.wowMap = computeWowMap_((result.data && result.data.members) || [], prevMembers, periodOptions);
    App.state.snapshotDates = (result.data && result.data.snapshotDates) || [];
    App.state.latestSnapshotData = (result.data && result.data.latestSnapshotData) || null;
    App.syncOppFilterPanel_();
    App.addBackButton_();
    App.addDivisionBadge_();
    try { App.renderAll(); } catch (e) {
      document.getElementById('fcst-content').innerHTML = '<p style="padding:24px;color:red">描画エラー: ' + escapeHtml(String(e)) + '</p>';
    }
  },

  applyOppLatestData_(result) {
    App.state.opps = ((result && result.rows) || []).map(function(opp) {
      opp._base = App.extractOppBase_(opp);
      return opp;
    });
    App.state.oppListOriginal = JSON.parse(JSON.stringify(App.state.opps));
    App.state.oppListDirty = {};
    App.state.oppsLastUpdated = (result && result.lastUpdated) || '';
    App.state.oppSnapshotDates = (result && result.snapshotDates) || [];
    App.state.oppPreviousMap = buildOppRowMap_((result && result.previousRows) || []);
    App.state.oppSnapshotDate = null;
    App.state.oppSnapshotRows = null;
    App.state.oppLatestSnapshotData = (result && result.latestSnapshotData) || null;
    App.state.editedPaths.clear();
    App.oppListLoaded = true;
    App.state.oppListLoaded = true;
    if (_selectedDept && result) {
      ClientCache.set(_selectedDept, 'oppList', result, result.sfLastUpdated || result.lastUpdated);
    }
    App.populateOppFilters();
    App.restoreOppQuarterSelection_();
    App.restoreOppFilterState_();
    App.syncOppQuarterMonths_();
    App.updateEditBadge();
    App.renderOpps();
  },

  runLatestRefresh_(kind) {
    function formatTrace(trace) {
      if (!trace) return '';
      var parts = [];
      if (trace.kind) parts.push('kind=' + String(trace.kind));
      if (trace.stage) parts.push('stage=' + String(trace.stage));
      if (trace.recordedAt) parts.push('at=' + String(trace.recordedAt));
      if (trace.detail) parts.push('detail=' + String(trace.detail));
      return parts.length ? ' trace[' + parts.join(' ') + ']' : '';
    }

    var config = kind === 'fcst'
      ? {
          method: 'refreshSfDataAndGetInitData',
          apply: function(result) { App.applyFcstLatestData_(result); },
          onError: function(message) {
            document.getElementById('fcst-content').innerHTML = '<p style="padding:24px;color:red">' + escapeHtml(message) + '</p>';
          }
        }
      : {
          method: 'refreshSfDataAndGetOpportunities',
          apply: function(result) { App.applyOppLatestData_(result); },
          onError: function(message) { App.showError(message); }
        };

      App.showLoading(true, LOADING_PRESETS.init);
      App.setLoadingStatus_(18, 'Salesforce同期を待っています...', 'Coefficient の処理完了を待っています');
      App.startLoadingSequence_(LOADING_PRESETS.refresh, true);
      google.script.run
        .withSuccessHandler(function(result) {
          if (result && result.error) {
            App.showLoading(false);
            config.onError('サーバーエラー: ' + String(result.error) + formatTrace(result.trace));
            return;
          }
          if (!result || !result.refresh || !result.refresh.ok) {
            App.showLoading(false);
            var refreshInfo = result && result.refresh
              ? ' status=' + String(result.refresh.status || '-') + ' body=' + String(result.refresh.body || '-')
              : '';
            config.onError('更新の実行結果を確認できませんでした。' + refreshInfo + formatTrace(result && result.trace));
            return;
          }
          if (result.refreshTimedOut) {
            App.showLoading(false);
            config.onError(
              'Salesforceデータ取得は開始されましたが、SFデータ更新の最終更新時刻が制限時間内に変わりませんでした。' +
              ' status=' + String(result.refresh.status || '-') +
              ' body=' + String(result.refresh.body || '-') +
              formatTrace(result.trace) +
              ' 少し待ってから再度確認してください。'
            );
            return;
          }
          App.clearLoadingTimers_();
          App.setLoadingStatus_(72, 'データを集計しています', '取得済みデータを画面に反映しています');
          setTimeout(function() {
            config.apply(result);
            App.setLoadingStatus_(92, '最終確認中です', '表示データを整えています');
            setTimeout(function() {
              App.showLoading(false);
            }, 180);
          }, 120);
        })
        .withFailureHandler(function(err) {
          App.showLoading(false);
        config.onError('GAS呼び出しエラー: ' + ((err && err.message) || String(err)));
      })[config.method](_selectedDept);
  },

  reloadFcst() {
      this.state.snapshotDate = null;
      this.state.snapshotViewData = null;
      this.runLatestRefresh_('fcst');
    },

  reloadFcstFromSS() {
    this.state.snapshotDate = null;
    this.state.snapshotViewData = null;
    App.showLoading(true, LOADING_PRESETS.spreadsheet);
    var timeoutId = setTimeout(function() {
      App.showLoading(false);
      document.getElementById('fcst-content').innerHTML =
        '<p style="padding:24px;color:red">タイムアウト: サーバーの応答がありませんでした。ページを再読み込みしてください。</p>';
    }, 60000);
    google.script.run
      .withSuccessHandler(function(result) {
        clearTimeout(timeoutId);
        if (result && result.error) {
          App.showLoading(false);
          document.getElementById('fcst-content').innerHTML = '<p style="padding:24px;color:red">サーバーエラー: ' + escapeHtml(String(result.error)) + '</p>';
          return;
        }
        App.clearLoadingTimers_();
        App.setLoadingStatus_(72, 'データを集計しています', '取得済みデータを画面に反映しています');
        setTimeout(function() {
          App.applyFcstLatestData_(result);
          App.showLoading(false);
        }, 120);
      })
      .withFailureHandler(function(err) {
        clearTimeout(timeoutId);
        App.showLoading(false);
        document.getElementById('fcst-content').innerHTML = '<p style="padding:24px;color:red">GAS呼び出しエラー: ' + escapeHtml((err && err.message) || String(err)) + '</p>';
      })
      .refreshFromSpreadsheet(_selectedDept);

  toggleFilterPanel(view) {
    if (view === 'fcst') {
      this.state.fcstFiltersCollapsed = !this.state.fcstFiltersCollapsed;
      this.persistFcstFilterState_();
      this.renderFcst();
      return;
    }

      this.persistOppFilterState_();
      this.syncOppFilterPanel_();
    }
  },

  renderAll() {
    this.syncTrendBlockOptions_();
    this.renderFcst();
    if (this.state.activeView === 'trend') this.renderTrend();
    if (this.state.activeView === 'opps') this.renderOpps();

  onTabSwitch(tabName) {
    if (tabName !== 'opps') return;
    if (this.oppListLoaded) {
      this.renderOpps();
      return;
    }
    var cached = _selectedDept ? ClientCache.get(_selectedDept, 'oppList') : null;
    if (cached && cached.data) {
      App.renderOppList(cached.data);
      App.oppListLoaded = true;
      App.state.oppListLoaded = true;
      google.script.run
        .withSuccessHandler(function(data) {
          if (data) {
            App.renderOppList(data);
            ClientCache.set(_selectedDept, 'oppList', data, data.sfLastUpdated || data.lastUpdated);
          }
        })
        .getOpportunities(_selectedDept);
      return;
    }
    App.showTabSkeleton('opps');

      .withSuccessHandler(function(data) {
        App.renderOppList(data);
        App.oppListLoaded = true;
        App.state.oppListLoaded = true;
        if (data && _selectedDept) {
          ClientCache.set(_selectedDept, 'oppList', data, data.sfLastUpdated || data.lastUpdated);
        }
      })
      .withFailureHandler(function(err) {
        App.LoadingState.showError('main-content', err, function() {
          App.oppListLoaded = false;
          App.state.oppListLoaded = false;
          App.onTabSwitch('opps');
        });
      })
      .getOpportunities(_selectedDept);
  },

  switchView(view) {
    var features = App.currentFeatures || {};
    var requestedView = view;
    if (view === 'opps' && features.oppList === false) view = getDefaultVisibleView_(features);
    if (view === 'trend' && features.chart === false) view = getDefaultVisibleView_(features);
    var viewEl = document.getElementById('view-' + view);
    if (!viewEl) {
      var fallbackView = getDefaultVisibleView_(features);
      view = fallbackView;
      viewEl = document.getElementById('view-' + view);
    }
    if (!viewEl) {
      console.warn('switchView: target view element not found', {
        requestedView: requestedView,
        resolvedView: view
      });
      return;
    }
    this.state.activeView = view;
    document.querySelectorAll('.view').forEach(function(v) {
      if (v) v.classList.remove('active');
    });
    document.querySelectorAll('.tab').forEach(function(t) {
      if (t) t.classList.toggle('active', t.dataset && t.dataset.view === view);
    });
    viewEl.classList.add('active');

    if (view === 'fcst') this.renderFcst();
    if (view === 'trend') this.renderTrend();
    if (view === 'opps') {
      this.setupOppLayout_();
      this.syncOppFilterPanel_();
      this.onTabSwitch('opps');
    }
  },

  setupOppLayout_() {
    var view = document.getElementById('view-opps');
    if (!view || document.getElementById('opp-filter-toggle')) return;
    var controlRows = view.querySelectorAll('.dept-controls');
    if (controlRows.length < 2) return;
    var topRow = controlRows[0];
    var filterGrid = controlRows[1];
    var periodBar = view.querySelector('.opp-period-bar');
    var weekNav = document.getElementById('opp-week-nav');
    var tableWrap = view.querySelector('.opp-table-wrap');
    var countEl = document.getElementById('opp-count');
    if (tableWrap && !tableWrap.id) tableWrap.id = 'tab-content-opps';

    var toolbar = document.createElement('div');
    toolbar.className = 'view-toolbar';
    toolbar.innerHTML =
      '<button class="save-bar-btn" type="button" onclick="App.reloadOppsFromSS()">再読み込み</button>' +
      '<button class="save-bar-btn primary" type="button" onclick="App.reloadOpps()">SF同期</button>' +
      '<span class="view-toolbar-meta" id="opp-last-updated">最終更新: -</span>' +
      '<span class="view-toolbar-meta" id="opp-count">0件</span>' +
      '<button class="save-bar-btn" type="button" id="opp-filter-toggle" onclick="App.toggleFilterPanel(\'opps\')">フィルタを閉じる</button>';
    topRow.querySelectorAll('button').forEach(function(button) { button.remove(); });
    var oldResetBtn = filterGrid.querySelector('button[onclick="App.resetOppFilters()"]');
    if (oldResetBtn) oldResetBtn.remove();
    if (countEl) countEl.remove();

    while (topRow.firstChild) {
      filterGrid.insertBefore(topRow.lastChild, filterGrid.firstChild);
    }
    topRow.remove();
    filterGrid.querySelectorAll('[style]').forEach(function(el) { el.removeAttribute('style'); });

    var filterPanel = document.createElement('div');
    filterPanel.className = 'view-filter-panel';
    filterPanel.id = 'opp-filter-panel';

    if (periodBar) {
      var quarterWrap = document.getElementById('opp-quarter-chips');
      var monthWrap = document.getElementById('opp-quarter-months');
      periodBar.innerHTML = '';
      var qRow = document.createElement('div');
      qRow.className = 'filter-chip-row';
      qRow.innerHTML = '<span class="filter-chip-label">対象Q:</span>';
      if (quarterWrap) qRow.appendChild(quarterWrap);
      var mRow = document.createElement('div');
      mRow.className = 'filter-chip-row';
      mRow.innerHTML = '<span class="filter-chip-label">対象月:</span>';
      if (monthWrap) mRow.appendChild(monthWrap);
      periodBar.appendChild(qRow);
      periodBar.appendChild(mRow);
    }

    filterPanel.appendChild(filterGrid);
    if (periodBar) filterPanel.appendChild(periodBar);

    view.insertBefore(toolbar, weekNav);
    view.insertBefore(filterPanel, weekNav);
    if (tableWrap) view.appendChild(tableWrap);
  },

  syncOppFilterPanel_() {
    var panel = document.getElementById('opp-filter-panel');
    var btn = document.getElementById('opp-filter-toggle');
    if (panel) panel.classList.toggle('collapsed', !!this.state.oppFiltersCollapsed);
    if (btn) btn.textContent = this.state.oppFiltersCollapsed ? 'フィルタを展開' : 'フィルタを閉じる';
  },

  persistFcstFilterState_() {
    try {
      window.localStorage.setItem('fcstDashboard.fcstFilters', JSON.stringify({
        selectedPeriod: this.state.selectedPeriod || '',
        selectedQuarterKey: this.state.selectedQuarterKey || '',
        selectedGroup: this.state.selectedGroup || '部全体',
        collapsed: !!this.state.fcstFiltersCollapsed
      }));
    } catch (e) {}
  },

  restoreFcstFilterState_() {
    try {
      var raw = window.localStorage.getItem('fcstDashboard.fcstFilters');
      if (!raw) return;
      var payload = JSON.parse(raw) || {};
      if (payload.selectedPeriod) this.state.selectedPeriod = payload.selectedPeriod;
      if (payload.selectedQuarterKey) this.state.selectedQuarterKey = payload.selectedQuarterKey;
      if (payload.selectedGroup) this.state.selectedGroup = payload.selectedGroup;
      this.state.fcstFiltersCollapsed = !!payload.collapsed;
    } catch (e) {}
  },

  persistOppFilterState_() {
    try {
      window.localStorage.setItem('fcstDashboard.oppFilters', JSON.stringify({
        dept: document.getElementById('opp-dept-select').value,
        phase: document.getElementById('opp-phase-select').value,
        type: document.getElementById('opp-type-select').value,
        owner: document.getElementById('opp-owner-select').value,
        forecast: document.getElementById('opp-forecast-select').value,
        dateValue: document.getElementById('opp-date-select').value,
        keyDeal: document.getElementById('opp-keydeal-select').value,
        nameQuery: document.getElementById('opp-name-search').value || '',
        collapsed: !!this.state.oppFiltersCollapsed
      }));
    } catch (e) {}
  },

  restoreOppFilterState_() {
    try {
      var raw = window.localStorage.getItem('fcstDashboard.oppFilters');
      if (!raw) return;
      var payload = JSON.parse(raw) || {};
      [
        ['opp-dept-select', payload.dept],
        ['opp-phase-select', payload.phase],
        ['opp-type-select', payload.type],
        ['opp-owner-select', payload.owner],
        ['opp-forecast-select', payload.forecast],
        ['opp-date-select', payload.dateValue],
        ['opp-keydeal-select', payload.keyDeal]
      ].forEach(function(entry) {
        var el = document.getElementById(entry[0]);
        if (el && entry[1] && selectContainsValue_(el, entry[1])) el.value = entry[1];
      });
      var search = document.getElementById('opp-name-search');
      if (search) search.value = payload.nameQuery || '';
      this.state.oppFiltersCollapsed = !!payload.collapsed;
    } catch (e) {}
  },

  selectPeriod(period) {
    this.state.selectedPeriod = period;
    this.persistFcstFilterState_();
    this.renderFcst();
  },

  selectQuarter(quarterKey) {
    this.state.selectedQuarterKey = quarterKey;
    this.state.selectedPeriod = quarterKey;
    this.persistFcstFilterState_();
    this.renderFcst();
  },

  selectGroup(groupName) {
    this.state.selectedGroup = groupName;
    this.persistFcstFilterState_();
    this.renderFcst();
  },

  renderFcst() {
    var currentData = this.state.currentData;
    if (!currentData || !Array.isArray(currentData.members)) {
      document.getElementById('fcst-content').innerHTML = '<p style="padding:24px;color:var(--color-text-sub)">\u30c7\u30fc\u30bf\u3092\u6e96\u5099\u4e2d\u3067\u3059\u3002\u3057\u3070\u3089\u304f\u304a\u5f85\u3061\u304f\u3060\u3055\u3044...</p>';
      return;
    }
    var viewData = App.state.snapshotDate && App.state.snapshotViewData
      ? App.state.snapshotViewData
      : (App.state.currentData || {});
    var periodOptions = (App.state.currentData && App.state.currentData.periodOptions) || viewData.periodOptions || [];
    if (!this.state.selectedQuarterKey || !periodOptions.some(function(option) { return option.key === App.state.selectedQuarterKey; })) {
      this.state.selectedQuarterKey = periodOptions.length ? periodOptions[0].key : '';
    }
    if (!this.state.selectedPeriod || !isValidFcstPeriod_(periodOptions, this.state.selectedPeriod)) {
      this.state.selectedPeriod = this.state.selectedQuarterKey;
    }
    var period = this.state.selectedPeriod;
    var selectedQuarter = findFcstQuarterOption_(periodOptions, this.state.selectedQuarterKey) || periodOptions[0] || null;
    var members = viewData.members || [];
    var notes = viewData.notes || (App.state.currentData && App.state.currentData.notes) || {};
    var fcstAdjForView = App.state.snapshotDate && App.state.snapshotViewData
      ? (App.state.snapshotViewData.fcstAdjusted || {})
      : App.state.fcstAdjusted;
    var wowForView = App.state.snapshotDate && App.state.snapshotViewData
      ? (App.state.snapshotViewData.weekOverWeekMap || {})
      : App.state.wowMap;

    var overallTotal = members.find(function(m) { return isDepartmentTotalMember_(m); }) || null;
    var groupTotals = members.filter(function(m) { return isGroupTotalMember_(m); });
    var individuals = members.filter(function(m) { return m && !m.isTotal; });

    var membersByGroup = {};
    individuals.forEach(function(m) {
      var g = getMemberGroupLabel_(m);
      if (!membersByGroup[g]) membersByGroup[g] = [];
      membersByGroup[g].push(m);
    });

    var seenGroups = {};
    var groupNames = groupTotals.map(function(m) { return getMemberGroupLabel_(m); }).filter(function(name) {
      if (!name || seenGroups[name]) return false;
      seenGroups[name] = true;
      return true;
    });
    var selectedGroup = this.state.selectedGroup;
    if (selectedGroup !== '\u90e8\u5168\u4f53' && groupNames.indexOf(selectedGroup) === -1) {
      this.state.selectedGroup = '\u90e8\u5168\u4f53';
      selectedGroup = '\u90e8\u5168\u4f53';
    }

    var breakdownCols = [
      { key: 'target', label: '\u76ee\u6a19', className: 'metric-target', noToggle: true, isTarget: true },
      { key: 'fcstAdjusted', label: 'FCST(\u8abf\u6574\u5f8c)', className: 'metric-fcst-adjusted', editable: true },
      { key: 'fcstCommit', label: 'FCST(\u30b3\u30df\u30c3\u30c8)', className: 'metric-fcst-commit' },
      { key: 'confirmed', label: '\u78ba\u5b9a', className: 'metric-confirmed' },
      { key: 'expectedMrr', label: '\u671f\u5f85MRR', className: 'metric-expected' },
    ];
    if (hasProposalProducts_()) {
      breakdownCols = breakdownCols.concat([
        { key: 'received', label: '\u53d7\u9818', className: 'metric-received' },
        { key: 'debtMgmt', label: '\u50b5\u52d9\u7ba1\u7406', className: 'metric-debt' },
        { key: 'debtMgmtLite', label: '\u50b5\u52d9\u7ba1\u7406 Lite', className: 'metric-debt-lite' },
        { key: 'expense', label: '\u7d4c\u8cbb', className: 'metric-expense' },
      ]);
    }

    var html = '<div class="fcst-view-shell"><div class="fcst-view-head">';
    html += '<div class="view-toolbar">';
    html += '<button class="save-bar-btn" type="button" onclick="App.reloadFcstFromSS()">再読み込み</button>';
    html += '<button class="save-bar-btn primary" type="button" onclick="App.reloadFcst()">SF同期</button>';
    var _stalenessHtml = '';
    if (App.state.sfLastUpdated) {
      var _updatedAt = new Date(App.state.sfLastUpdated);
      if (!isNaN(_updatedAt) && (Date.now() - _updatedAt.getTime() > 3600000)) {
        _stalenessHtml = '<span class="freshness-warning">\u26a0\ufe0f データが1時間以上前のものです</span>';
      }
    }
    html += '<span class="view-toolbar-meta">\u6700\u7d42\u66f4\u65b0: ' + escapeHtml(App.state.lastUpdated || '-') + '</span>' + _stalenessHtml;
    html += '<button class="save-bar-btn" type="button" onclick="App.toggleFilterPanel(\'fcst\')">' + (this.state.fcstFiltersCollapsed ? '\u30d5\u30a3\u30eb\u30bf\u3092\u5c55\u958b' : '\u30d5\u30a3\u30eb\u30bf\u3092\u9589\u3058\u308b') + '</button>';
    html += '</div>';
    var isLive = !App.state.snapshotDate;
    var dates = App.state.snapshotDates;
    var curDateLabel = isLive ? '\u4eca\u9031' : formatOppSnapshotLabel_(App.state.snapshotDate);
    var canGoPrev = isLive ? (dates.length > 0) : true;
    var canGoNext = !isLive;
    html += '<div class="view-filter-panel' + (this.state.fcstFiltersCollapsed ? ' collapsed' : '') + '">';
    html += '<div class="filter-chip-row"><span class="filter-chip-label">\u5bfe\u8c61Q:</span><div class="quarter-chips">';
    periodOptions.forEach(function(option) {
      html += '<span class="chip' + (App.state.selectedQuarterKey === option.key ? ' active' : '') + '" onclick="App.selectQuarter(\'' + escapeAttr(option.key) + '\')">' + escapeHtml(option.label) + '</span>';
    });
    html += '</div></div>';
    html += '<div class="filter-chip-row"><span class="filter-chip-label">\u5bfe\u8c61\u6708:</span><div class="period-chips">';
    if (selectedQuarter) {
      html += '<span class="chip' + (period === selectedQuarter.key ? ' active' : '') + '" onclick="App.selectPeriod(\'' + escapeAttr(selectedQuarter.key) + '\')">' + escapeHtml(selectedQuarter.label) + '</span>';
      (selectedQuarter.months || []).forEach(function(monthKey) {
        html += '<span class="chip' + (period === monthKey ? ' active' : '') + '" onclick="App.selectPeriod(\'' + escapeAttr(monthKey) + '\')">' + escapeHtml(formatFcstMonthLabel_(monthKey)) + '</span>';
      });
    }
    html += '</div></div>';
    html += '<div class="filter-chip-row"><span class="filter-chip-label">\u30b0\u30eb\u30fc\u30d7:</span><div class="group-chips">';
    html += '<span class="chip' + (selectedGroup === '\u90e8\u5168\u4f53' ? ' active' : '') + '" onclick="App.selectGroup(\'\\u90e8\\u5168\\u4f53\')">\u90e8\u5168\u4f53</span>';
    groupNames.forEach(function(gn) {
      html += '<span class="chip' + (selectedGroup === gn ? ' active' : '') + '" onclick="App.selectGroup(\'' + escapeAttr(gn) + '\')">' + escapeHtml(gn) + '</span>';
    });
    html += '</div></div></div>';
    html += '<div class="week-nav-bar">';
    html += '<button class="week-nav-btn" ' + (canGoPrev ? '' : 'disabled') + ' onclick="App.weekNavPrev()">\u25c4</button>';
    html += '<span class="week-nav-label' + (isLive ? ' week-nav-live' : '') + '">' + escapeHtml(curDateLabel) + '</span>';
    html += '<button class="week-nav-btn" ' + (canGoNext ? '' : 'disabled') + ' onclick="App.weekNavNext()">\u25ba</button>';
    if (!isLive) html += '<button class="week-nav-btn week-nav-today" onclick="App.weekNavToday()">\u4eca\u9031</button>';
    html += '</div>';

    var displayRows = [];
    if (selectedGroup === '\u90e8\u5168\u4f53') {
      if (overallTotal) displayRows.push(overallTotal);
      groupTotals.forEach(function(groupTotal) { displayRows.push(groupTotal); });
    } else {
      var gt = groupTotals.find(function(m) { return getMemberGroupLabel_(m) === selectedGroup; });
      if (gt) displayRows.push(gt);
      (membersByGroup[selectedGroup] || []).forEach(function(m) { displayRows.push(m); });
    }

    var isGlobalView = selectedGroup === '\u90e8\u5168\u4f53';
    html += '</div>';
    html += App.renderFcstTable_(displayRows, period, notes, breakdownCols, isGlobalView, fcstAdjForView, wowForView);
    html += '</div>';
    document.getElementById('fcst-content').innerHTML = html;
  },

  renderFcstTable_(displayRows, period, notes, breakdownCols, isGlobalView, fcstAdjMap, weekOverWeekMap) {
    var fcstAdj = fcstAdjMap || {};
    var wowMap = weekOverWeekMap || {};
    var isSnapshotMode = !!App.state.snapshotDate;
    var keyDealsExpanded = !!App.state.expandedAll.keyDeals;
    var notesExpanded = !!App.state.expandedAll.notes;
    var html = '<div class="expand-all-bar">';
    html += '<button class="expand-all-btn' + (keyDealsExpanded ? ' active' : '') + '" onclick="App.toggleExpandAll(\'keyDeals\')">Key Deal展開</button>';
    html += '<button class="expand-all-btn' + (notesExpanded ? ' active' : '') + '" onclick="App.toggleExpandAll(\'notes\')">備考・メモ展開</button>';
    html += '</div>';
    html += '<div class="table-wrapper fcst-table-wrap"><table><thead>';
    html += '<tr>';
    html += '<th rowspan="2" class="col-group col-group-start th-person">\u62c5\u5f53\u8005</th>';
    breakdownCols.forEach(function(col) {
      var expanded = !!App.state.expandedMetrics[col.key];
      var btnLabel = expanded ? '\u2212' : '\uff0b';
      html += '<th colspan="' + (expanded ? '3' : '1') + '" class="col-group col-group-start ' + col.className + '">';
      html += escapeHtml(col.label) + '<button class="col-expand-btn" onclick="App.toggleMetricDetails(\'' + col.key + '\')">' + btnLabel + '</button>';
      html += '</th>';
    });
    html += '<th rowspan="2" class="col-group col-group-start th-keydeal keydeal-col">Key Deal</th>';
    html += '<th rowspan="2" class="col-group col-group-start th-notes notes-col">\u5099\u8003\u30fb\u30e1\u30e2</th>';
    html += '</tr>';
    html += '<tr>';
    breakdownCols.forEach(function(col) {
      var expanded = !!App.state.expandedMetrics[col.key];
      var colDiff = App.state.diffToggles[col.key] || {};
      html += '<th class="sub-header sub-header-net col-group-start">Net';
      if (!col.noToggle) {
        var netD = colDiff.net || {};

          html += '<button class="diff-toggle-btn' + (newExpD.target ? ' active' : '') + '" onclick="App.toggleDiff(\'' + col.key + '\', \'newExp\', \'target\')">\u76ee\u6a19\u5dee</button>';

          html += '<button class="diff-toggle-btn' + (churnD.target ? ' active' : '') + '" onclick="App.toggleDiff(\'' + col.key + '\', \'churn\', \'target\')">\u76ee\u6a19\u5dee</button>';
        }
        html += '</th>';

    });
    html += '</tr>';
    html += '</thead><tbody>';

    displayRows.forEach(function(member) {
      var rd = member && member[period] ? member[period] : {};
      var memberKey = member.name + '|' + period;
      var hasFcstAdjusted = Object.prototype.hasOwnProperty.call(fcstAdj, memberKey);
      rd.fcstAdjusted = hasFcstAdjusted ? fcstAdj[memberKey] : { net: 0, newExp: 0, churn: 0 };
      var noteKey = member.name + '|' + period;
      var noteVal = notes[noteKey] || '';
      var isTotal = member.isTotal;

      html += '<tr' + rowClass + '>';
      html += '<td class="td-person">' + (isTotal ? '' : '\u3000') + escapeHtml(displayMemberName(member)) + '</td>';
      breakdownCols.forEach(function(col) {
        var b;
        if (col.isTarget) {
          var netVal = typeof rd.target === 'number' ? rd.target : ((rd.target && rd.target.net) || 0);
          b = { net: netVal, newExp: 0, churn: 0 };
        } else {
          b = rd[col.key] || { net: 0, newExp: 0, churn: 0 };
        }
        var expanded = !!App.state.expandedMetrics[col.key];
        var colDiff = App.state.diffToggles[col.key] || {};
        var netD = colDiff.net || {};
        var newExpD = colDiff.newExp || {};
        var churnD = colDiff.churn || {};
        var wowEntry = (weekOverWeekMap && weekOverWeekMap[memberKey] && weekOverWeekMap[memberKey][col.key])
          ? weekOverWeekMap[memberKey][col.key]
          : { net: 0, newExp: 0, churn: 0 };
        var targetBreakdown = (typeof rd.target === 'object' && rd.target !== null)
          ? rd.target
          : { net: (rd.target || 0), newExp: 0, churn: 0 };
        var targetDiffNet = (b.net || 0) - targetBreakdown.net;
        var targetDiffNewExp = (b.newExp || 0) - targetBreakdown.newExp;
        var targetDiffChurn = (b.churn || 0) - targetBreakdown.churn;

        if (col.editable && !col.isTarget) {
          var adjCell = isSnapshotMode
            ? '<span class="' + valClassNum(b.net) + '">' + fmtNum(b.net) + '</span>'
            : App.renderFcstAdjCell_(member.name, period, 'net', b.net, hasFcstAdjusted);
          var adjNetBadges = '';
          if (!col.noToggle && !isSnapshotMode && netD.wow) {
            adjNetBadges += '<span class="diff-badge ' + diffBadgeClass_(wowEntry.net) + '">' + fmtDiffNum(wowEntry.net) + '</span>';
          }
          html += '<td class="col-group-start">' + adjCell + adjNetBadges + '</td>';
        } else {
          var netVal = typeof b === 'number' ? b : (b.net || 0);
          var netBadges = '';
          if (!col.noToggle) {
            if (netD.wow) {
              netBadges += '<span class="diff-badge ' + diffBadgeClass_(wowEntry.net) + '">' + fmtDiffNum(wowEntry.net) + '</span>';
            }
            if (netD.target) {
              netBadges += '<span class="diff-badge ' + diffBadgeClass_(targetDiffNet) + '">' + fmtDiffNum(targetDiffNet) + '</span>';
            }
          }
          html += '<td class="col-group-start"><span class="' + valClassNum(netVal) + '">' + fmtNum(netVal) + '</span>' + netBadges + '</td>';
        }
        if (expanded) {
          if (col.editable && !isSnapshotMode) {
            var adjNewExpBadge = '';
            if (!col.noToggle) {
              if (newExpD.wow) {
                adjNewExpBadge += '<span class="diff-badge ' + diffBadgeClass_(wowEntry.newExp) + '">' + fmtDiffNum(wowEntry.newExp) + '</span>';
              }
              if (newExpD.target) {
                adjNewExpBadge += '<span class="diff-badge ' + diffBadgeClass_(targetDiffNewExp) + '">' + fmtDiffNum(targetDiffNewExp) + '</span>';
              }
            }
            html += '<td>' + App.renderFcstAdjCell_(member.name, period, 'newExp', b.newExp, hasFcstAdjusted) + adjNewExpBadge + '</td>';

            var adjChurnBadge = '';
            if (!col.noToggle) {
              if (churnD.wow) {
                adjChurnBadge += '<span class="diff-badge ' + diffBadgeClass_(wowEntry.churn) + '">' + fmtDiffNum(wowEntry.churn) + '</span>';
              }
              if (churnD.target) {
                adjChurnBadge += '<span class="diff-badge ' + diffBadgeClass_(targetDiffChurn) + '">' + fmtDiffNum(targetDiffChurn) + '</span>';
              }
            }
            html += '<td>' + App.renderFcstAdjCell_(member.name, period, 'churn', b.churn, hasFcstAdjusted) + adjChurnBadge + '</td>';
          } else {
            var newExpBadge = '';
            if (!col.noToggle) {
              if (newExpD.wow) {
                newExpBadge += '<span class="diff-badge ' + diffBadgeClass_(wowEntry.newExp) + '">' + fmtDiffNum(wowEntry.newExp) + '</span>';
              }
              if (newExpD.target) {
                newExpBadge += '<span class="diff-badge ' + diffBadgeClass_(targetDiffNewExp) + '">' + fmtDiffNum(targetDiffNewExp) + '</span>';
              }
            }
            html += '<td><span class="val-positive">' + fmtNum(b.newExp) + '</span>' + newExpBadge + '</td>';

            var churnBadge = '';
            if (!col.noToggle) {
              if (churnD.wow) {
                churnBadge += '<span class="diff-badge ' + diffBadgeClass_(wowEntry.churn) + '">' + fmtDiffNum(wowEntry.churn) + '</span>';
              }
              if (churnD.target) {
                churnBadge += '<span class="diff-badge ' + diffBadgeClass_(targetDiffChurn) + '">' + fmtDiffNum(targetDiffChurn) + '</span>';
              }
            }
            html += '<td><span class="val-negative">' + fmtNum(b.churn) + '</span>' + churnBadge + '</td>';
          }
        }
      });
      var kdText = (rd.keyDeals || []).map(function(kd) {
        return escapeHtml(kd.company + ' ' + fmtMan(kd.monthlyMrr) + '/' + kd.phase + '/' + fmtMan(kd.fcst));
      }).join('<br>');
      html += '<td class="td-keydeal">' + App.renderKeyDealCell_(member, period, rd.keyDeals || [], kdText) + '</td>';
      html += '<td class="td-notes">' + App.renderNoteCell_(member, period, noteVal) + '</td>';
      html += '</tr>';
    });

    html += '</tbody></table></div>';
    return html;
  },

  toggleMetricDetails(metricKey) {
    this.state.expandedMetrics[metricKey] = !this.state.expandedMetrics[metricKey];
    this.renderFcst();
  },

  toggleExpandAll(key) {
    this.state.expandedAll[key] = !this.state.expandedAll[key];
    this.renderFcst();
  },

  toggleDiff(metricKey, subCol, type) {
    if (!App.state.diffToggles[metricKey]) App.state.diffToggles[metricKey] = {};
    if (!App.state.diffToggles[metricKey][subCol]) App.state.diffToggles[metricKey][subCol] = {};
    App.state.diffToggles[metricKey][subCol][type] = !App.state.diffToggles[metricKey][subCol][type];
    App.renderFcst();
  },

  toggleNoteExpand(name, period) {
    var key = name + '|' + period;
    if (App.state.expandedNoteKeys[key]) {
      delete App.state.expandedNoteKeys[key];
    } else {
      App.state.expandedNoteKeys[key] = true;
    }
    App.renderFcst();
  },

  weekNavPrev() {
    var dates = App.state.snapshotDates;
    if (!dates.length) return;
    if (!App.state.snapshotDate) {
      App.loadSnapshotByDate_(dates[0]);
    } else {
      var idx = dates.indexOf(App.state.snapshotDate);
      if (idx < dates.length - 1) App.loadSnapshotByDate_(dates[idx + 1]);
    }
  },

  weekNavNext() {
    var dates = App.state.snapshotDates;
    if (!App.state.snapshotDate) return;
    var idx = dates.indexOf(App.state.snapshotDate);
    if (idx > 0) {
      App.loadSnapshotByDate_(dates[idx - 1]);
    } else {
      App.weekNavToday();
    }
  },

  weekNavToday() {
    App.state.snapshotDate = null;
    App.state.snapshotViewData = null;
    App.renderFcst();
  },

    loadSnapshotByDate_(dateStr) {
      if (App.state.latestSnapshotData && App.state.latestSnapshotData.date === dateStr) {
        App.state.snapshotDate = dateStr;
        App.state.snapshotViewData = App.state.latestSnapshotData;
        App.renderFcst();
        return;
      }
      if (App.state.snapshotViewData && App.state.snapshotViewData.date === dateStr) {
        App.state.snapshotDate = dateStr;
        App.renderFcst();
        return;
      }
    App.showLoading(true, LOADING_PRESETS.snapshot);
      google.script.run
      .withSuccessHandler(function(result) {
        App.showLoading(false);
          if (result.error) { alert('\u8aad\u307f\u8fbc\u307f\u30a8\u30e9\u30fc: ' + result.error); return; }
          App.state.snapshotDate = dateStr;
          App.state.snapshotViewData = result;
          if (App.state.snapshotDates[0] === dateStr) App.state.latestSnapshotData = result;
          App.renderFcst();
        })
      .withFailureHandler(function(e) {
        App.showLoading(false);
        alert('\u30a8\u30e9\u30fc: ' + ((e && e.message) || e));
      })
      .getSnapshotData(_selectedDept, dateStr);
  },

  renderFcstAdjCell_(name, period, field, value, hasSavedValue) {
    var displayVal = hasSavedValue ? fmtNum(value) : '\u672a\u5165\u529b';
    return '<span class="fcst-adj-cell ' + valClassNum(value) + '" ' +
      'data-name="' + escapeAttr(name) + '" ' +
      'data-period="' + escapeAttr(period) + '" ' +
      'data-field="' + field + '" ' +
      'data-val="' + (Number(value) || 0) + '" ' +
      'data-has-saved="' + (hasSavedValue ? 'true' : 'false') + '" ' +
      'onclick="App.activateFcstAdjInput(this)">' +
      displayVal + '</span>';
  },

  activateFcstAdjInput(el) {
    var name = el.dataset.name;
    var period = el.dataset.period;
    var field = el.dataset.field;
    var val = Number(el.dataset.val) || 0;
    var hasSavedValue = el.dataset.hasSaved === 'true';
    var input = document.createElement('input');
    input.type = 'number';
    input.className = 'edit-input fcst-adj-input';
    input.value = (hasSavedValue || val !== 0) ? String(val) : '';
    input.style.width = '80px';
    el.replaceWith(input);
    input.focus();
    input.select();
    var committed = false;
    var commit = function() {
      if (committed) return;
      committed = true;
      var newVal = input.value === '' ? 0 : (Number(input.value) || 0);
      App.commitFcstAdj(name, period, field, newVal);
    };
    input.addEventListener('blur', commit);
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        input.removeEventListener('blur', commit);
        commit();
      }
      if (e.key === 'Escape') {
        committed = true;
        App.renderFcst();
      }
    });
  },

  commitFcstAdj(name, period, field, newVal) {
    var key = name + '|' + period;
    var adj = Object.assign({ net: 0, newExp: 0, churn: 0 }, App.state.fcstAdjusted[key] || {});
    if (field === 'net') {
      adj.net = newVal;
      adj.newExp = 0;
      adj.churn = 0;
    } else {
      adj[field] = newVal;
      adj.net = (Number(adj.newExp) || 0) + (Number(adj.churn) || 0);
    }
    App.state.fcstAdjusted[key] = adj;
    App.renderFcst();
    google.script.run
      .withSuccessHandler(function(r) { if (r && r.error) alert('\u4fdd\u5b58\u5931\u6557: ' + r.error); })
      .withFailureHandler(function(e) { alert('\u4fdd\u5b58\u5931\u6557: ' + ((e && e.message) || e)); })
      .saveFcstAdjusted2(_selectedDept, { name: name, period: period, net: adj.net, newExp: adj.newExp, churn: adj.churn });
  },

  openKeyDealModal(name, period) {

    var body = '';

      ? this.state.snapshotViewData
