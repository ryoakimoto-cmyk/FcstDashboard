    textarea.style.borderColor = '';
    google.script.run
      .withSuccessHandler(function(r) {
        if (r && r.error) console.error('saveNote error:', r.error);
      })
      .withFailureHandler(function(e) { console.error('saveNote failed:', e); })
      .saveNote(_selectedDept, { name: name, period: period, note: note });
  },

  renderTrend() {
    this.syncTrendBlockOptions_();
    const block = document.getElementById('trend-block-select').value;
    document.getElementById('trend-title').textContent = blockLabel(block) + ' 謗ｨ遘ｻ (Net MRR)';
    document.getElementById('trend-period-badge').textContent = blockLabel(block);
    App.showLoading(true, LOADING_PRESETS.trend);
      google.script.run.withSuccessHandler(function(data) {
      if (data.error) { App.showError(data.error); return; }
      App.showLoading(false);
      App.renderTrendWithData(data);
    }).withFailureHandler(App.showError).getTrendData(_selectedDept, block);
  },

  renderTrendWithData(data) {
    const vis = this.state.visibleSeries;
    const datasets = [
      { key: 'target', label: '目標', color: '#dadce0', dash: [6, 3] },
      { key: 'fcstAdjusted', label: 'FCST(隱ｿ謨ｴ蠕・', color: '#1a73e8', dash: [] },
      { key: 'fcstCommit', label: 'FCST(コミット)', color: '#7c4dff', dash: [4, 2] },
      { key: 'confirmed', label: '確定MRR', color: '#0b8043', dash: [] },
      { key: 'expectedMrr', label: '期待MRR', color: '#f29900', dash: [5, 3] },
    ].filter(function(item) { return vis[item.key]; }).map(function(item) {
      return {
        label: item.label,
        data: data.series[item.key] || [],
        borderColor: item.color,
        backgroundColor: item.color + '18',
        borderWidth: item.key === 'target' ? 1.5 : 2,
        borderDash: item.dash,
        pointRadius: 4,
        pointHoverRadius: 6,
        tension: 0.3,
        fill: false,
      };
    });

    if (this.state.trendChart) this.state.trendChart.destroy();
    const ctx = document.getElementById('trend-chart').getContext('2d');
    this.state.trendChart = new Chart(ctx, {
      type: 'line',
      data: { labels: data.weeks || [], datasets: datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: true, position: 'top', labels: { font: { size: 12 }, padding: 16, usePointStyle: true } },
          tooltip: {
            backgroundColor: 'rgba(32,33,36,0.9)',
            padding: 12,
            callbacks: { label: function(ctx) { return ' ' + ctx.dataset.label + ': ' + fmtNum(ctx.parsed.y); } }
          }
        },
        scales: {
          x: { grid: { color: '#f1f3f4' }, ticks: { font: { size: 12 } } },
          y: { grid: { color: '#f1f3f4' }, ticks: { font: { size: 12 }, callback: function(v) { return fmtNum(v); } } }
        }
      }
    });

    const latest = lastValue(data.series.fcstAdjusted);
    const prev = prevValue(data.series.fcstAdjusted);
    const target = lastValue(data.series.target);
    const diff = latest - prev;
    const statsHtml = [
      { lbl: 'FCST(調整後) Net', val: fmtNum(latest), cls: 'val-neutral' },
      { lbl: '先週比 Net', val: fmtDiffNum(diff), cls: diff >= 0 ? 'val-positive' : 'val-negative' },
      { lbl: '目標差達成率', val: target ? Math.round(latest / target * 100) + '%' : '-', cls: latest >= target ? 'val-positive' : 'val-negative' },
    ].map(function(stat) {
      return '<div class="trend-stat"><div class="ts-label">' + stat.lbl + '</div><div class="ts-val ' + stat.cls + '">' + stat.val + '</div></div>';
    }).join('');
    document.getElementById('trend-stats').innerHTML = statsHtml;
  },

  syncTrendBlockOptions_() {
    var select = document.getElementById('trend-block-select');
    if (!select) return;
    var periodOptions = (this.state.currentData && this.state.currentData.periodOptions) || [];
    var current = select.value || '';
    var entries = [];
    (periodOptions || []).forEach(function(option) {
      entries.push({ key: option.key, label: option.label });
      (option.months || []).forEach(function(monthKey) {
        entries.push({ key: monthKey, label: formatFcstMonthLabel_(monthKey) });
      });
    });
    if (!entries.length) return;
    select.innerHTML = entries.map(function(entry) {
      return '<option value="' + escapeAttr(entry.key) + '">' + escapeHtml(entry.label) + '</option>';
    }).join('');
    if (entries.some(function(entry) { return entry.key === current; })) {
      select.value = current;
    } else {
      select.value = entries[0].key;
    }
  },

  populateOppFilters() {
    var rows = this.getOppRowsForView_();
    preserveSelectOptions_('opp-dept-select', uniqueValues(rows, 'dept'));
    preserveSelectOptions_('opp-phase-select', uniqueValues(rows, 'phase'));
    preserveSelectOptions_('opp-type-select', uniqueValues(rows, 'type'));
    preserveSelectOptions_('opp-owner-select', uniqueValues(rows, 'subOwner'));
    preserveSelectOptions_('opp-forecast-select', uniqueValues(rows, 'forecast'));
    preserveSelectOptions_('opp-date-select', uniqueValues(rows, 'scheduleOrCloseDate'));
    this.populateOppQuarterSelect_();
    this.syncOppQuarterMonths_();
  },

  populateOppQuarterSelect_() {
    var wrap = document.getElementById('opp-quarter-chips');
    if (!wrap) return;
    var defs = getOppQuarterDefinitions_();
    if (!defs.length) {
      App.state.oppSelectedQuarter = '';
      wrap.innerHTML = '';
      wrap.classList.remove('show');
      return;
    }
    if (!defs.some(function(def) { return def.key === App.state.oppSelectedQuarter; })) {
      App.state.oppSelectedQuarter = defs[0].key;
    }
    var html = defs.map(function(def) {
      var active = App.state.oppSelectedQuarter === def.key;
      return '<button type="button" class="chip' + (active ? ' active' : '') + '" onclick="App.changeOppQuarter(\'' + escapeAttr(def.key) + '\')">' + escapeHtml(def.label) + '</button>';
    }).join('');
    wrap.innerHTML = html;
    wrap.classList.toggle('show', defs.length > 0);
  },

  changeOppQuarter(quarterKey) {
    this.state.oppSelectedQuarter = quarterKey || this.state.oppSelectedQuarter;
    this.populateOppQuarterSelect_();
    this.syncOppQuarterMonths_(true);
    this.persistOppQuarterSelection_();
    this.persistOppFilterState_();
    this.renderOpps();
  },

  syncOppQuarterMonths_(reset) {
    var quarterKey = this.state.oppSelectedQuarter || '';
    if (!quarterKey) {
      this.state.oppQuarterMonths = [];
      this.renderOppQuarterMonths_();
      return;
    }

    var def = getOppQuarterDefinition_(quarterKey);
    if (!def) {
      this.state.oppQuarterMonths = [];
      this.renderOppQuarterMonths_();
      return;
    }

    if (reset || !sameMonthSelection_(this.state.oppQuarterMonths, def.months)) {
      this.state.oppQuarterMonths = def.months.slice();
    }
    this.persistOppQuarterSelection_();
    this.renderOppQuarterMonths_();
  },

  renderOppQuarterMonths_() {
    var wrap = document.getElementById('opp-quarter-months');
    if (!wrap) return;
    var quarterKey = this.state.oppSelectedQuarter || '';
    if (!quarterKey) {
      wrap.innerHTML = '';
      wrap.classList.remove('show');
      return;
    }

    var def = getOppQuarterDefinition_(quarterKey);
    if (!def) {
      wrap.innerHTML = '';
      wrap.classList.remove('show');
      return;
    }

    wrap.classList.add('show');
    wrap.innerHTML = def.months.map(function(monthKey) {
      var active = App.state.oppQuarterMonths.indexOf(monthKey) !== -1;
      return '<button type="button" class="chip' + (active ? ' active' : '') + '" onclick="App.toggleOppQuarterMonth(\'' + monthKey + '\')">' + escapeHtml(formatOppMonthLabel_(monthKey)) + '</button>';
    }).join('');
  },

  toggleOppQuarterMonth(monthKey) {
    var idx = this.state.oppQuarterMonths.indexOf(monthKey);
    if (idx === -1) this.state.oppQuarterMonths.push(monthKey);
    else this.state.oppQuarterMonths.splice(idx, 1);
    this.persistOppQuarterSelection_();
    this.persistOppFilterState_();
    this.renderOppQuarterMonths_();
    this.renderOpps();
  },

  persistOppQuarterSelection_() {
    try {
      var payload = {
        quarter: this.state.oppSelectedQuarter || '',
        months: (this.state.oppQuarterMonths || []).slice()
      };
      window.localStorage.setItem('fcstDashboard.oppQuarterSelection', JSON.stringify(payload));
    } catch (e) {}
  },

  restoreOppQuarterSelection_() {
    try {
      var raw = window.localStorage.getItem('fcstDashboard.oppQuarterSelection');
      if (!raw) return;
      var payload = JSON.parse(raw);
      var defs = getOppQuarterDefinitions_();
      this.state.oppSelectedQuarter = defs.some(function(def) {
        return def.key === (payload && payload.quarter);
      }) ? payload.quarter : (defs[0] ? defs[0].key : '');
      this.state.oppQuarterMonths = Array.isArray(payload && payload.months) ? payload.months.slice() : [];
      this.populateOppQuarterSelect_();
    } catch (e) {}
  },

  toggleOppDiff(field) {
    this.state.oppDiffToggles[field] = !this.state.oppDiffToggles[field];
    this.renderOpps();
  },

  resetOppFilters() {
    [
      'opp-dept-select',
      'opp-phase-select',
      'opp-type-select',
      'opp-owner-select',
      'opp-forecast-select',
      'opp-date-select',
      'opp-keydeal-select'
    ].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.value = 'all';
    });
    var search = document.getElementById('opp-name-search');
    if (search) search.value = '';
    this.state.oppSelectedQuarter = '';
    this.state.oppQuarterMonths = [];
    this.populateOppQuarterSelect_();
    this.persistOppQuarterSelection_();
    this.persistOppFilterState_();
    this.renderOppQuarterMonths_();
    this.renderOpps();
  },

  reloadOpps() {
    App.oppListLoaded = false;
    App.state.oppListLoaded = false;
    App.runLatestRefresh_('opps');
  },

  reloadOppsFromSS() {
    App.oppListLoaded = false;
    App.state.oppListLoaded = false;
    App.showLoading(true, LOADING_PRESETS.spreadsheet);
    var timeoutId = setTimeout(function() {
      App.showLoading(false);
      document.getElementById('opp-content').innerHTML =
        '<p style="padding:24px;color:red">タイムアウト: サーバーの応答がありませんでした。ページを再読み込みしてください。</p>';
    }, 60000);
    google.script.run
      .withSuccessHandler(function(result) {
        clearTimeout(timeoutId);
        if (result && result.error) {
          App.showError(result.error);
          return;
        }
        App.clearLoadingTimers_();
        App.setLoadingStatus_(72, 'データを集計しています', '取得済みデータを画面に反映しています');
        setTimeout(function() {
          App.applyOppLatestData_(result);
          App.showLoading(false);
        }, 120);
      })
      .withFailureHandler(function(err) {
        clearTimeout(timeoutId);
        App.showError(err);
      })
      .getOpportunities(_selectedDept);
  },

  getOppRowsForView_() {
    return this.state.oppSnapshotDate ? (this.state.oppSnapshotRows || []) : this.state.opps;
  },

  getOppFilterState_() {
    return {
      dept: document.getElementById('opp-dept-select').value,
      phase: document.getElementById('opp-phase-select').value,
      type: document.getElementById('opp-type-select').value,
      quarter: this.state.oppSelectedQuarter || '',
      owner: document.getElementById('opp-owner-select').value,
      forecast: document.getElementById('opp-forecast-select').value,
      dateValue: document.getElementById('opp-date-select').value,
      keyDeal: document.getElementById('opp-keydeal-select').value,
      nameQuery: String(document.getElementById('opp-name-search').value || '').trim().toLowerCase()
    };
  },

  filterOppRows_(rows, filters, options) {
    var opts = options || {};
    return (rows || []).filter(function(opp) {
      var matchesName = !filters.nameQuery || String(opp.dealName || '').toLowerCase().indexOf(filters.nameQuery) !== -1;
      var matchesKeyDeal = filters.keyDeal === 'all' || String(!!opp.keyDeal) === filters.keyDeal;
      var oppMonthKey = normalizeOppMonthValue_(opp.completedMonth);
      var matchesQuarter = !filters.quarter || App.state.oppQuarterMonths.indexOf(oppMonthKey) !== -1;
      var matchesDate = filters.dateValue === 'all' || opp.scheduleOrCloseDate === filters.dateValue;
      return (filters.dept === 'all' || opp.dept === filters.dept) &&
        (filters.phase === 'all' || opp.phase === filters.phase) &&
        (filters.type === 'all' || opp.type === filters.type) &&
        matchesQuarter &&
        (filters.owner === 'all' || opp.subOwner === filters.owner) &&
        (filters.forecast === 'all' || opp.forecast === filters.forecast) &&
        (opts.ignoreDate || matchesDate) &&
        matchesName &&
        matchesKeyDeal;
    });
  },

  refreshOppDateOptions_(rows, currentValue) {
    var select = document.getElementById('opp-date-select');
    if (!select) return currentValue || 'all';
    var nextValue = currentValue || select.value || 'all';
    populateSelect('opp-date-select', uniqueValues(rows, 'scheduleOrCloseDate'));
    if (!selectContainsValue_(select, nextValue)) nextValue = 'all';
    select.value = nextValue;
    return nextValue;
  },

  renderOpps() {
    const filters = this.getOppFilterState_();
    this.persistOppFilterState_();
    const amountFields = getOppAmountFields_();
    const editableFields = getOppEditableFields_();
    const diffFields = amountFields;
    const sourceRows = this.getOppRowsForView_();
    const dateCandidates = this.filterOppRows_(sourceRows, filters, { ignoreDate: true });
    filters.dateValue = this.refreshOppDateOptions_(dateCandidates, filters.dateValue);
    const filtered = this.filterOppRows_(sourceRows, filters);
    const isLive = !this.state.oppSnapshotDate;
    const label = isLive ? '今週' : formatOppSnapshotLabel_(this.state.oppSnapshotDate);
    const canGoPrev = isLive ? this.state.oppSnapshotDates.length > 0 : true;
    const canGoNext = !isLive;
    var oppCountEl = document.getElementById('opp-count');
    if (oppCountEl) oppCountEl.textContent = filtered.length + '件';
    var oppUpdatedEl = document.getElementById('opp-last-updated');
    if (oppUpdatedEl) oppUpdatedEl.textContent = '最終更新: ' + (this.state.oppsLastUpdated || '-');
    this.syncOppFilterPanel_();

    let navHtml = '';
    navHtml += '<div class="week-nav-bar">';
    navHtml += '<button class="week-nav-btn" ' + (canGoPrev ? '' : 'disabled') + ' onclick="App.oppWeekNavPrev()">\u25c4</button>';
    navHtml += '<span class="week-nav-label' + (isLive ? ' week-nav-live' : '') + '">' + escapeHtml(label) + '</span>';
    navHtml += '<button class="week-nav-btn" ' + (canGoNext ? '' : 'disabled') + ' onclick="App.oppWeekNavNext()">\u25ba</button>';
    if (!isLive) navHtml += '<button class="week-nav-btn week-nav-today" onclick="App.oppWeekNavToday()">今週</button>';
    navHtml += '</div>';
    document.getElementById('opp-week-nav').innerHTML = navHtml;
    App.renderOppDiffHeaderButtons_(diffFields);

    const html = filtered.map(function(opp) {
      const checkKey = editKey({ type: 'oppKeyDeal', oppId: opp.oppId });
      const checked = opp.keyDeal ? ' checked' : '';
      const editable = isLive && !App.state.oppSnapshotDate;
      const dealNameHtml = renderOppDealLink_(opp);
      const keyDealEdited = App.state.editedPaths.has(checkKey);
      return '<tr>' +
        '<td class="opp-col-month">' + escapeHtml(opp.completedMonth || '') + '</td>' +
        '<td class="opp-col-dept opp-clip-cell">' + escapeHtml(opp.dept || '') + '</td>' +
        '<td class="opp-col-type ' + (opp.type === 'Churn' ? 'val-negative' : opp.type === 'New' ? 'val-positive' : 'val-neutral') + '">' + escapeHtml(opp.type || '') + '</td>' +
        '<td class="opp-col-owner opp-clip-cell">' + escapeHtml(opp.subOwner || '') + '</td>' +
        '<td class="opp-col-phase opp-clip-cell">' + escapeHtml(opp.phase || '') + '</td>' +
        '<td class="opp-col-forecast opp-clip-cell">' + escapeHtml(opp.forecast || '') + '</td>' +
        '<td class="opp-col-date">' + escapeHtml(opp.scheduleOrCloseDate || '') + '</td>' +
        '<td class="opp-name-cell" style="text-align:left;font-weight:600;">' + dealNameHtml + '</td>' +
        '<td class="opp-num-col">' + fmtNum(opp.allocationPercent) + '</td>' +
        '<td class="opp-num-col">' + fmtNum(opp.mrr) + '</td>' +
        '<td class="opp-num-col">' + fmtNum(opp.initialCost) + '</td>' +
        '<td class="opp-col-keydeal">' + (editable
          ? '<span class="opp-keydeal-wrap' + (keyDealEdited ? ' edited' : '') + '"><input type="checkbox" class="opp-checkbox" data-key="' + escapeAttr(checkKey) + '"' + checked + ' onchange="App.toggleOppKeyDeal(\'' + escapeAttr(opp.oppId) + '\', this.checked)"></span>'
          : (opp.keyDeal ? 'TRUE' : 'FALSE')) + '</td>' +
        amountFields.map(function(field) {
          var fieldEditable = editable && editableFields.indexOf(field) !== -1;
          return '<td class="opp-num-col">' + App.renderOppAmountCell_(opp, field, fieldEditable) + '</td>';
        }).join('') +
        '<td class="opp-cell-comment">' + (
          editable
            ? App.renderOppCommentCell_(opp)
            : '<span class="opp-cell-readonly">' + escapeHtml(opp.fcstComment || '') + '</span>'
        ) + '</td>' +
        '<td class="opp-col-firstmeeting">' + escapeHtml(opp.firstMeetingDate || '') + '</td>' +
        '<td class="opp-summary-cell">' + escapeHtml(opp.summary || '') + '</td>' +
        '<td class="opp-summary-cell">' + escapeHtml(opp.optionFeatures || '') + '</td>' +
        '<td class="opp-summary-cell">' + escapeHtml(opp.initiative || '') + '</td>' +
        '</tr>';
    }).join('');
    document.getElementById('opp-tbody').innerHTML = html || '<tr><td colspan="' + (17 + amountFields.length) + '" style="text-align:center;color:var(--color-text-sub);padding:24px;">該当する案件がありません</td></tr>';
  },

  renderOppDiffHeaderButtons_(fields) {
    fields.forEach(function(field) {
      var th = document.querySelector('[data-opp-diff-field="' + field + '"]');
      if (!th) return;
      var label = th.dataset.baseLabel || th.textContent;
      var active = !!App.state.oppDiffToggles[field];
      th.innerHTML = '<div class="opp-header-stack"><span class="opp-header-label">' + escapeHtml(label) + '</span><button class="diff-toggle-btn' + (active ? ' active' : '') + '" onclick="App.toggleOppDiff(\'' + field + '\')">\u5148\u9031\u6bd4</button></div>';
    });
  },

  renderOppAmountCell_(opp, field, editable) {
    var key = editKey({ type: 'oppDraft', oppId: opp.oppId, field: field });
    var current = safeNum(opp[field]);
    var base = safeNum(opp._base && opp._base[field]);
    var prevRow = !this.state.oppSnapshotDate ? (this.state.oppPreviousMap[opp.oppId] || null) : null;
    var prevValue = prevRow ? safeNum(prevRow[field]) : null;
    var diffHtml = '';
    if (!!this.state.oppDiffToggles[field] && prevValue !== null) {
      var diff = current - prevValue;
      diffHtml = '<span class="opp-inline-diff ' + diffBadgeClass_(diff) + '">' + fmtDiffNum(diff) + '</span>';
    }
    var previousHtml = '';
    if (editable && this.state.editedPaths.has(key)) {
      previousHtml = '<div class="opp-prev-value">変更前: ' + escapeHtml(fmtNum(base)) + '</div>';
    }
    var valueHtml = editable
      ? editCell(current, { type: 'oppDraft', oppId: opp.oppId, field: field }, this.state.editedPaths)
      : '<span class="opp-cell-readonly">' + fmtNum(current) + '</span>';
    var toneClass = '';
    if (prevValue !== null && current > prevValue) toneClass = ' opp-value-up';
    if (prevValue !== null && current < prevValue) toneClass = ' opp-value-down';
    return '<div class="opp-value-stack' + toneClass + '"><div class="opp-value-main">' + valueHtml + diffHtml + '</div>' + previousHtml + '</div>';
  },

  renderOppCommentCell_(opp) {
    var meta = { type: 'oppComment', oppId: opp.oppId };
    var key = editKey(meta);
    var current = String(opp.fcstComment || '');
    var previousHtml = '';
    if (this.state.editedPaths.has(key)) {
      previousHtml = '<div class="opp-prev-value opp-prev-comment">変更前: ' + escapeHtml(String(opp._base.fcstComment || '')) + '</div>';
    }
    return '<div class="opp-comment-stack">' + renderCommentCell(current, meta, this.state.editedPaths) + previousHtml + '</div>';
  },

  startEditFromEl(el) {
    const meta = JSON.parse(el.dataset.meta);
    if (meta.type === 'oppComment') {
      this.openOppCommentEditor_(meta.oppId);
      return;
    }
    const value = Number(el.dataset.val);
    const input = document.createElement('input');
    input.type = 'number';
    input.className = 'edit-input';
    input.value = value;
    this.state.oppEditAnchor = el;
    this.state.oppEditMeta = meta;
    el.replaceWith(input);
    input.focus();
    input.select();

    const commit = () => {
      const newValue = Number(input.value);
      if (isNaN(newValue)) {
        App.restoreOppEditInput_(input, meta);
        return;
      }
      App.commitEdit(meta, newValue, input);
    };

    input.addEventListener('blur', commit);
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') input.blur();
      if (e.key === 'Escape') {
        input.removeEventListener('blur', commit);
        App.restoreOppEditInput_(input, meta);
      }
    });
  },

  commitEdit(meta, newValue, inputEl) {
    const key = editKey(meta);
    var opp = null;

    if (meta.type === 'oppDraft') {
      opp = this.findOpp_(meta.oppId);
      if (opp) {
        opp[meta.field] = newValue;
        this.syncOppEditedState_(opp, key, newValue, opp._base[meta.field], meta.field);
      }
    }

    if (meta.type === 'oppComment') {
      opp = this.findOpp_(meta.oppId);
      if (opp) {
        opp.fcstComment = newValue;
        this.syncOppEditedState_(opp, key, newValue, opp._base.fcstComment, 'fcstComment');
      }
    }

    this.updateEditBadge();
    this.restoreOppEditInput_(inputEl, meta);
  },

  toggleOppKeyDeal(oppId, checked) {
    var opp = this.findOpp_(oppId);
    if (!opp) return;
    opp.keyDeal = !!checked;
    this.syncOppEditedState_(opp, editKey({ type: 'oppKeyDeal', oppId: oppId }), opp.keyDeal, opp._base.keyDeal, 'keyDeal');
    this.updateEditBadge();
  },

  findOpp_(oppId) {
    return this.state.opps.find(function(item) { return item.oppId === oppId; });
  },

  findOppIndex_(oppId) {
    return this.state.opps.findIndex(function(item) { return item.oppId === oppId; });
  },

  extractOppBase_(opp) {
    var base = {
      keyDeal: !!opp.keyDeal,
      fcstCommit: safeNum(opp.fcstCommit),
      fcstMin: safeNum(opp.fcstMin),
      fcstMax: safeNum(opp.fcstMax),
      fcstComment: String(opp.fcstComment || '')
    };
    if (hasProposalProducts_()) {
      base.received = safeNum(opp.received);
      base.debtMgmt = safeNum(opp.debtMgmt);
      base.debtMgmtLite = safeNum(opp.debtMgmtLite);
      base.expense = safeNum(opp.expense);
    }
    return base;
  },

  syncOppEditedState_(opp, key, value, baseValue, colName) {
    if (String(value) !== String(baseValue)) this.state.editedPaths.add(key);
    else this.state.editedPaths.delete(key);

    if (!opp || !colName) return;
    var rowIndex = this.findOppIndex_(opp.oppId);
    if (rowIndex < 0) return;
    var dirtyKey = rowIndex + ':' + colName;
    var originalVal = this.state.oppListOriginal && this.state.oppListOriginal[rowIndex]
      ? this.state.oppListOriginal[rowIndex][colName]
      : baseValue;

    if (String(value) !== String(originalVal)) {
      this.state.oppListDirty[dirtyKey] = {
        old: originalVal,

  saveOppDrafts() {
    if (!this.state.editedPaths.size) return;

    var changes = this.state.opps.reduce(function(list, opp) {
      if (!opp || !opp._base) return list;
      var fields = {};
      getOppEditableFields_().forEach(function(field) {
        var current = safeNum(opp[field]);
        if (String(current) !== String(opp._base[field])) fields[field] = current;
      });
      if (String(opp.fcstComment || '') !== String(opp._base.fcstComment || '')) fields.comment = String(opp.fcstComment || '');

      var keyDealChanged = !!opp.keyDeal !== !!opp._base.keyDeal;
      if (!keyDealChanged && !Object.keys(fields).length) return list;

      list.push({
        oppId: opp.oppId,
        keyDeal: !!opp.keyDeal,
        proposalProductIds: opp.proposalProductIds || {},
        fields: fields
      });
      return list;
    }, []);

    if (!changes.length) return;

    App.showLoading(true, LOADING_PRESETS.save);
    var dirtyKeys = Object.keys(this.state.oppListDirty || {});
    if (!dirtyKeys.length) {
      App.showLoading(false);
      alert('変更はありません');
      return;
    }

    var rowMap = {};
    var dirtyRows = [];
    dirtyKeys.forEach(function(k) {
      var d = App.state.oppListDirty[k];
      if (!d) return;
      if (!rowMap[d.rowIndex]) {
        var opp = App.state.opps[d.rowIndex];
        rowMap[d.rowIndex] = {
          rowKey: opp ? (opp['案件ID'] || opp.oppId || opp.id || String(d.rowIndex)) : String(d.rowIndex),
          changes: {}
        };
        dirtyRows.push(rowMap[d.rowIndex]);
      }
      rowMap[d.rowIndex].changes[d.colName] = { old: d.old, new: d.new };
    });

    if (!dirtyRows.length) {
      App.showLoading(false);
      alert('変更はありません');
      return;
    }

    google.script.run
      .withSuccessHandler(function(result) {
        App.showLoading(false);
        if (result && result.error) {
          App.showError(result.error);
          return;
        }
        if (result && result.status === 'no_changes') {
          alert('変更はありません');
          return;
        }
        App.applySavedOppDrafts_(changes);
      })
      .withFailureHandler(function(err) {
        console.warn('saveDiffOppList failed. Falling back to saveOppDrafts.', err);
        App.saveOppDraftsFallback_(changes);
      })
      .saveDiffOppList(_selectedDept, dirtyRows, _userEmail || '', new Date().toISOString());
  },

  saveOppDraftsFallback_(changes) {
    google.script.run
      .withSuccessHandler(function(result) {
        App.showLoading(false);
        if (result && result.error) {
          App.showError(result.error);
          return;
        }
        App.applySavedOppDrafts_(changes);
      })
      .withFailureHandler(App.showError)
      .saveOppDrafts(_selectedDept, changes);
  },

  applySavedOppDrafts_(changes) {
    (changes || []).forEach(function(change) {
      var opp = App.findOpp_(change.oppId);
      if (!opp) return;

      opp.keyDeal = !!change.keyDeal;
      opp._base.keyDeal = !!change.keyDeal;

      var fields = change.fields || {};
      getOppEditableFields_().forEach(function(field) {
        if (!fields.hasOwnProperty(field)) return;
        var val = safeNum(fields[field]);
        opp[field] = val;
        if (opp._base) opp._base[field] = val;
      });

      if (fields.hasOwnProperty('comment')) {
        opp.fcstComment = String(fields.comment || '');
        if (opp._base) opp._base.fcstComment = opp.fcstComment;
      }
    });

    App.state.editedPaths.clear();
    App.state.oppListDirty = {};
    App.state.oppListOriginal = JSON.parse(JSON.stringify(App.state.opps));

  setLoadingStatus_(percent, text, subtext) {
    var safePercent = Math.max(0, Math.min(100, Number(percent) || 0));
    var textEl = document.getElementById('loading-text');
    var subtextEl = document.getElementById('loading-subtext');
    var percentEl = document.getElementById('loading-percent');
    var barEl = document.getElementById('loading-progress-bar');
    if (textEl) textEl.textContent = text || '読み込み中...';
    if (subtextEl) subtextEl.textContent = subtext || 'しばらくお待ちください';
    if (percentEl) percentEl.textContent = safePercent + '%';
    if (barEl) barEl.style.width = safePercent + '%';
  },

  startLoadingSequence_(steps, keepExistingStatus) {
    var preset = Array.isArray(steps) && steps.length ? steps : [{ delay: 0, percent: 18, text: '読み込み中...', subtext: 'しばらくお待ちください' }];
    var self = this;
    self.clearLoadingTimers_();
    preset.forEach(function(step) {
      var timerId = setTimeout(function() {
        if (keepExistingStatus && step.delay === 0) return;
        self.setLoadingStatus_(step.percent, step.text, step.subtext);
      }, Number(step.delay) || 0);
      self.state.loadingTimerIds.push(timerId);
    });
  },

  showLoading(show, steps) {
    this.state.loading = show;
    document.getElementById('loading-overlay').classList.toggle('hidden', !show);
    document.getElementById('main-content').style.visibility = show ? 'hidden' : 'visible';
    if (!show) {
      this.clearLoadingTimers_();
      this.setLoadingStatus_(100, '完了しました', '');
      return;
    }
    this.startLoadingSequence_(steps);

function fmtNum(value) {

function fmtMan(v) {

function fmtDiffNum(value) {

}

function diffBadge(text) {

function diffClassNum(value) {

}

function diffBadgeClass_(val) {

}

function valClassNum(value) {

}

function blockLabel(block) {

    return def ? def.label : block;
  }
  if (/^\d{4}-\d{2}$/.test(String(block || ''))) return formatFcstMonthLabel_(block);
  return { Q: 'Q合計', M5: '5月', M6: '6月', M7: '7月' }[block] || block;

function splitDeals(text) {

}

function lastValue(arr) {

}

function uniqueValues(rows, key) {

}

function preserveSelectOptions_(id, values) {
  var select = document.getElementById(id);
  if (!select) return;
  var current = select.value || 'all';
  populateSelect(id, values);

function selectContainsValue_(select, value) {
  for (var i = 0; i < select.options.length; i++) {
    if (select.options[i].value === value) return true;
  }
  return false;
}

function getOppQuarterDefinitions_() {
  var defs = [];
  var baseYear = 2025;
  var baseMonth = 6;
  for (var fiscal = 19; fiscal <= 20; fiscal++) {
    for (var quarter = 1; quarter <= 4; quarter++) {
      var monthOffset = ((fiscal - 19) * 12) + ((quarter - 1) * 3);
      var months = [];
      for (var i = 0; i < 3; i++) {
        months.push(addMonthsToMonthKey_(baseYear, baseMonth, monthOffset + i));
      }
      defs.push({
        key: fiscal + 'Q' + quarter,
        label: fiscal + '\u671f' + quarter + 'Q',
        months: months
      });
    }
  }
  return defs;
}

function getOppQuarterDefinition_(key) {
  return getOppQuarterDefinitions_().find(function(def) {
    return def.key === key;
  }) || null;
}

function addMonthsToMonthKey_(year, month, offset) {
  var total = (year * 12 + (month - 1)) + offset;
  var y = Math.floor(total / 12);
  var m = (total % 12) + 1;
  return y + '-' + String(m).padStart(2, '0');
}

function normalizeOppMonthValue_(value) {
  var text = String(value || '');
  var match = text.match(/(\d{4})[-\/年](\d{1,2})/);
  if (!match) return '';
  return match[1] + '-' + String(Number(match[2])).padStart(2, '0');
}

function formatOppMonthLabel_(monthKey) {
  var match = String(monthKey || '').match(/(\d{4})-(\d{2})/);
  if (!match) return monthKey;
  return match[1] + '年' + Number(match[2]) + '月';
}

function formatOppSnapshotLabel_(value) {
  if (!value) return '';
  if (value instanceof Date && !isNaN(value)) return formatCell(value);
  var text = String(value || '').trim();
  var isoMatch = text.match(/(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/);
  if (isoMatch) {
    return isoMatch[1] + '-' + String(Number(isoMatch[2])).padStart(2, '0') + '-' + String(Number(isoMatch[3])).padStart(2, '0');
  }
  var parsed = new Date(text);
  if (!isNaN(parsed)) return formatCell(parsed);
  return text;
}

function sameMonthSelection_(left, right) {
  if ((left || []).length !== (right || []).length) return false;
  return (left || []).every(function(monthKey) {
    return right.indexOf(monthKey) !== -1;
  });
}

function buildOppRowMap_(rows) {
  var map = {};
  (rows || []).forEach(function(row) {
    if (!row || !row.oppId) return;
    map[row.oppId] = row;
  });
  return map;
}

function buildOpportunityUrl_(oppId) {
  var id = String(oppId || '').trim();
  if (!/^[A-Za-z0-9]{15,18}$/.test(id)) return "";
  return 'https://sansan.lightning.force.com/lightning/r/Opportunity/' + encodeURIComponent(id) + '/view';
}

function renderOppDealLink_(opp) {
  var url = buildOpportunityUrl_(opp && opp.oppId);
  var label = escapeHtml((opp && opp.dealName) || '');
  if (!url) return label;
  return '<a href="' + escapeAttr(url) + '" target="_blank" class="deal-card-link">' + label + '</a>';
}

function isDepartmentTotalMember_(member) {
  if (!member || !member.isTotal) return false;
  if (member.totalKind) return member.totalKind === 'department';
  var group = String(member.group || '');
  return group === '部全体' || group === 'BOAM' || (_selectedDept && group === _selectedDept);
}

function isGroupTotalMember_(member) {
  if (!member || !member.isTotal) return false;
  if (member.totalKind) return member.totalKind === 'group';
  return !isDepartmentTotalMember_(member);
}

function getMemberGroupLabel_(member) {
  if (!member) return '';
  if (isDepartmentTotalMember_(member)) return '部全体';
  return member.group || member.groupCode || '';
}

function displayMemberName(member) {
  if (!member) return '';
  if (isDepartmentTotalMember_(member)) return '部全体';
  if (isGroupTotalMember_(member)) return getMemberGroupLabel_(member);
  return member.displayName || member.name || '';
}

function formatCell(value) {
  if (value instanceof Date) {
    const y = value.getFullYear();
    const m = String(value.getMonth() + 1).padStart(2, '0');
    const d = String(value.getDate()).padStart(2, '0');
    return [y, m, d].join('-');
  }
  return value === null || value === undefined ? '' : String(value);
}

function escapeHtml(value) {
  return String(value == null ? '' : value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function fmtNum(value) {
  var num = Number(value);
  if (!isFinite(num)) return '-';
  return num.toLocaleString('ja-JP');
}

function fmtDiffNum(value) {
  var num = Number(value) || 0;
  if (!num) return '0';
  return (num > 0 ? '+' : '') + fmtNum(num);
}

function safeArray(value) {
  return Array.isArray(value) ? value : [];
}

function safeMetricPart_(metric, partKey) {
  if (metric == null) return 0;
  if (typeof metric === 'number') return partKey === 'net' ? metric : 0;
  return Number(metric[partKey]) || 0;
}

function metricToneClass_(partKey, value) {
  var num = Number(value) || 0;
  if (num > 0) return 'val-positive';
  if (num < 0) return 'val-negative';

function cloneFcstMetric_(metric) {
  return {
    net: Number(safeMetricPart_(metric, 'net')) || 0,
    newExp: Number(safeMetricPart_(metric, 'newExp')) || 0,
    churn: Number(safeMetricPart_(metric, 'churn')) || 0
  };
}

function diffFcstMetric_(currentMetric, compareMetric) {
  var current = cloneFcstMetric_(currentMetric);
  var compare = cloneFcstMetric_(compareMetric);
  return {
    net: current.net - compare.net,
    newExp: current.newExp - compare.newExp,
    churn: current.churn - compare.churn
  };
}

function addFcstMetric_(targetMetric, addMetric) {
  targetMetric.net += Number(addMetric && addMetric.net) || 0;
  targetMetric.newExp += Number(addMetric && addMetric.newExp) || 0;
  targetMetric.churn += Number(addMetric && addMetric.churn) || 0;
  return targetMetric;
}

App.rebuildFcstAdjustedTotals_ = function(period) {
  var rows = safeArray(this.state.fcstRowsByPeriod[period]);
  var departmentTotal = null;

  rows.forEach(function(row) {
    if (!row || !row.isTotal) return;
    row.metric = row.metric || {};
    row.wow = row.wow || {};
    row.metric.fcstAdjusted = { net: 0, newExp: 0, churn: 0 };
    row.wow.fcstAdjusted = { net: 0, newExp: 0, churn: 0 };
    if (row.totalKind === 'department') departmentTotal = row;
    if (row.totalKind === 'group' && row.group) groupTotals[row.group] = row;
  });

  rows.forEach(function(row) {
    if (!row || row.isTotal) return;
    var currentMetric = cloneFcstMetric_(row.metric && row.metric.fcstAdjusted);
    var currentWow = cloneFcstMetric_(row.wow && row.wow.fcstAdjusted);
    if (departmentTotal) {
      addFcstMetric_(departmentTotal.metric.fcstAdjusted, currentMetric);
      addFcstMetric_(departmentTotal.wow.fcstAdjusted, currentWow);
    }
    if (row.group && groupTotals[row.group]) {
      addFcstMetric_(groupTotals[row.group].metric.fcstAdjusted, currentMetric);
      addFcstMetric_(groupTotals[row.group].wow.fcstAdjusted, currentWow);
    }
  });
};

App.activateFcstAdjInput = function(el) {
  var name = el.dataset.name;
  var period = el.dataset.period;
  var field = el.dataset.field;
  var value = Number(el.dataset.val) || 0;
  var hasSavedValue = el.dataset.hasSaved === 'true';
  var input = document.createElement('input');
  input.type = 'number';
  input.className = 'edit-input fcst-adj-input';
  input.value = (hasSavedValue || value !== 0) ? String(value) : '';
  el.replaceWith(input);
  input.focus();
  input.select();

  var committed = false;
  var commit = function() {
    if (committed) return;
    committed = true;
    var nextValue = input.value === '' ? 0 : (Number(input.value) || 0);
    App.commitFcstAdj(name, period, field, nextValue);
  };

  input.addEventListener('blur', commit);
  input.addEventListener('keydown', function(event) {
    if (event.key === 'Enter') {
      input.removeEventListener('blur', commit);
      commit();
    }
    if (event.key === 'Escape') {
      committed = true;
      App.renderFcst();
    }
  });
};

App.commitFcstAdj = function(name, period, partKey, nextValue) {
  var row = this.findFcstRow_(name, period);
  if (!row || row.isTotal) {
    this.renderFcst();
    return;
  }

  row.metric = row.metric || {};
  row.wow = row.wow || {};
  var previousMetric = cloneFcstMetric_(row.metric.fcstAdjusted);
  var nextMetric = cloneFcstMetric_(row.metric.fcstAdjusted);
  if (partKey === 'net') {
    nextMetric.net = nextValue;
    nextMetric.newExp = 0;
    nextMetric.churn = 0;
  } else {
    nextMetric[partKey] = nextValue;
    nextMetric.net = (Number(nextMetric.newExp) || 0) + (Number(nextMetric.churn) || 0);
  }

  var wowMetric = cloneFcstMetric_(row.wow.fcstAdjusted);
  wowMetric.net += nextMetric.net - previousMetric.net;
  wowMetric.newExp += nextMetric.newExp - previousMetric.newExp;
  wowMetric.churn += nextMetric.churn - previousMetric.churn;

  row.metric.fcstAdjusted = nextMetric;
  row.wow.fcstAdjusted = wowMetric;
  row.hasFcstAdjustedSaved = true;
  this.rebuildFcstAdjustedTotals_(period);
  this.renderFcst();

  google.script.run
    .withSuccessHandler(function(result) {

App.renderFcstModern_ = function() {
  this.ensureFcstUiState_();

  var options = this.currentFcstPeriodOptions_();
  var selectedQuarter = this.findQuarterOption_(this.state.selectedQuarterKey, options) || this.findQuarterForPeriod_(this.state.selectedPeriod, options) || options[0] || null;
  if (selectedQuarter) this.state.selectedQuarterKey = selectedQuarter.key;

  var validPeriods = selectedQuarter ? [selectedQuarter.key].concat(safeArray(selectedQuarter.months)) : [];
  if (validPeriods.length && validPeriods.indexOf(this.state.selectedPeriod) === -1) this.state.selectedPeriod = selectedQuarter.key;

  var period = this.state.selectedPeriod || this.pickDefaultPeriod(data);
  var allRows = this.currentFcstRows_(period).filter(Boolean);
  var memberRows = allRows.filter(function(row) { return !row.isTotal; });
  var totalRows = allRows.filter(function(row) { return !!row.isTotal; });
  var groups = {};
  memberRows.forEach(function(row) {
    var key = row.group || '未設定';
    if (!groups[key]) groups[key] = [];
    groups[key].push(row);
  });

  var groupNames = Object.keys(groups).sort();
  var selectedGroup = this.state.selectedGroup || '部全体';
  if (selectedGroup !== '部全体' && groupNames.indexOf(selectedGroup) === -1) {
    selectedGroup = '部全体';
    this.state.selectedGroup = selectedGroup;
  }

  var displayRows = [];
  if (selectedGroup === '部全体') {
    displayRows = totalRows.length ? totalRows : memberRows;
  } else {
    var groupTotal = totalRows.find(function(row) {
      return row && row.totalKind === 'group' && String(row.group || '') === selectedGroup;
    });
    if (groupTotal) displayRows.push(groupTotal);
    displayRows = displayRows.concat(groups[selectedGroup] || []);
  }

  var periodLabel = formatFcstPeriodLabel_(period, options);
  var summaryRow = this.findFcstSummaryRow_(allRows, selectedGroup) || this.buildFcstSummaryFallback_(allRows, selectedGroup);
  var metricDefs = fcstMetricDefs_();
  var self = this;

  var html = '<div class="fcst-view-shell"><div class="fcst-view-head">';
  html += '<div class="view-toolbar">';
  html += '<span class="view-toolbar-meta">部署: ' + escapeHtml((currentDeptConfig_() && currentDeptConfig_().label) || _selectedDept || '') + '</span>';
  html += '<span class="view-toolbar-meta">表示期間: ' + escapeHtml(periodLabel || '') + '</span>';
  html += '<button class="save-bar-btn" type="button" onclick="App.toggleFilterPanel(\'fcst\')">' + (this.state.fcstFiltersCollapsed ? 'フィルタを展開' : 'フィルタを閉じる') + '</button>';
  html += '</div>';
  html += this.renderFcstWeekNav_();

  html += '<div class="view-filter-panel' + (this.state.fcstFiltersCollapsed ? ' collapsed' : '') + '">';
  html += '<div class="filter-chip-row"><span class="filter-chip-label">対象Q:</span><div class="quarter-chips">';
  options.forEach(function(option) {
    html += '<button type="button" class="chip' + (selectedQuarter && selectedQuarter.key === option.key ? ' active' : '') + '" onclick="App.selectQuarter(\'' + escapeHtml(option.key) + '\')">' + escapeHtml(option.label || option.key) + '</button>';
  });
  html += '</div></div>';

  html += '<div class="filter-chip-row"><span class="filter-chip-label">対象月:</span><div class="period-chips">';
  if (selectedQuarter) {
    html += '<button type="button" class="chip' + (period === selectedQuarter.key ? ' active' : '') + '" onclick="App.selectPeriod(\'' + escapeHtml(selectedQuarter.key) + '\')">' + escapeHtml(selectedQuarter.label || selectedQuarter.key) + '</button>';
    safeArray(selectedQuarter.months).forEach(function(monthKey) {
      html += '<button type="button" class="chip' + (period === monthKey ? ' active' : '') + '" onclick="App.selectPeriod(\'' + escapeHtml(monthKey) + '\')">' + escapeHtml(formatFcstPeriodLabel_(monthKey, options)) + '</button>';
    });
  }
  html += '</div></div>';

  html += '<div class="filter-chip-row"><span class="filter-chip-label">表示:</span><div class="group-chips">';
  html += '<button type="button" class="chip' + (selectedGroup === '部全体' ? ' active' : '') + '" onclick="App.selectGroup(\'\u90e8\u5168\u4f53\')">部全体</button>';
  groupNames.forEach(function(groupName) {
    html += '<button type="button" class="chip' + (selectedGroup === groupName ? ' active' : '') + '" onclick="App.selectGroup(\'' + escapeHtml(groupName) + '\')">' + escapeHtml(groupName) + '</button>';
  });
  html += '</div></div></div></div>';

  html += this.renderFcstSummaryCards_(summaryRow, periodLabel);
  html += '<div class="section-title">FCST一覧 <span class="period-badge">' + escapeHtml(periodLabel || '') + '</span></div>';
  html += '<div class="table-wrapper fcst-table-wrap"><table><thead><tr>';
  html += '<th rowspan="2" class="col-group col-group-start th-person">担当者</th>';
  html += '<th rowspan="2" class="col-group col-group-start th-target">目標</th>';
  metricDefs.forEach(function(metricDef) {
    var expanded = !!self.state.expandedMetrics[metricDef.key];
    html += '<th colspan="' + (expanded ? '3' : '1') + '" class="col-group col-group-start">';
    html += escapeHtml(metricDef.label);
    html += '<button class="col-expand-btn" type="button" onclick="App.toggleMetricDetails(\'' + metricDef.key + '\')">' + (expanded ? '-' : '+') + '</button>';
    html += '</th>';
  });
  html += '<th rowspan="2" class="col-group col-group-start th-keydeal keydeal-col">Key Deal</th>';
  html += '<th rowspan="2" class="col-group col-group-start th-notes notes-col">備考・メモ</th>';
  html += '</tr><tr>';
  metricDefs.forEach(function(metricDef) {
    var expanded = !!self.state.expandedMetrics[metricDef.key];
    html += self.renderFcstSubHeader_(metricDef, 'net', true);
    if (expanded) {
      html += self.renderFcstSubHeader_(metricDef, 'newExp', false);
      html += self.renderFcstSubHeader_(metricDef, 'churn', false);
    }
  });
  html += '</tr></thead><tbody>';

  displayRows.forEach(function(row) {
    var displayName = row.displayName || row.name || row.group || '';
    var rowClass = '';
    if (row.isTotal && row.totalKind === 'department') rowClass = ' class="overall-total-row"';
    else if (row.isTotal) rowClass = ' class="total-row"';
    html += '<tr' + rowClass + '>';
    html += '<td class="td-person">' + escapeHtml(row.isTotal ? displayName : '　' + displayName) + '</td>';
    html += '<td class="td-target">' + renderMetricValue_(row.metric && row.metric.target, 'net') + '</td>';
    metricDefs.forEach(function(metricDef) {
      var expanded = !!self.state.expandedMetrics[metricDef.key];
      html += '<td class="col-group-start">' + self.renderFcstMetricCell_(row, period, metricDef, 'net') + '</td>';
      if (expanded) {
        html += '<td>' + self.renderFcstMetricCell_(row, period, metricDef, 'newExp') + '</td>';
        html += '<td>' + self.renderFcstMetricCell_(row, period, metricDef, 'churn') + '</td>';
      }
    });
    html += '<td class="td-keydeal">' + self.renderKeyDealCell_(row, period) + '</td>';
    html += '<td class="td-notes">' + self.renderNoteCell_(row, period) + '</td>';
    html += '</tr>';
  });

  if (!displayRows.length) {
    var colCount = 4;
    metricDefs.forEach(function(metricDef) {
      colCount += self.state.expandedMetrics[metricDef.key] ? 3 : 1;
    });
    html += '<tr><td colspan="' + colCount + '">表示できるデータがありません</td></tr>';
  }

  html += '</tbody></table></div></div>';
  document.getElementById('fcst-content').innerHTML = html;
};

App.syncTrendBlockOptions_ = function() {
  var select = document.getElementById('trend-block-select');
  if (!select) return;
  var options = this.currentFcstPeriodOptions_();
  if (!options || !options.length) return;
  var quarter = options[0];
  var built = [{ value: 'Q', label: (quarter && quarter.label ? quarter.label : 'Q合計') }];
  safeArray(quarter && quarter.months).forEach(function(monthKey) {
    var match = String(monthKey || '').match(/^(\d{4})-(\d{2})$/);
    if (!match) return;
    var monthNum = Number(match[2]);
    built.push({ value: 'M' + monthNum, label: monthNum + '月' });
  });
  var currentValue = this.state.trendBlock || 'Q';
  var valid = built.some(function(item) { return item.value === currentValue; });
  if (!valid) {
    currentValue = 'Q';
    this.state.trendBlock = 'Q';
  }
  var currentHtml = built.map(function(item) {
    return '<option value="' + escapeHtml(item.value) + '"' + (item.value === currentValue ? ' selected' : '') + '>' + escapeHtml(item.label) + '</option>';
  }).join('');
  if (select.innerHTML !== currentHtml) {
    select.innerHTML = currentHtml;
  }
  if (select.value !== currentValue) select.value = currentValue;
};

App.renderTrendChart_ = function(points) {
  var canvas = document.getElementById('trend-chart');
  if (!canvas || typeof Chart === 'undefined') return;
  if (this.state.trendChart) { this.state.trendChart.destroy(); this.state.trendChart = null; }

  var labels = points.map(function(p) { return p.label || p.date || ''; });
  var radii = points.map(function(p) { return p.isLive ? 6 : 3; });
  var styles = points.map(function(p) { return p.isLive ? 'rectRot' : 'circle'; });
  var extract = function(key) {
    return points.map(function(p) { return Number(p.metrics && p.metrics[key]) || 0; });
  };

  var segmentDash = {
    borderDash: function(ctx) {
      var a = points[ctx.p0DataIndex] || {};
      var b = points[ctx.p1DataIndex] || {};
      return (a.isBackfilled || b.isBackfilled) ? [6, 4] : undefined;
    }
  };

  var datasets = [
    { label: '目標', data: extract('target'), borderColor: '#f29900', backgroundColor: '#f29900', tension: 0.2, pointRadius: radii, pointStyle: styles, segment: segmentDash },
    { label: '実績', data: extract('confirmed'), borderColor: '#5f6368', backgroundColor: '#5f6368', tension: 0.2, pointRadius: radii, pointStyle: styles, segment: segmentDash },
    { label: 'FCST(調整後)', data: extract('fcstAdjusted'), borderColor: '#1a73e8', backgroundColor: '#1a73e8', tension: 0.2, pointRadius: radii, pointStyle: styles, segment: segmentDash },
    { label: 'FCST(コミット)', data: extract('fcstCommit'), borderColor: '#0b8043', backgroundColor: '#0b8043', tension: 0.2, pointRadius: radii, pointStyle: styles, segment: segmentDash },
    { label: '期待MRR', data: extract('expectedMrr'), borderColor: '#a142f4', backgroundColor: '#a142f4', tension: 0.2, pointRadius: radii, pointStyle: styles, segment: segmentDash }
  ];

  this.state.trendChart = new Chart(canvas, {
    type: 'line',
    data: { labels: labels, datasets: datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        tooltip: {
          callbacks: {
            footer: function(items) {
              if (!items || !items.length) return '';
              var point = points[items[0].dataIndex];
              if (!point) return '';
              var lines = ['Key Deal: ' + (point.keyDealCount || 0) + '件'];
              safeArray(point.keyDealPreview).slice(0, 3).forEach(function(deal) {
                lines.push(' ・ ' + (deal.company || '-') + ' (' + fmtNum(deal.monthlyMrr) + ')');
              });
              return lines.join('\n');
            }
          }
        }
      },
      scales: { y: { beginAtZero: false } }
    }
  });
};

App.openTrendKeyDealModal_ = function(snapshotKey) {
  var self = this;
  var deptKey = _selectedDept;
  var periodKey = this.state.trendBlock || 'Q';
  var periodLabel = formatFcstPeriodLabel_(periodKey, this.currentFcstPeriodOptions_()) || periodKey;
  var points = safeArray(this.state.trendData && this.state.trendData.points);

    if (String(points[i].snapshotKey) === String(snapshotKey)) { point = points[i]; break; }
  }
  var title = (point && (point.label || point.date)) || snapshotKey || '週次スナップショット';
  var kicker = (deptKey ? deptKey + ' / ' : '') + periodLabel;
  this.openDetailModal_(title, kicker, '<div class="trend-empty">読み込み中...</div>', '<button class="detail-btn-secondary" type="button" onclick="App.closeDetailModal()">閉じる</button>');

  google.script.run
    .withSuccessHandler(function(result) {
      self.renderTrendKeyDealModalBody_(result || {}, title, kicker);
    })
    .withFailureHandler(function(error) {
      var msg = (error && error.message) || String(error);
      self.openDetailModal_(title, kicker, '<div class="trend-empty">取得に失敗しました: ' + escapeHtml(msg) + '</div>', '<button class="detail-btn-secondary" type="button" onclick="App.closeDetailModal()">閉じる</button>');
    })
    .getTrendWeekDetails(deptKey, periodKey, snapshotKey);
};

App.renderTrendTable_ = function(points) {
  var wrap = document.getElementById('trend-table-wrap');
  if (!wrap) return;
  if (!points.length) {
    wrap.innerHTML = '<div class="trend-empty">\u30c7\u30fc\u30bf\u306a\u3057</div>';
    return;
  }

  var metricCols = [
    { key: 'target', label: '\u76ee\u6a19' },
    { key: 'confirmed', label: '\u78ba\u5b9a' },
    { key: 'fcstAdjusted', label: 'FCST(\u8abf\u6574\u5f8c)' },
    { key: 'fcstCommit', label: 'FCST(\u30b3\u30df\u30c3\u30c8)' },
    { key: 'expectedMrr', label: '\u671f\u5f85MRR' }
  ];
  if (hasProposalProducts_()) {
    metricCols = metricCols.concat(fcstConfirmedProposalMetricDefs_().map(function(metricDef) {
      return { key: metricDef.key, label: metricDef.label };
    }));
  }

  var header = '<thead><tr><th>\u65e5\u4ed8</th>' +
    metricCols.map(function(metricCol) {
      return '<th>' + escapeHtml(metricCol.label) + '</th>';
    }).join('') +
    '<th>Key Deal\u4ef6\u6570</th></tr></thead>';

  var body = points.slice().reverse().map(function(point) {
    var metrics = point.metrics || {};
    var classes = [];
    if (point.isLive) classes.push('trend-row-live');
    if (point.isBackfilled) classes.push('trend-row-backfilled');
    var classAttr = classes.length ? ' class="' + classes.join(' ') + '"' : '';
    var snapshotKey = String(point.snapshotKey || '');
    return '<tr' + classAttr + ' data-snapshot-key="' + escapeHtml(snapshotKey) + '" onclick="App.openTrendKeyDealModal_(\'' + escapeHtml(snapshotKey).replace(/'/g, '&#39;') + '\')">' +
      '<td>' + escapeHtml(point.label || point.date || '') + '</td>' +
      metricCols.map(function(metricCol) {
        return '<td>' + escapeHtml(fmtNum(metrics[metricCol.key])) + '</td>';
      }).join('') +
      '<td>' + escapeHtml(String(point.keyDealCount || 0)) + '</td>' +
    '</tr>';
  }).join('');

  wrap.innerHTML = '<table class="trend-table">' + header + '<tbody>' + body + '</tbody></table>';
};
